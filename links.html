<style>
body{background:#EEF5FD}
.app-header{border-bottom-color:#B5D4F4}
.app-title{color:#185FA5;font-size:19px;font-weight:900}

.fab{background:linear-gradient(135deg,#185FA5,#7F77DD)}

.bottom-bar{border-top-color:#B5D4F4}
.search-input{border-color:#B5D4F4}

.chip-all{background:#185FA5;border-color:#185FA5}

.modal-sheet{border-top-color:#B5D4F4}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:#185FA5}
.tag-chip{background:#E8F3FD;color:#185FA5}
.tag-chip-del{color:#185FA5}
.hdr-btn,.back-btn{background:#E8F3FD;color:#185FA5}
.header-right{display:flex;align-items:center;gap:6px;flex-wrap:nowrap;overflow-x:auto}
.header-right a,.header-right button{
  display:inline-flex!important;align-items:center!important;justify-content:center!important;
  gap:4px!important;white-space:nowrap!important;flex-shrink:0!important;
  padding:6px 12px!important;height:34px!important;
  border-radius:10px!important;border:1.5px solid transparent!important;
  font-size:13px!important;font-weight:700!important;
  cursor:pointer!important;text-decoration:none!important;
  font-family:inherit!important;transition:all .15s!important;
  box-sizing:border-box!important;
}
.cal-nav{background:#E8F3FD;color:#185FA5}
.zoom-btn.active{background:#185FA5;border-color:#185FA5}
.settings-title{color:#185FA5}
.settings-btn{background:#185FA5}
.card-view-btn{background:#E8F3FD;color:#185FA5;border-color:#B5D4F4}
.card-edit-btn{background:#EEE8FD;color:#7F77DD;border-color:#CECBF6}
.ai-title{color:#185FA5}
.ai-bubble-bot{background:#E8F3FD;color:#185FA5;border-color:#B5D4F4}
.ai-send{background:#185FA5}
/* 카테고리 관리 */
.cat-section{background:#fff;border-radius:14px;border:1.5px solid #B5D4F4;padding:14px;margin-bottom:12px}
.cat-section-title{font-size:14px;font-weight:800;color:#185FA5;margin-bottom:10px}
.cat-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:10px;background:#EEF5FD;margin-bottom:6px;font-size:13px;font-weight:600;color:#0c3d6e}
.cat-item-del{width:26px;height:26px;border-radius:50%;background:#fff;color:#e24b4a;border:1.5px solid #f5c1c1;font-size:14px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.cat-add-row{display:flex;gap:8px;margin-top:8px}
.cat-add-input{flex:1;height:42px;border-radius:12px;border:1.5px solid #B5D4F4;background:#EEF5FD;padding:0 12px;font-size:13px;color:#0c3d6e;outline:none}
.cat-add-input:focus{border-color:#185FA5}
.cat-add-btn{padding:0 16px;height:42px;border-radius:12px;background:#185FA5;color:#fff;border:none;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.cat-empty{font-size:12px;color:#888;padding:6px 0}
</style>
</head>

<div class="toast" id="toast"></div>
<script src="shared.js?v=20260617"></script>
<script>
let items=[], cats=[], currentTags=[], editImages=[], editingId=null;
let calYear, calMonth, calZoom='md', currentDetailId=null;

document.addEventListener('DOMContentLoaded', async()=>{
  cats = JSON.parse(localStorage.getItem('lk_cats')||'[]');
  setupTheme();
  setupTabs([], tab=>{
    if(tab==='cal') renderCal();
    if(tab==='settings') renderSettings();
  });
  setupCalNav(); setupAI();
  const now=new Date(); calYear=now.getFullYear(); calMonth=now.getMonth();
  await loadData();
  renderList(); renderCatChips(); renderSettings();

  document.getElementById('linkSearch').oninput = renderList;
  document.getElementById('sortSel').onchange = renderList;
  document.getElementById('addBtn').onclick = ()=>openEdit();
  document.getElementById('editClose').onclick = closeEdit;
  document.getElementById('editModal').onclick = e=>{if(e.target===document.getElementById('editModal'))closeEdit()};
  document.getElementById('saveBtn').onclick = saveItem;

  // 이미지
  document.getElementById('imgCamBtn').onclick = ()=>{ document.getElementById('fImgFile').setAttribute('capture','environment'); document.getElementById('fImgFile').click(); };
  document.getElementById('imgGalBtn').onclick = ()=>{ document.getElementById('fImgFile').removeAttribute('capture'); document.getElementById('fImgFile').click(); };
  document.getElementById('fImgFile').onchange = e=>{ if(e.target.files[0]) addImageFromFile(e.target.files[0], editImages, renderImgPreview); };
  document.getElementById('imgPasteBtn').onclick = ()=>pasteImageClipboard(editImages, renderImgPreview);
  document.addEventListener('paste', e=>{
    if(!document.getElementById('editModal').classList.contains('open')) return;
    for(const i of (e.clipboardData?.items||[])){ if(i.type.startsWith('image/')){addImageFromFile(i.getAsFile(),editImages,renderImgPreview);break;} }
  });

  // 상세
  document.getElementById('detailClose').onclick = ()=>document.getElementById('detailModal').classList.remove('open');
  document.getElementById('detailModal').onclick = e=>{if(e.target===document.getElementById('detailModal'))document.getElementById('detailModal').classList.remove('open')};
  document.getElementById('detailEdit').onclick = ()=>{ document.getElementById('detailModal').classList.remove('open'); openEdit(currentDetailId); };
  document.getElementById('detailDelete').onclick = deleteItem;

  // 카테고리 추가
  document.getElementById('addCatBtn').onclick = addCat;
  document.getElementById('newCatInput').onkeydown = e=>{ if(e.key==='Enter') addCat(); };

  // 설정
  document.getElementById('saveApiKey').onclick = ()=>{ const k=document.getElementById('apiKeyInput').value.trim(); if(!k) return; localStorage.setItem('lr_apiKey',k); document.getElementById('apiKeyInput').value=''; toast('API 키 저장 ✓'); };
  document.getElementById('manualBackup').onclick = ()=>doBackup('lk',()=>({items,cats}));
  document.getElementById('exportJsonBtn').onclick = ()=>exportJson({items,cats},'links_backup.json');
  document.getElementById('darkModeToggle').onchange = toggleDark;

  // 인라인 카테고리 추가/삭제
  document.getElementById('inlineAddCat').onclick = ()=>{
    const n = prompt('새 카테고리 이름을 입력하세요');
    if(!n||!n.trim()) return;
    const v = n.trim();
    if(cats.includes(v)){ toast('이미 있는 카테고리예요'); return; }
    cats.push(v); saveCats(); renderCatSelect(); renderCatChips();
    document.getElementById('fCat').value = v;
    toast(v+' 추가 완료 ✓');
  };
  document.getElementById('inlineDelCat').onclick = ()=>{
    const v = document.getElementById('fCat').value;
    if(!v){ toast('삭제할 카테고리를 먼저 선택해주세요'); return; }
    if(!confirm('"'+v+'" 카테고리를 삭제할까요?')) return;
    cats = cats.filter(c=>c!==v); saveCats(); renderCatSelect(); renderCatChips();
    toast(v+' 삭제 완료');
  };

  scheduleAutoBackup();
});

function addCat(){
  const inp = document.getElementById('newCatInput');
  const v = inp.value.trim();
  if(!v){ toast('카테고리 이름을 입력해주세요'); return; }
  if(cats.includes(v)){ toast('이미 있는 카테고리예요'); return; }
  cats.push(v); saveCats(); inp.value='';
  renderSettings(); renderCatChips(); renderCatSelect();
  toast('카테고리 추가 완료 ✓');
}
function delCat(i){
  if(!confirm(`"${cats[i]}" 카테고리를 삭제할까요?`)) return;
  cats.splice(i,1); saveCats();
  renderSettings(); renderCatChips(); renderCatSelect();
  toast('삭제 완료');
}
window.delCat = delCat;

async function loadData(){ items = await fsGet('lk_items'); }

function getPlatform(url){
  if(!url) return 'etc';
  if(url.includes('instagram.com')) return 'insta';
  if(url.includes('youtube.com')||url.includes('youtu.be')) return 'yt';
  return 'etc';
}
function platEmoji(p){ return p==='insta'?'🟣':p==='yt'?'🔴':'🔗'; }
function platClass(p){ return p==='insta'?'badge-insta':p==='yt'?'badge-yt':'badge-etc'; }

function renderList(){
  renderCatChips();
  const q=(document.getElementById('linkSearch').value||'').toLowerCase();
  const cat=document.getElementById('catChips').dataset.active||'all';
  const sort=document.getElementById('sortSel').value;
  let arr=[...items];
  if(q) arr=arr.filter(i=>(i.title||'').toLowerCase().includes(q)||(i.url||'').toLowerCase().includes(q)||(i.memo||'').toLowerCase().includes(q));
  if(cat!=='all') arr=arr.filter(i=>i.cat===cat);
  if(sort==='newest') arr.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  else if(sort==='oldest') arr.sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
  else if(sort==='name') arr.sort((a,b)=>(a.title||'').localeCompare(b.title||''));
  else if(sort==='fav') arr.sort((a,b)=>(b.fav?1:0)-(a.fav?1:0));
  document.getElementById('listCount').textContent=arr.length+'개';
  const list=document.getElementById('linkList');
  if(!arr.length){ list.innerHTML='<div class="empty-state"><div class="empty-emoji">🔗</div><div class="empty-text">저장된 링크가 없어요</div></div>'; return; }
  list.innerHTML=arr.map(it=>{
    const p=getPlatform(it.url);
    const tags=Array.isArray(it.tags)?it.tags:[];
    const imgs=Array.isArray(it.images)?it.images:[];
    const tagsHtml=tags.map((t,i)=>`<span class="tag ${tagColor(i)}">${esc(t)}</span>`).join('');
    const catHtml=it.cat?`<span class="tag tag-bl">${esc(it.cat)}</span>`:'';
    const imgHtml=imgs.length?`<img class="card-img" src="${imgs[0]}" alt="">`:'';
    return `<div class="item-card" onclick="openDetail('${it.id}')">
      <div class="card-top">
        <div class="platform-badge ${platClass(p)}">${platEmoji(p)}</div>
        <div class="card-info">
          <div class="card-title">${esc(it.title||'제목 없음')}</div>
          <div class="card-sub" style="color:#4a7ab5">${esc((it.url||'').slice(0,45))}</div>
        </div>
        <span class="card-fav" onclick="event.stopPropagation();toggleFav('${it.id}')">${it.fav?'⭐':'☆'}</span>
      </div>
      <div class="card-meta">${catHtml}${tagsHtml}<span class="card-date" style="color:#185FA5">${formatDate(it.createdAt)}</span></div>
      ${it.memo?`<div class="card-memo">${esc(it.memo)}</div>`:''}
      ${imgHtml}
      <div class="card-actions">
        <button class="card-view-btn" onclick="event.stopPropagation();openLink('${esc(it.url||'')}')">🔗 열기</button>
        <button class="card-edit-btn" onclick="event.stopPropagation();openEdit('${it.id}')">✏️ 수정</button>
        <button class="card-del-btn" onclick="event.stopPropagation();quickDelete('${it.id}')">🗑️ 삭제</button>
      </div>
    </div>`;
  }).join('');
}

function renderCatChips(){
  const wrap=document.getElementById('catChips');
  const active=wrap.dataset.active||'all';
  wrap.innerHTML='';
  const all=document.createElement('div');
  all.className='chip chip-all'; all.textContent='전체';
  all.onclick=()=>{ wrap.dataset.active='all'; renderList(); };
  wrap.appendChild(all);
  cats.forEach(c=>{
    const ch=document.createElement('div');
    ch.className='chip chip-item'+(active===c?' active':'');
    ch.textContent=c;
    ch.onclick=()=>{ wrap.dataset.active=c; renderList(); };
    wrap.appendChild(ch);
  });
}
function saveCats(){ localStorage.setItem('lk_cats', JSON.stringify(cats)); }
function renderCatSelect(){
  document.getElementById('fCat').innerHTML='<option value="">카테고리 선택</option>'+cats.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');
}

function renderImgPreview(){
  document.getElementById('imgPreview').innerHTML=editImages.map((img,i)=>`
    <div class="img-preview-item"><img src="${img}" alt="">
    <button class="img-del-btn" onclick="editImages.splice(${i},1);renderImgPreview()">✕</button></div>`).join('');
}

function openEdit(id=null){
  editingId=id; currentTags=[]; editImages=[];
  document.getElementById('editModalTitle').textContent=id?'🔗 링크 수정':'🔗 링크 추가';
  renderCatSelect();
  if(id){
    const it=items.find(x=>x.id===id);
    if(it){
      document.getElementById('fUrl').value=it.url||'';
      document.getElementById('fTitle').value=it.title||'';
      document.getElementById('fCat').value=it.cat||'';
      document.getElementById('fMemo').value=it.memo||'';
      document.getElementById('fFav').checked=it.fav||false;
      currentTags=Array.isArray(it.tags)?[...it.tags]:[];
      editImages=Array.isArray(it.images)?[...it.images]:[];
    }
  } else {
    ['fUrl','fTitle','fMemo'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('fCat').value='';
    document.getElementById('fFav').checked=false;
  }
  renderTagInput(); renderImgPreview();
  document.getElementById('editModal').classList.add('open');
}
function closeEdit(){ document.getElementById('editModal').classList.remove('open'); }

function renderTagInput(){
  const wrap=document.getElementById('tagWrap'); wrap.innerHTML='';
  currentTags.forEach((t,i)=>{
    const chip=document.createElement('span'); chip.className='tag-chip';
    chip.innerHTML=`${esc(t)}<button class="tag-chip-del" onclick="currentTags.splice(${i},1);renderTagInput()">✕</button>`;
    wrap.appendChild(chip);
  });
  const inp=document.createElement('input'); inp.className='tag-input-field'; inp.placeholder='태그 입력 후 Enter';
  inp.onkeydown=e=>{
    if((e.key==='Enter'||e.key===',')&&inp.value.trim()){ e.preventDefault(); const v=inp.value.trim(); if(!currentTags.includes(v)){currentTags.push(v);renderTagInput();}else inp.value=''; }
    if(e.key==='Backspace'&&!inp.value&&currentTags.length){ currentTags.pop(); renderTagInput(); }
  };
  wrap.appendChild(inp);
}

async function saveItem(){
  const url=document.getElementById('fUrl').value.trim();
  if(!url){ toast('URL을 입력해주세요'); return; }
  const id=editingId||genId();
  const existing=editingId?items.find(x=>x.id===editingId):null;
  const data={url, title:document.getElementById('fTitle').value.trim()||url, cat:document.getElementById('fCat').value, memo:document.getElementById('fMemo').value.trim(), fav:document.getElementById('fFav').checked, tags:currentTags, images:editImages, createdAt:existing?.createdAt||Date.now(), updatedAt:Date.now()};
  if(!await fsSet('lk_items',id,data)){ toast('저장 실패'); return; }
  if(editingId){ const idx=items.findIndex(x=>x.id===editingId); if(idx>=0)items[idx]={id,...data}; }
  else items.unshift({id,...data});
  closeEdit(); renderList(); renderCal(); toast('저장 완료 ✓');
}

async function toggleFav(id){ const it=items.find(x=>x.id===id); if(!it)return; it.fav=!it.fav; await fsSet('lk_items',id,it); renderList(); }
async function quickDelete(id){ if(!confirm('삭제할까요?'))return; await fsDelete('lk_items',id); items=items.filter(x=>x.id!==id); renderList(); renderCal(); toast('삭제 완료'); }

function openDetail(id){
  const it=items.find(x=>x.id===id); if(!it)return; currentDetailId=id;
  const p=getPlatform(it.url);
  const tags=Array.isArray(it.tags)?it.tags:[];
  const imgs=Array.isArray(it.images)?it.images:[];
  document.getElementById('detailTitle').textContent=platEmoji(p)+' '+(it.title||'링크');
  document.getElementById('detailBody').innerHTML=`
    ${imgs.map(img=>`<img class="detail-img" src="${img}" alt="">`).join('')}
    <div class="detail-section">
      <div class="detail-section-title">URL</div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <span style="font-size:13px;color:#185FA5;word-break:break-all;flex:1">${esc(it.url)}</span>
        <button onclick="openLink('${esc(it.url)}')" style="padding:6px 14px;border-radius:10px;background:#185FA5;color:#fff;border:none;font-size:12px;font-weight:700;cursor:pointer">${p==='insta'?'인스타 열기':p==='yt'?'유튜브 열기':'링크 열기'}</button>
      </div>
    </div>
    ${it.cat||tags.length?`<div class="detail-section">${it.cat?`<span class="tag tag-bl">${esc(it.cat)}</span> `:''} ${tags.map((t,i)=>`<span class="tag ${tagColor(i)}">${esc(t)}</span>`).join(' ')}</div>`:''}
    ${it.memo?`<div class="detail-section"><div class="detail-section-title">메모</div><div style="font-size:13px;line-height:1.6;white-space:pre-wrap">${esc(it.memo)}</div></div>`:''}
    <div style="font-size:11px;color:var(--txt2)">저장일: ${formatDateFull(it.createdAt)}</div>`;
  document.getElementById('detailModal').classList.add('open');
}
async function deleteItem(){ if(!confirm('삭제할까요?'))return; await fsDelete('lk_items',currentDetailId); items=items.filter(x=>x.id!==currentDetailId); document.getElementById('detailModal').classList.remove('open'); renderList(); renderCal(); toast('삭제 완료'); }

function setupCalNav(){
  const now=new Date(); calYear=now.getFullYear(); calMonth=now.getMonth();
  document.getElementById('calPrev').onclick=()=>{calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCal();};
  document.getElementById('calNext').onclick=()=>{calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCal();};
  ['Sm','Md','Lg'].forEach(z=>document.getElementById('zoom'+z).onclick=()=>{calZoom=z.toLowerCase();document.querySelectorAll('.zoom-btn').forEach(b=>b.classList.remove('active'));document.getElementById('zoom'+z).classList.add('active');renderCal();});
  document.getElementById('calDetailClose').onclick=()=>{document.getElementById('calDetail').style.display='none';};
}
function renderCal(){
  document.getElementById('calMonthLabel').textContent=`${calYear}년 ${calMonth+1}월`;
  renderCalendarBase({year:calYear,month:calMonth,items,getDateStr:it=>tsToDate(it.createdAt),getEntries:it=>it.title||'링크',getEntryClass:()=>'link-entry',onDayClick:'openCalDay',zoomClass:calZoom});
  const mc=items.filter(i=>i.createdAt&&new Date(i.createdAt).getFullYear()===calYear&&new Date(i.createdAt).getMonth()===calMonth).length;
  document.getElementById('calStats').innerHTML=`<div class="cal-stats-row"><div class="cal-stat-box pk"><span class="cal-stat-num">${mc}</span><div class="cal-stat-label">이번달</div></div><div class="cal-stat-box lv"><span class="cal-stat-num">${items.length}</span><div class="cal-stat-label">전체</div></div></div>`;
}
window.openCalDay=dateStr=>{
  const day=items.filter(i=>tsToDate(i.createdAt)===dateStr); if(!day.length)return;
  document.getElementById('calDetailDate').textContent='📅 '+dateStr;
  document.getElementById('calDetailList').innerHTML=day.map(i=>`<div class="cal-detail-item" onclick="openDetail('${i.id}')"><span>${platEmoji(getPlatform(i.url))}</span><span class="cal-detail-name" style="color:#185FA5">${esc(i.title||'링크')}</span></div>`).join('');
  document.getElementById('calDetail').style.display='block';
};

function setupAI(){
  document.getElementById('aiSend').onclick=sendAI;
  document.getElementById('aiInput').onkeydown=e=>{if(e.key==='Enter')sendAI();};
}
async function sendAI(){
  const q=document.getElementById('aiInput').value.trim(); if(!q)return;
  const key=localStorage.getItem('lr_apiKey');
  if(!key){appendBubble('설정 탭에서 API 키를 입력해주세요 🔑','bot');return;}
  appendBubble(q,'user'); document.getElementById('aiInput').value='';
  const loading=appendBubble('생각 중...','bot');
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:800,system:`링크 컬렉션 검색 도우미. 데이터: ${JSON.stringify(items.map(i=>({title:i.title,url:i.url,cat:i.cat,tags:i.tags,memo:i.memo})))}`,messages:[{role:'user',content:q}]})});
    loading.remove(); if(!res.ok){appendBubble('오류. API 키 확인해주세요.','bot');return;}
    const d=await res.json(); appendBubble(d.content?.[0]?.text||'답변 없음','bot');
  }catch{loading.remove();appendBubble('네트워크 오류','bot');}
}
function appendBubble(text,type){
  const chat=document.getElementById('aiChat'); const div=document.createElement('div');
  div.className='ai-bubble ai-bubble-'+(type==='user'?'user':'bot');
  if(type==='user')div.style.marginLeft='auto';
  div.textContent=text; chat.appendChild(div); chat.scrollTop=chat.scrollHeight; return div;
}

function renderSettings(){
  const wrap=document.getElementById('catManage');
  if(!cats.length){ wrap.innerHTML='<div class="cat-empty">카테고리가 없어요. 아래에서 추가해주세요.</div>'; return; }
  wrap.innerHTML=cats.map((c,i)=>`
    <div class="cat-item">
      <span>${esc(c)}</span>
      <button class="cat-item-del" onclick="delCat(${i})">✕</button>
    </div>`).join('');
  document.getElementById('statsArea').innerHTML=`
    <div class="stat-item"><span>전체 링크</span><span class="stat-val" style="color:#185FA5">${items.length}개</span></div>
    <div class="stat-item"><span>즐겨찾기</span><span class="stat-val" style="color:#185FA5">${items.filter(i=>i.fav).length}개</span></div>
    <div class="stat-item"><span>인스타</span><span class="stat-val" style="color:#185FA5">${items.filter(i=>getPlatform(i.url)==='insta').length}개</span></div>
    <div class="stat-item"><span>유튜브</span><span class="stat-val" style="color:#185FA5">${items.filter(i=>getPlatform(i.url)==='yt').length}개</span></div>`;
  renderBackupList();
}
async function renderBackupList(){
  const all=await fsGet('lk_backups'); all.sort((a,b)=>(b.timestamp||0)-(a.timestamp||0));
  document.getElementById('backupList').innerHTML=all.slice(0,5).map(b=>`<div class="backup-item"><span>${formatDateFull(b.timestamp)}</span><button class="backup-restore-btn" onclick="restoreBackup('${b.id}')">복원</button></div>`).join('')||'<div style="font-size:12px;color:var(--txt2)">백업 없음</div>';
}
window.restoreBackup=async id=>{ if(!confirm('복원할까요?'))return; const all=await fsGet('lk_backups'); const b=all.find(x=>x.id===id); if(!b)return; try{const s=JSON.parse(b.snap);items=s.data.items||[];cats=s.data.cats||[];saveCats();renderList();renderSettings();toast('복원 완료 ✓');}catch{toast('복원 실패');} };
function scheduleAutoBackup(){ const lb=parseInt(localStorage.getItem('lk_lastBackup')||'0'); if(Date.now()-lb>7*24*60*60*1000)setTimeout(()=>doBackup('lk',()=>({items,cats})),5000); }
</script>
</body>
