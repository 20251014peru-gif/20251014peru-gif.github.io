<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>사진 스캔</title>
<link rel="stylesheet" href="photos-scan.css?v=11.5-1781601657">
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/heic2any/0.0.4/heic2any.min.js"></script>
</head>
<body>

<!-- 헤더 -->
<header id="appHeader">
  <div class="hdr-left">
    <span class="hdr-title" id="appTitle">📷 사진 스캔</span>
    <span class="hdr-ver" id="appVersion">v11.3</span>
  </div>
  <div class="hdr-right">
    <button class="hbtn" id="btnHome"   title="홈">🏠</button>
    <button class="hbtn" id="btnBackup" title="백업">☁️</button>
    <button class="hbtn" id="btnApiKey" title="AI 키">🔑</button>
    <button class="hbtn" id="btnCatMgr" title="카테고리">📂</button>
    <button class="hbtn" id="btnExpBak" title="내보내기">⬇️</button>
    <button class="hbtn" id="btnImpBak" title="불러오기">⬆️</button>
    <button class="hbtn" id="btnDbg"   title="디버그" onclick="toggleDbg()">🐞</button>
  </div>
</header>

<!-- 메인 -->
<main id="mainWrap">
  <!-- 상단바: 섹션탭 + 카테고리 드롭다운 + 검색 + 추가 -->
  <div id="topBar">
    <!-- 섹션 탭: 일반 / 스캔 / 보안 -->
    <div id="sectionTabs">
      <button class="stab active" data-sec="normal">📷 일반</button>
      <button class="stab" data-sec="scan">📄 스캔</button>
      <button class="stab" data-sec="secure">🔒 보안</button>
    </div>
    <!-- 카테고리 드롭다운 + 검색 + 추가 한 줄 -->
    <div id="filterRow">
      <div class="cat-drop-wrap">
        <button id="btnCatDrop" class="cat-drop-btn">
          <span id="catDropLabel">전체</span> ▾
        </button>
        <div id="catDropMenu" style="display:none"></div>
      </div>
      <div id="searchInline">
        <span class="search-ic">🔍</span>
        <input id="gallerySearch" placeholder="검색">
        <button id="btnAiSearch">🤖</button>
      </div>
      <button class="add-btn" id="btnAdd">＋ 추가</button>
    </div>
  </div>
  <!-- 갤러리 그리드 -->
  <div id="photoGrid">
    <div id="emptyState">
      <div style="font-size:48px">📷</div>
      <p>사진을 추가하세요</p>
    </div>
  </div>
</main>

<!-- 파일 입력 -->
<input type="file" id="fGallery"  accept="image/*,.heic" multiple style="display:none">
<input type="file" id="fCamera"   accept="image/*" capture="environment" multiple style="display:none">
<input type="file" id="fScanCam"  accept="image/*" capture="environment" style="display:none">
<input type="file" id="fScanGal"  accept="image/*,.heic" style="display:none">
<input type="file" id="fMoreGal"  accept="image/*,.heic" multiple style="display:none">
<input type="file" id="fMoreCam"  accept="image/*" capture="environment" style="display:none">
<input type="file" id="fBackup"   accept=".json" style="display:none">

<!-- 연속촬영 오버레이 -->
<div id="burstOv" style="display:none">
  <div id="burstCount">0장</div>
  <div id="burstThumbs"></div>
  <div id="burstBtns">
    <button id="burstAdd">📷 추가촬영</button>
    <button id="burstDone">✓ 완료·저장</button>
    <button id="burstCancel">✕ 취소</button>
  </div>
</div>

<!-- ===== 사진 추가/수정 모달 ===== -->
<div class="overlay" id="modalAdd" style="display:none">
  <div class="modal" id="modalAddBox">
    <div class="modal-hdr">
      <span id="addModalTitle">사진 추가</span>
      <button class="xbtn" id="btnAddClose">✕</button>
    </div>
    <!-- 추가 탭: 일반사진 / 스캔 / 보안사진 -->
    <div id="addTabs">
      <button class="atab active" data-tab="normal">📷 일반사진</button>
      <button class="atab" data-tab="scan">📄 스캔</button>
      <button class="atab" data-tab="secure">🔒 보안사진</button>
    </div>
    <div class="modal-body">
      <!-- 미리보기 -->
      <div id="previewArea">
        <div id="slides"><div class="noimg">사진 없음</div></div>
        <div id="slideNav">
          <button class="navbtn" id="btnPrev">‹</button>
          <span id="slideCnt">0/0</span>
          <button class="navbtn" id="btnNext">›</button>
          <button class="smBtn" id="btnSlideRotL" title="반시계">↺</button>
          <button class="smBtn" id="btnSlideRotR" title="시계">↻</button>
          <button class="smBtn" id="btnZoom">🔍</button>
          <button class="smBtn" id="btnMoreCam">📷</button>
          <button class="smBtn" id="btnMoreGal">🖼️</button>
          <button class="smBtn red" id="btnDelSlide">🗑</button>
        </div>
      </div>
      <!-- 탭별 사진 선택 버튼 -->
      <div id="addPhotoRow">
        <!-- 일반사진 -->
        <div class="add-photo-btns" id="normalPhotoBtns">
          <button class="mini-btn blue" id="btnPhotoCamera">📷 카메라</button>
          <button class="mini-btn purple" id="btnPhotoGallery">🖼️ 갤러리</button>
        </div>
        <!-- 스캔 -->
        <div class="add-photo-btns" id="scanPhotoBtns" style="display:none">
          <button class="mini-btn green" id="btnScanCamera">📷 카메라 스캔</button>
          <button class="mini-btn purple" id="btnScanGallery">🖼️ 갤러리 스캔</button>
          <button id="btnAiCrop" class="mini-btn orange">📄 문서 자동감지</button>
          <span id="aiStatus" style="font-size:12px;color:#64748b"></span>
        </div>
        <!-- 보안사진 -->
        <div class="add-photo-btns" id="securePhotoBtns" style="display:none">
          <button class="mini-btn blue" id="btnSecCam">📷 카메라</button>
          <button class="mini-btn purple" id="btnSecGal">🖼️ 갤러리</button>
          <span style="font-size:12px;color:#f59e0b;font-weight:600">🔒 비밀번호로 보호됩니다</span>
        </div>
      </div>
      <!-- 폼 — 메모 먼저, 그 다음 카테고리+날짜 -->
      <div class="frow">
        <label>제목 <span class="req">*</span></label>
        <input id="fTitle" placeholder="사진 제목">
      </div>
      <div class="frow">
        <label>메모</label>
        <textarea id="fMemo" rows="2" placeholder="메모..."></textarea>
      </div>
      <div class="frow-row">
        <div class="frow" style="flex:1">
          <label>카테고리</label>
          <div class="cat-row">
            <select id="fCat"></select>
            <button id="btnCatAdd2">＋</button>
            <button id="btnCatDel2">✕</button>
          </div>
        </div>
        <div class="frow" style="min-width:130px">
          <label>날짜</label>
          <input type="date" id="fDate">
        </div>
      </div>
      <!-- 이동 버튼 (수정 모드일 때만 표시) -->
      <div id="moveSectionRow" style="display:none">
        <span style="font-size:13px;font-weight:600;color:#64748b">다른 섹션으로 이동:</span>
        <button class="mini-btn blue" id="btnMoveNormal">📷 일반</button>
        <button class="mini-btn green" id="btnMoveScan">📄 스캔</button>
        <button class="mini-btn orange" id="btnMoveSecure">🔒 보안</button>
      </div>
    </div>
    <div class="modal-ftr">
      <button class="ftr-cam" id="btnFootCam">📷</button>
      <button class="ftr-gal" id="btnFootGal">🖼️</button>
      <button class="btn-sec" id="btnEdit">✏️ 편집</button>
      <button class="btn-pri" id="btnSave">💾 저장</button>
    </div>
  </div>
</div>

<!-- ===== 편집 모달 ===== -->
<div class="overlay" id="modalEdit" style="display:none">
  <div class="modal fullModal">
    <div class="modal-hdr">
      <span>사진 편집</span>
      <div class="hdr-btns">
        <button class="smBtn2" id="btnUndo">↩ 되돌리기</button>
        <button class="xbtn" id="btnEditClose">✕</button>
      </div>
    </div>
    <!-- 툴바 -->
    <div id="editToolbar">
      <button class="tbtn" data-t="crop">✂</button>
      <button class="tbtn" data-t="text">T</button>
      <button class="tbtn" data-t="rect">▭</button>
      <button class="tbtn" data-t="circle">◯</button>
      <button class="tbtn" data-t="arrow">→</button>
      <button class="tbtn" data-t="draw">✏</button>
      <button class="tbtn" data-t="mosaic">⬛</button>
      <div class="tsep"></div>
      <input type="color" id="tColor" value="#FF0000" title="색상">
      <select id="tSize">
        <option value="2">얇게</option>
        <option value="5" selected>보통</option>
        <option value="10">굵게</option>
      </select>
      <select id="mosaicSz" style="display:none">
        <option value="20">작게</option>
        <option value="40" selected>보통</option>
        <option value="80">크게</option>
      </select>
      <div class="tsep"></div>
      <button class="tbtn" id="btnRotL" title="반시계">↺</button>
      <button class="tbtn" id="btnRotR" title="시계">↻</button>
      <button class="tbtn red" id="btnDelObj" title="선택 삭제">🗑</button>
      <button class="tbtn red" id="btnClearAll" title="전체 초기화">🧹</button>
      <button class="tbtn-save" id="btnEditDone2">💾 저장</button>
    </div>
    <!-- 캔버스 -->
    <div id="canvasWrap">
      <div id="canvasInner">
        <canvas id="editCanvas"></canvas>
      </div>
      <div id="cropBtns" style="display:none">
        <button id="btnCropApply">✂ 크롭 적용</button>
        <button id="btnCropCancel">취소</button>
      </div>
    </div>
    <!-- 텍스트 입력 -->
    <div id="textRow" style="display:none">
      <input id="textInp" placeholder="텍스트 입력">
      <button id="btnAddTxt">추가</button>
    </div>
  </div>
</div>

<!-- ===== 문서감지 풀스크린 ===== -->
<div id="docScanFs" style="display:none">
  <canvas id="docScanCanvas"></canvas>
  <button id="btnDsClose" class="ds-floating-x">✕</button>
  <button id="btnDsApply" class="ds-floating-apply">✅ 이 영역으로 크롭</button>
</div>

<!-- ===== 상세보기 풀스크린 ===== -->
<div id="viewFs" style="display:none">
  <div id="viewHdr">
    <span id="viewTitle"></span>
    <div>
      <button class="dsbtn" id="btnVShare">📤</button>
      <button class="dsbtn" id="btnVMove">↗ 이동</button>
      <button class="dsbtn" id="btnVEdit">✏️ 편집</button>
      <button class="dsbtn dsbtn-del" id="btnVDel">🗑</button>
      <button class="dsbtn" id="btnVClose">✕</button>
    </div>
  </div>
  <!-- 핀치줌 가능한 이미지 영역 -->
  <div id="viewImgWrap">
    <div id="viewImgInner">
      <img id="viewImg" src="" alt="">
    </div>
    <!-- 이전/다음 화살표 — 그림자로 항상 보이게 -->
    <button class="vnav" id="btnVPrev">‹</button>
    <button class="vnav" id="btnVNext">›</button>
  </div>
  <!-- 하단 정보 + 슬라이드 인디케이터 -->
  <div id="viewMeta">
    <div id="viewMetaMain">
      <span id="viewCatBadge"></span>
      <span id="viewDateTxt"></span>
      <span id="viewSecBadge"></span>
    </div>
    <p id="viewMemoTxt"></p>
    <!-- 사진 넘기기 인디케이터 -->
    <div id="viewDots"></div>
  </div>
</div>

<!-- 비밀번호 확인 모달 -->
<div class="overlay" id="modalPin" style="display:none">
  <div class="modal smModal">
    <div class="modal-hdr"><span id="pinTitle">🔒 보안 사진</span><button class="xbtn" id="btnPinClose">✕</button></div>
    <div class="modal-body" style="gap:14px">
      <p id="pinDesc" style="font-size:14px;color:#64748b"></p>
      <!-- 크롬 자동완성 차단용 더미 필드 -->
      <input type="text" style="display:none" aria-hidden="true">
      <input type="password" style="display:none" aria-hidden="true">
      <input type="text" id="pinInp" placeholder="비밀번호"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
        inputmode="numeric"
        style="-webkit-text-security:disc;border:2px solid #e2e8f0;border-radius:10px;padding:10px 14px;font-size:16px;outline:none;width:100%;letter-spacing:4px">
      <input type="text" id="pinInp2" placeholder="비밀번호 확인"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
        inputmode="numeric"
        style="-webkit-text-security:disc;border:2px solid #e2e8f0;border-radius:10px;padding:10px 14px;font-size:16px;outline:none;width:100%;letter-spacing:4px;display:none">
      <p id="pinErr" style="color:#ef4444;font-size:13px;display:none"></p>
    </div>
    <div class="modal-ftr"><button class="btn-pri" id="btnPinOk">확인</button></div>
  </div>
</div>

<!-- 이미지 확대 팝업 -->
<div id="imgPopup" style="display:none" onclick="closeImgPopup()">
  <button id="popupClose">✕</button>
  <button class="pnav" id="popupPrev" onclick="event.stopPropagation();popupNav(-1)">‹</button>
  <img id="popupImg" src="" alt="">
  <button class="pnav" id="popupNext" onclick="event.stopPropagation();popupNav(1)">›</button>
</div>

<!-- 카테고리 관리 모달 -->
<div class="overlay" id="modalCat" style="display:none">
  <div class="modal smModal">
    <div class="modal-hdr"><span>📂 카테고리 관리</span><button class="xbtn" id="btnCatClose">✕</button></div>
    <div class="modal-body">
      <div class="cat-add-row">
        <input id="catNewName" placeholder="새 카테고리 이름">
        <button id="btnCatAddOk">추가</button>
      </div>
      <ul id="catList"></ul>
    </div>
  </div>
</div>

<!-- API 키 모달 -->
<div class="overlay" id="modalKey" style="display:none">
  <div class="modal smModal">
    <div class="modal-hdr"><span>🔑 AI API 키</span><button class="xbtn" id="btnKeyClose">✕</button></div>
    <div class="modal-body">
      <p style="font-size:13px;color:#64748b;margin-bottom:10px">Anthropic API 키 (브라우저에만 저장)</p>
      <input type="password" id="apiKeyInp" placeholder="sk-ant-...">
    </div>
    <div class="modal-ftr"><button class="btn-pri" id="btnKeySave">저장</button></div>
  </div>
</div>

<!-- OneDrive 모달 -->
<div class="overlay" id="modalOD" style="display:none">
  <div class="modal smModal">
    <div class="modal-hdr"><span>☁️ OneDrive 백업</span><button class="xbtn" id="btnODClose">✕</button></div>
    <div class="modal-body">
      <div id="odStatus" style="padding:12px;background:#f0f6ff;border-radius:10px;font-size:13px;min-height:50px">준비됨</div>
    </div>
    <div class="modal-ftr">
      <button class="btn-sec" id="btnODLocal">⬇️ 로컬 저장</button>
      <button class="btn-pri" id="btnODUpload">☁️ OneDrive</button>
    </div>
  </div>
</div>

<!-- AI 검색 드롭다운 -->
<div id="aiDrop" style="display:none">
  <div id="aiDropHdr"><span>🤖 AI 검색 결과</span><button onclick="closeAiDrop()">✕</button></div>
  <div id="aiDropBody"></div>
</div>

<!-- 스캔 로딩 -->
<div id="scanLoader" style="display:none">
  <div id="scanLoaderBox">
    <div style="font-size:40px;animation:spin 1s linear infinite">🤖</div>
    <p id="scanLoaderMsg">문서 감지 중...</p>
  </div>
</div>

<!-- 🐞 디버그 -->
<button id="dbgBtn" onclick="toggleDbg()" style="display:none">🐞</button>
<div id="dbgPanel" style="display:none">
  <div id="dbgHdr">
    <span>🐞 디버그 로그</span>
    <div>
      <button onclick="copyDbg()">📋 복사</button>
      <button onclick="clearDbg()">🗑 비우기</button>
      <button onclick="toggleDbg()">✕</button>
    </div>
  </div>
  <div id="dbgBody"></div>
</div>

<div id="toast"></div>

<script src="photos-scan.js?v=11.5-1781601657"></script>
</body>
</html>
