<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>📷 사진 스캔</title>
<link rel="stylesheet" href="photos-scan.css?v=20260616e">
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/heic2any/0.0.4/heic2any.min.js"></script>
<!-- OpenCV.js: 문서 자동감지용 -->
<script async src="https://cdn.jsdelivr.net/npm/opencv.js@1.2.1/opencv.js" onload="onOpenCvReady()" onerror="onOpenCvError()"></script>
</head>
<body>

<header class="app-header">
  <div class="header-left">
    <button class="btn-icon" id="btnMenu">☰</button>
    <div class="header-title-wrap">
      <h1 class="app-title" id="appTitle">📷 사진 스캔</h1>
      <span class="app-version" id="appVersion">v5.3</span>
    </div>
  </div>
  <div class="header-right">
    <button class="btn-icon" id="btnSearch" title="AI검색">🔍</button>
    <button class="btn-icon" id="btnBackup" title="클라우드백업">☁️</button>
    <button class="btn-icon" id="btnSettings" title="설정">⚙️</button>
  </div>
</header>

<div class="side-overlay" id="sideOverlay"></div>
<nav class="side-menu" id="sideMenu">
  <div class="side-header">
    <span id="sideTitle">메뉴</span>
    <button class="btn-icon" id="btnMenuClose">✕</button>
  </div>
  <div class="side-body">
    <button class="menu-item active" data-view="gallery">🖼️ 갤러리</button>
    <hr>
    <button class="menu-item" id="mnuApiKey">🔑 AI API 키 설정</button>
    <button class="menu-item" id="mnuBackupExport">⬇️ 백업 내보내기</button>
    <button class="menu-item" id="mnuBackupImport">⬆️ 백업 불러오기</button>
    <hr>
    <a class="menu-item" href="index.html">🏠 홈으로</a>
  </div>
</nav>

<main class="main-content">
  <section class="view active" id="viewGallery">
    <div class="filter-bar">
      <div class="filter-chips" id="filterChips"></div>
      <button class="btn-chip-add" id="btnAddCat" title="카테고리 추가">＋</button>
    </div>
    <div class="action-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="gallerySearch" placeholder="제목·메모 검색...">
      </div>
      <button class="btn-add-cam" id="btnCamera" title="카메라 촬영 (자동스캔)">📷</button>
      <button class="btn-add-gal" id="btnGallery" title="갤러리 선택">🖼️</button>
    </div>
    <div class="photo-grid" id="photoGrid">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">📷</div>
        <p>📷 카메라로 찍으면 자동 스캔됩니다<br>🖼️ 갤러리에서 불러올 수도 있어요</p>
      </div>
    </div>
  </section>
</main>

<!-- 파일 입력 -->
<input type="file" id="fileInputGallery" accept="image/*,.heic" multiple style="display:none">
<input type="file" id="fileInputCamera"  accept="image/*" capture="environment" style="display:none">
<input type="file" id="addMoreGal"       accept="image/*,.heic" multiple style="display:none">
<input type="file" id="addMoreCam"       accept="image/*" capture="environment" style="display:none">
<input type="file" id="backupInput"      accept=".json" style="display:none">

<!-- 사진 추가/수정 모달 -->
<div class="modal-bg" id="modalAdd">
  <div class="modal modal-add">
    <div class="modal-header">
      <span id="modalAddTitle">사진 추가</span>
      <button class="btn-icon" id="btnModalAddClose">✕</button>
    </div>
    <div class="modal-body">
      <div class="img-preview-area">
        <div class="img-slides" id="imgSlides">
          <div class="no-img-placeholder">사진 없음</div>
        </div>
        <div class="img-nav">
          <button class="btn-icon" id="btnSlidePrev">‹</button>
          <span id="slideCount">0 / 0</span>
          <button class="btn-icon" id="btnSlideNext">›</button>
          <button class="btn-icon-sm" id="btnAddMoreCam" title="카메라">📷</button>
          <button class="btn-icon-sm" id="btnAddMoreGal" title="갤러리">🖼️</button>
          <button class="btn-icon-sm danger" id="btnDelImg" title="삭제">🗑</button>
        </div>
      </div>
      <div class="ai-crop-row">
        <button class="btn-ai" id="btnAiCrop">📄 문서 자동감지 (OpenCV)</button>
        <span class="ai-status" id="aiCropStatus"></span>
      </div>
      <div class="form-row">
        <label>제목</label>
        <input type="text" id="photoTitle" placeholder="사진 제목">
      </div>
      <div class="form-row">
        <label>카테고리</label>
        <div class="cat-select-row">
          <select id="photoCat" class="cat-select"></select>
          <button class="btn-cat-add" id="btnInlineCatAdd" title="카테고리 추가">＋</button>
          <button class="btn-cat-del" id="btnInlineCatDel" title="현재 카테고리 삭제">✕</button>
        </div>
      </div>
      <div class="form-row">
        <label>메모</label>
        <textarea id="photoMemo" rows="3" placeholder="메모..."></textarea>
      </div>
      <div class="form-row">
        <label>날짜</label>
        <input type="date" id="photoDate">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" id="btnEditPhoto">✏️ 편집</button>
      <button class="btn-primary"   id="btnSavePhoto">💾 저장</button>
    </div>
  </div>
</div>

<!-- AI 스캔 오버레이 -->
<div class="scan-overlay-modal" id="scanOverlay" style="display:none">
  <div class="scan-overlay-box">
    <div class="scan-spinner">📄</div>
    <p id="scanOverlayMsg">문서 자동 감지 중...</p>
  </div>
</div>

<!-- ===== OpenCV 문서감지 모달 ===== -->
<div class="modal-bg" id="modalDocScan">
  <div class="modal modal-docscan">
    <div class="modal-header">
      <span>📄 문서 자동감지</span>
      <button class="btn-icon" id="btnDocScanClose">✕</button>
    </div>
    <div class="docscan-body">
      <!-- 캔버스: 꼭짓점 표시 + 조정 -->
      <div class="docscan-canvas-wrap" id="docScanWrap">
        <canvas id="docScanCanvas"></canvas>
        <!-- 4개 드래그 핸들 -->
        <div class="corner-handle" id="ch0"></div>
        <div class="corner-handle" id="ch1"></div>
        <div class="corner-handle" id="ch2"></div>
        <div class="corner-handle" id="ch3"></div>
      </div>
      <p class="docscan-hint">꼭짓점을 드래그해서 정밀하게 조정하세요</p>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" id="btnDocScanRetry">🔄 다시 감지</button>
      <button class="btn-primary"   id="btnDocScanApply">✅ 이 영역으로 크롭</button>
    </div>
  </div>
</div>

<!-- 편집 모달 -->
<div class="modal-bg" id="modalEdit">
  <div class="modal modal-edit">
    <div class="modal-header">
      <span>✏️ 사진 편집</span>
      <div class="edit-header-tools">
        <button class="btn-sm btn-secondary" id="btnEditUndo">↩ 취소</button>
        <button class="btn-sm btn-primary"   id="btnEditDone">✓ 완료</button>
        <button class="btn-icon"             id="btnEditClose">✕</button>
      </div>
    </div>
    <div class="edit-body">
      <div class="edit-toolbar">
        <button class="tool-btn active" data-tool="select" title="선택">↖️</button>
        <button class="tool-btn" data-tool="crop"   title="자르기">✂️</button>
        <button class="tool-btn" data-tool="text"   title="텍스트">🔤</button>
        <button class="tool-btn" data-tool="rect"   title="사각형">⬜</button>
        <button class="tool-btn" data-tool="circle" title="원">⭕</button>
        <button class="tool-btn" data-tool="arrow"  title="화살표">➡️</button>
        <button class="tool-btn" data-tool="draw"   title="그리기">✏️</button>
        <button class="tool-btn" data-tool="mosaic" title="모자이크(드래그)">🟫</button>
        <div class="tool-sep"></div>
        <label class="tool-label">색상</label>
        <input type="color" id="toolColor" value="#FF0000">
        <label class="tool-label">굵기</label>
        <select id="toolSize">
          <option value="2">얇게</option>
          <option value="5" selected>보통</option>
          <option value="10">굵게</option>
          <option value="20">매우굵게</option>
        </select>
        <label class="tool-label" id="lblMosaic" style="display:none">모자이크크기</label>
        <select id="mosaicSize" style="display:none">
          <option value="20">작게</option>
          <option value="40" selected>보통</option>
          <option value="70">크게</option>
          <option value="100">매우크게</option>
        </select>
        <div class="tool-sep"></div>
        <button class="tool-btn" id="btnRotateL" title="왼쪽 90° 회전">↺</button>
        <button class="tool-btn" id="btnRotateR" title="오른쪽 90° 회전">↻</button>
        <div class="tool-sep"></div>
        <button class="tool-btn danger" id="btnDelObj" title="삭제">🗑️</button>
      </div>
      <div class="canvas-wrapper" id="canvasWrapper">
        <canvas id="editCanvas"></canvas>
      </div>
      <div class="crop-controls hidden" id="cropControls">
        <button class="btn-sm btn-primary"   id="btnApplyCrop">크롭 적용</button>
        <button class="btn-sm btn-secondary" id="btnCancelCrop">취소</button>
        <span class="crop-hint">드래그로 영역 선택</span>
      </div>
      <div class="text-input-row hidden" id="textInputRow">
        <input type="text" id="textInput" placeholder="텍스트 입력">
        <button class="btn-sm btn-primary" id="btnAddText">추가</button>
      </div>
    </div>
  </div>
</div>

<!-- 상세 보기 모달 -->
<!-- 상세보기: 전체화면 -->
<div class="view-fullscreen" id="modalView" style="display:none">
  <div class="vf-header">
    <span class="vf-title" id="viewTitle"></span>
    <div class="vf-btns">
      <button class="vf-btn" id="btnViewShare">📤</button>
      <button class="vf-btn" id="btnViewEdit">✏️</button>
      <button class="vf-btn" id="btnViewDelete">🗑️</button>
      <button class="vf-btn" id="btnViewClose">✕</button>
    </div>
  </div>
  <div class="vf-img-wrap">
    <button class="vf-nav" id="btnViewPrev">‹</button>
    <img id="viewImg" src="" alt="">
    <button class="vf-nav" id="btnViewNext">›</button>
  </div>
  <div class="vf-meta">
    <span class="badge" id="viewCat"></span>
    <span class="view-date" id="viewDate"></span>
    <p id="viewMemo"></p>
  </div>
</div>

<!-- AI 검색 패널 -->
<div class="panel-bg" id="panelSearch">
  <div class="side-panel">
    <div class="panel-header">
      <span>🔍 AI 검색</span>
      <button class="btn-icon" id="btnSearchClose">✕</button>
    </div>
    <div class="panel-body">
      <textarea id="aiSearchQuery" rows="3" placeholder="예: 지난달 영수증 찾아줘&#10;계약서 목록 보여줘"></textarea>
      <button class="btn-primary" id="btnAiSearch">🤖 AI 검색</button>
      <div id="aiSearchResult" class="ai-result"></div>
    </div>
  </div>
</div>

<!-- API키 모달 -->
<div class="modal-bg" id="modalApiKey">
  <div class="modal modal-sm">
    <div class="modal-header">
      <span>🔑 AI API 키 설정</span>
      <button class="btn-icon" id="btnApiKeyClose">✕</button>
    </div>
    <div class="modal-body">
      <p class="hint-text">Anthropic API 키 (브라우저에만 저장, 개인·업무 공용)</p>
      <input type="password" id="apiKeyInput" placeholder="sk-ant-...">
    </div>
    <div class="modal-footer">
      <button class="btn-primary" id="btnSaveApiKey">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="photos-scan.js?v=20260616d"></script>
</body>
</html>
