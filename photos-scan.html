<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>📷 사진 스캔</title>
<link rel="stylesheet" href="photos-scan.css?v=20260616">
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/heic2any/0.0.4/heic2any.min.js"></script>
</head>
<body>

<!-- ===== 헤더 ===== -->
<header class="app-header">
  <div class="header-left">
    <button class="btn-icon" id="btnMenu" title="메뉴">☰</button>
    <h1 class="app-title">📷 사진 스캔</h1>
  </div>
  <div class="header-right">
    <button class="btn-icon" id="btnSearch" title="AI 검색">🔍</button>
    <button class="btn-icon" id="btnBackup" title="백업">☁️</button>
    <button class="btn-icon" id="btnSettings" title="설정">⚙️</button>
  </div>
</header>

<!-- ===== 사이드 메뉴 ===== -->
<div class="side-overlay" id="sideOverlay"></div>
<nav class="side-menu" id="sideMenu">
  <div class="side-header">
    <span>메뉴</span>
    <button class="btn-icon" id="btnMenuClose">✕</button>
  </div>
  <div class="side-body">
    <button class="menu-item active" data-view="gallery">🖼️ 갤러리</button>
    <button class="menu-item" data-view="scan">📄 문서 스캔</button>
    <button class="menu-item" data-view="categories">📂 카테고리</button>
    <hr>
    <button class="menu-item" id="mnuApiKey">🔑 AI API 키 설정</button>
    <button class="menu-item" id="mnuBackupExport">⬇️ 백업 내보내기</button>
    <button class="menu-item" id="mnuBackupImport">⬆️ 백업 불러오기</button>
  </div>
</nav>

<!-- ===== 메인 뷰 ===== -->
<main class="main-content">

  <!-- 갤러리 뷰 -->
  <section class="view active" id="viewGallery">
    <!-- 필터 바 -->
    <div class="filter-bar">
      <div class="filter-chips" id="filterChips">
        <button class="chip active" data-cat="all">전체</button>
      </div>
      <div class="filter-actions">
        <button class="btn-sm btn-primary" id="btnAddPhoto">＋ 사진 추가</button>
      </div>
    </div>
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" id="gallerySearch" placeholder="제목·메모 검색..." />
    </div>
    <!-- 갤러리 그리드 -->
    <div class="photo-grid" id="photoGrid">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">📷</div>
        <p>사진이 없습니다.<br>+ 사진 추가 버튼을 눌러 시작하세요.</p>
      </div>
    </div>
  </section>

  <!-- 스캔 카메라 뷰 (hidden) -->
  <section class="view" id="viewScan">
    <div class="scan-container">
      <video id="scanVideo" autoplay playsinline></video>
      <div class="scan-overlay">
        <div class="scan-frame"></div>
        <p class="scan-hint">문서를 프레임 안에 맞춰주세요</p>
      </div>
      <div class="scan-controls">
        <button class="btn-icon-lg" id="btnSwitchCam">🔄</button>
        <button class="btn-capture" id="btnCapture">📷</button>
        <button class="btn-icon-lg" id="btnScanClose">✕</button>
      </div>
    </div>
  </section>

  <!-- 카테고리 관리 뷰 -->
  <section class="view" id="viewCategories">
    <div class="cat-manage">
      <h2>카테고리 관리</h2>
      <div class="cat-add-row">
        <input type="text" id="catNewName" placeholder="새 카테고리 이름" />
        <button class="btn-primary" id="btnCatAdd">추가</button>
      </div>
      <ul class="cat-list" id="catList"></ul>
    </div>
  </section>

</main>

<!-- ===== 숨겨진 파일 입력 ===== -->
<input type="file" id="fileInput" accept="image/*,.heic" multiple style="display:none">
<input type="file" id="backupInput" accept=".json" style="display:none">

<!-- ===== 사진 추가/수정 모달 ===== -->
<div class="modal-bg" id="modalAdd">
  <div class="modal modal-add">
    <div class="modal-header">
      <span id="modalAddTitle">사진 추가</span>
      <button class="btn-icon" id="btnModalAddClose">✕</button>
    </div>
    <div class="modal-body">
      <!-- 이미지 미리보기 슬라이더 -->
      <div class="img-preview-area">
        <div class="img-slides" id="imgSlides"></div>
        <div class="img-nav">
          <button class="btn-icon" id="btnSlidePrev">‹</button>
          <span id="slideCount">0 / 0</span>
          <button class="btn-icon" id="btnSlideNext">›</button>
          <button class="btn-sm" id="btnAddMoreImg">＋ 사진 추가</button>
          <button class="btn-sm btn-danger" id="btnDelImg">🗑 삭제</button>
        </div>
      </div>
      <!-- AI 스마트 크롭 버튼 -->
      <div class="ai-crop-row">
        <button class="btn-ai" id="btnAiCrop">🤖 AI 문서 자동 감지 & 크롭</button>
        <span class="ai-status" id="aiCropStatus"></span>
      </div>
      <!-- 메타데이터 -->
      <div class="form-row">
        <label>제목</label>
        <input type="text" id="photoTitle" placeholder="사진 제목" />
      </div>
      <div class="form-row">
        <label>카테고리</label>
        <select id="photoCat"></select>
      </div>
      <div class="form-row">
        <label>메모</label>
        <textarea id="photoMemo" rows="3" placeholder="메모를 입력하세요..."></textarea>
      </div>
      <div class="form-row">
        <label>날짜</label>
        <input type="date" id="photoDate" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" id="btnEditPhoto">✏️ 편집</button>
      <button class="btn-primary" id="btnSavePhoto">저장</button>
    </div>
  </div>
</div>

<!-- ===== 편집 모달 ===== -->
<div class="modal-bg" id="modalEdit">
  <div class="modal modal-edit">
    <div class="modal-header">
      <span>사진 편집</span>
      <div class="edit-header-tools">
        <button class="btn-sm btn-secondary" id="btnEditUndo">↩ 실행취소</button>
        <button class="btn-sm btn-primary" id="btnEditDone">✓ 완료</button>
        <button class="btn-icon" id="btnEditClose">✕</button>
      </div>
    </div>
    <div class="modal-body edit-body">
      <!-- 툴바 -->
      <div class="edit-toolbar">
        <button class="tool-btn active" data-tool="select" title="선택">↖</button>
        <button class="tool-btn" data-tool="crop" title="자르기">✂</button>
        <button class="tool-btn" data-tool="text" title="텍스트">T</button>
        <button class="tool-btn" data-tool="rect" title="사각형">⬜</button>
        <button class="tool-btn" data-tool="circle" title="원">⬭</button>
        <button class="tool-btn" data-tool="draw" title="그리기">✏</button>
        <button class="tool-btn" data-tool="mosaic" title="모자이크">⬛</button>
        <div class="tool-sep"></div>
        <input type="color" id="toolColor" value="#FF0000" title="색상">
        <select id="toolSize" title="크기">
          <option value="2">얇게</option>
          <option value="4" selected>보통</option>
          <option value="8">굵게</option>
          <option value="16">매우굵게</option>
        </select>
        <div class="tool-sep"></div>
        <button class="tool-btn" id="btnDelObj" title="삭제">🗑</button>
      </div>
      <!-- 캔버스 -->
      <div class="canvas-wrapper" id="canvasWrapper">
        <canvas id="editCanvas"></canvas>
      </div>
      <!-- 크롭 컨트롤 -->
      <div class="crop-controls hidden" id="cropControls">
        <button class="btn-sm btn-primary" id="btnApplyCrop">크롭 적용</button>
        <button class="btn-sm btn-secondary" id="btnCancelCrop">취소</button>
        <span class="crop-hint">드래그로 영역 선택</span>
      </div>
      <!-- 텍스트 입력 -->
      <div class="text-input-row hidden" id="textInputRow">
        <input type="text" id="textInput" placeholder="텍스트를 입력하세요" />
        <button class="btn-sm btn-primary" id="btnAddText">추가</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== 상세 보기 모달 ===== -->
<div class="modal-bg" id="modalView">
  <div class="modal modal-view">
    <div class="modal-header">
      <span id="viewTitle"></span>
      <div>
        <button class="btn-icon" id="btnViewEdit">✏️</button>
        <button class="btn-icon" id="btnViewDelete">🗑</button>
        <button class="btn-icon" id="btnViewClose">✕</button>
      </div>
    </div>
    <div class="view-img-area">
      <button class="btn-icon view-nav" id="btnViewPrev">‹</button>
      <img id="viewImg" src="" alt="">
      <button class="btn-icon view-nav" id="btnViewNext">›</button>
    </div>
    <div class="view-meta">
      <div class="view-cat-date">
        <span class="badge" id="viewCat"></span>
        <span id="viewDate"></span>
      </div>
      <p id="viewMemo"></p>
    </div>
  </div>
</div>

<!-- ===== AI 검색 패널 ===== -->
<div class="panel-bg" id="panelSearch">
  <div class="side-panel">
    <div class="panel-header">
      <span>🔍 AI 검색</span>
      <button class="btn-icon" id="btnSearchClose">✕</button>
    </div>
    <div class="panel-body">
      <div class="ai-search-input">
        <textarea id="aiSearchQuery" rows="3" placeholder="예: 지난달 영수증 찾아줘&#10;강남 관련 문서는?&#10;계약서 목록 보여줘"></textarea>
        <button class="btn-primary" id="btnAiSearch">🤖 AI 검색</button>
      </div>
      <div id="aiSearchResult" class="ai-result"></div>
    </div>
  </div>
</div>

<!-- ===== API 키 모달 ===== -->
<div class="modal-bg" id="modalApiKey">
  <div class="modal modal-sm">
    <div class="modal-header">
      <span>🔑 AI API 키 설정</span>
      <button class="btn-icon" id="btnApiKeyClose">✕</button>
    </div>
    <div class="modal-body">
      <p class="hint-text">Anthropic API 키를 입력하세요. 브라우저에만 저장됩니다.</p>
      <input type="password" id="apiKeyInput" placeholder="sk-ant-..." />
    </div>
    <div class="modal-footer">
      <button class="btn-primary" id="btnSaveApiKey">저장</button>
    </div>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script src="photos-scan.js?v=20260616"></script>
</body>
</html>
