<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부동산 투자 관리</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#F0F0F5;color:#1A1A2E;font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;min-height:100vh;font-size:14px;}
.hdr{background:#fff;border-bottom:1px solid #E5E7EB;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
.hdr-title{font-size:17px;font-weight:800;letter-spacing:-0.5px;}
.hdr-sub{font-size:10px;color:#9CA3AF;margin-top:1px;}
.hdr-right{display:flex;gap:8px;align-items:center;}
.home-btn{font-size:12px;padding:5px 12px;background:#F3F4F6;border:none;border-radius:8px;cursor:pointer;color:#374151;text-decoration:none;}
.ver{font-size:10px;color:#9CA3AF;}

.tabs{display:flex;gap:0;background:#fff;border-bottom:2px solid #E5E7EB;padding:0 16px;overflow-x:auto;}
.tabs button{flex-shrink:0;padding:10px 14px;border:none;background:none;font-size:13px;font-weight:600;color:#9CA3AF;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;}
.tabs button.active{color:#059669;border-bottom-color:#059669;}

.panel{display:none;padding:14px 16px;max-width:700px;margin:0 auto;}
.panel.active{display:block;}

/* 입력폼 */
.form-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:14px;border:1px solid #E5E7EB;}
.form-card h3{font-size:14px;font-weight:700;margin-bottom:12px;color:#059669;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.field label{font-size:11px;color:#6B7280;font-weight:600;}
.field input,.field select,.field textarea{border:1px solid #E5E7EB;border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;background:#FAFAFA;}
.field textarea{resize:vertical;min-height:60px;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#059669;background:#fff;}
.btn-add{width:100%;padding:11px;background:#059669;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;}
.btn-add:active{background:#047857;}

/* 합산 카드 */
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.sum-card{background:#fff;border-radius:12px;padding:14px;border:1px solid #E5E7EB;text-align:center;}
.sum-card .label{font-size:11px;color:#9CA3AF;margin-bottom:4px;}
.sum-card .value{font-size:18px;font-weight:800;color:#059669;}
.sum-card .sub{font-size:11px;color:#6B7280;margin-top:2px;}

/* 카테고리별 */
.cat-list{background:#fff;border-radius:12px;padding:12px;margin-bottom:14px;border:1px solid #E5E7EB;}
.cat-list h4{font-size:12px;font-weight:700;color:#374151;margin-bottom:10px;}
.cat-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #F9FAFB;}
.cat-row:last-child{border-bottom:none;}
.cat-name{font-size:12px;color:#374151;flex:1;}
.cat-bar-wrap{flex:2;height:6px;background:#F3F4F6;border-radius:3px;overflow:hidden;}
.cat-bar{height:100%;background:#059669;border-radius:3px;}
.cat-amt{font-size:12px;font-weight:700;color:#059669;min-width:70px;text-align:right;}
.cat-pct{font-size:10px;color:#9CA3AF;min-width:30px;text-align:right;}

/* 물건별 */
.place-list{background:#fff;border-radius:12px;padding:12px;margin-bottom:14px;border:1px solid #E5E7EB;}
.place-list h4{font-size:12px;font-weight:700;color:#374151;margin-bottom:10px;}
.place-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #F9FAFB;}
.place-row:last-child{border-bottom:none;}
.place-name{font-size:13px;color:#374151;font-weight:600;}
.place-amt{font-size:13px;font-weight:700;color:#059669;}

/* 기록 테이블 */
.tbl-wrap{overflow-x:auto;background:#fff;border-radius:12px;border:1px solid #E5E7EB;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{background:#F9FAFB;padding:8px 10px;text-align:left;font-weight:700;color:#6B7280;border-bottom:1px solid #E5E7EB;white-space:nowrap;}
td{padding:8px 10px;border-bottom:1px solid #F9FAFB;color:#374151;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.del-i{background:#FEE2E2;color:#DC2626;border:none;border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;}
.memo-i{font-size:11px;color:#9CA3AF;margin-top:2px;}

/* 체크리스트 */
.chk-input-row{display:flex;gap:8px;margin-bottom:12px;}
.chk-input-row input{flex:1;border:1px solid #E5E7EB;border-radius:8px;padding:9px 12px;font-size:13px;font-family:inherit;}
.chk-input-row button{padding:9px 16px;background:#059669;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;}
.chk-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fff;border-radius:10px;margin-bottom:6px;border:1px solid #E5E7EB;}
.chk-item.done .chk-text{text-decoration:line-through;color:#9CA3AF;}
.chk-cb{width:20px;height:20px;cursor:pointer;accent-color:#059669;}
.chk-text{flex:1;font-size:13px;}
.chk-date{font-size:10px;color:#9CA3AF;}
.chk-del{background:none;border:none;color:#D1D5DB;font-size:16px;cursor:pointer;padding:0 4px;}
.chk-del:hover{color:#DC2626;}
.copy-btn{padding:7px 14px;background:#F3F4F6;border:1px solid #E5E7EB;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;color:#374151;}
.copy-btn:active{background:#E5E7EB;}

/* 메모 */
.memo-tabs{display:flex;gap:8px;margin-bottom:12px;}
.memo-tab{padding:7px 16px;border:1.5px solid #E5E7EB;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:#6B7280;}
.memo-tab.on{background:#059669;color:#fff;border-color:#059669;}
.memo-area{width:100%;min-height:100px;border:1px solid #E5E7EB;border-radius:10px;padding:10px;font-size:13px;font-family:inherit;resize:vertical;background:#FAFAFA;}
.memo-area:focus{outline:none;border-color:#059669;background:#fff;}
.memo-save-btn{margin-top:8px;padding:9px 20px;background:#059669;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;}
.memo-list-item{background:#fff;border-radius:10px;padding:11px 13px;margin-bottom:8px;border:1px solid #E5E7EB;}
.memo-list-item .meta{display:flex;justify-content:space-between;margin-bottom:5px;}
.memo-list-item .dt{font-size:11px;color:#9CA3AF;}
.memo-list-item .txt{font-size:13px;color:#374151;line-height:1.6;white-space:pre-wrap;user-select:text;}

/* 달력 */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-nav button{padding:6px 14px;border:1px solid #E5E7EB;background:#fff;border-radius:8px;font-size:13px;cursor:pointer;}
.cal-nav .ym{font-size:16px;font-weight:800;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;background:#fff;border-radius:12px;border:1px solid #E5E7EB;overflow:hidden;margin-bottom:14px;}
.cal-head{text-align:center;font-size:11px;font-weight:700;color:#6B7280;padding:8px 0;background:#F9FAFB;}
.cal-head:first-child{color:#EF4444;}
.cal-head:last-child{color:#3B82F6;}
.cal-day{min-height:52px;padding:4px;background:#fff;border:0.5px solid #F3F4F6;cursor:pointer;}
.cal-day:hover{background:#F0FDF4;}
.cal-day.today .cal-num{background:#059669;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
.cal-day.other .cal-num{color:#D1D5DB;}
.cal-num{font-size:12px;font-weight:600;margin-bottom:2px;}
.cal-dot{font-size:9px;color:#059669;font-weight:700;}
.cal-day-detail{background:#fff;border-radius:12px;border:1px solid #E5E7EB;padding:14px;margin-bottom:14px;}
.cal-day-detail h4{font-size:13px;font-weight:700;margin-bottom:10px;color:#059669;}

/* 동기화 상태 */
.sync-bar{text-align:right;font-size:10px;color:#9CA3AF;padding:4px 0 8px;}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-title">🏠 부동산 투자 관리</div>
    <div class="hdr-sub">비용기록 · 합산 · 체크리스트 · 메모</div>
  </div>
  <div class="hdr-right">
    <span class="ver">v3.0</span>
    <a class="home-btn" href="./index.html">← 홈</a>
  </div>
</div>

<div class="tabs" id="tabs">
  <button data-tab="cost" class="active">💰 비용입력</button>
  <button data-tab="sum">📊 합산보기</button>
  <button data-tab="log">📋 기록</button>
  <button data-tab="checklist">✅ 준비물</button>
  <button data-tab="memo">📝 메모</button>
  <button data-tab="cal">📅 달력</button>
</div>

<!-- 비용입력 -->
<div class="panel active" id="panel-cost">
  <div class="form-card">
    <h3>💰 비용 입력</h3>
    <div class="row2">
      <div class="field"><label>날짜</label><input type="date" id="c-date"></div>
      <div class="field"><label>물건/장소</label><input type="text" id="c-place" placeholder="예: 군산 나운현대2차"></div>
    </div>
    <div class="row2">
      <div class="field"><label>카테고리</label>
        <select id="c-cat">
          <optgroup label="이동/생활">
            <option>가스충전</option><option>톨비</option><option>식비</option>
            <option>관리비</option><option>은행이자</option>
          </optgroup>
          <optgroup label="공사/시공">
            <option>목공사</option><option>설비</option><option>타일공사</option>
            <option>욕실악세사리</option><option>전기</option><option>인테리어</option>
            <option>샷시</option><option>페인트</option><option>도배장판</option>
            <option>시트지</option><option>전체악세사리</option>
          </optgroup>
          <optgroup label="법무/행정">
            <option>등기</option><option>공구</option>
          </optgroup>
          <optgroup label="기타">
            <option>기타</option>
          </optgroup>
        </select>
      </div>
      <div class="field"><label>금액 (원)</label><input type="number" id="c-amount" placeholder="숫자만"></div>
    </div>
    <div class="field"><label>시각</label><input type="time" id="c-time"></div>
    <div class="field"><label>메모 (선택)</label><textarea id="c-memo" placeholder="업체명, 내용, 특이사항 등"></textarea></div>
    <button class="btn-add" onclick="addCost()">+ 비용 추가</button>
  </div>
  <div class="sync-bar" id="cost-sync"></div>
</div>

<!-- 합산보기 -->
<div class="panel" id="panel-sum">
  <div id="sum-content"></div>
</div>

<!-- 기록 -->
<div class="panel" id="panel-log">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
    <span style="font-size:13px;font-weight:700;color:#374151" id="log-count"></span>
    <button class="copy-btn" onclick="copyTable()">📋 복사(엑셀용)</button>
  </div>
  <div class="tbl-wrap">
    <table id="log-table">
      <thead><tr><th>날짜</th><th>시각</th><th>물건/장소</th><th>카테고리</th><th>금액</th><th>메모</th><th></th></tr></thead>
      <tbody id="log-body"></tbody>
    </table>
  </div>
</div>

<!-- 준비물 체크리스트 -->
<div class="panel" id="panel-checklist">
  <div class="chk-input-row">
    <input type="text" id="chk-input" placeholder="준비물 항목 입력" onkeydown="if(event.key==='Enter')addChk()">
    <button onclick="addChk()">+ 추가</button>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
    <span style="font-size:12px;color:#6B7280" id="chk-count"></span>
    <button class="copy-btn" onclick="copyChk()">📋 텍스트 복사</button>
  </div>
  <div id="chk-list"></div>
  <div class="sync-bar" id="chk-sync"></div>
</div>

<!-- 메모 -->
<div class="panel" id="panel-memo">
  <div class="memo-tabs">
    <button class="memo-tab on" onclick="setMemoTab('general',this)">📝 일반메모</button>
    <button class="memo-tab" onclick="setMemoTab('cost',this)">💰 비용메모</button>
  </div>
  <div id="memo-input-area">
    <textarea class="memo-area" id="memo-text" placeholder="자유롭게 메모하세요"></textarea>
    <button class="memo-save-btn" onclick="saveMemo()">저장</button>
  </div>
  <div style="margin-top:14px" id="memo-list"></div>
  <div class="sync-bar" id="memo-sync"></div>
</div>

<!-- 달력 -->
<div class="panel" id="panel-cal">
  <div class="cal-nav">
    <button onclick="calMove(-1)">‹</button>
    <span class="ym" id="cal-ym"></span>
    <button onclick="calMove(1)">›</button>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
  <div id="cal-detail"></div>
</div>

<script>
/* ===== Firebase REST API ===== */
var FB_KEY = 'AIzaSyAyG1chECYsbO7cSZUuXmNa0_KDYBmahPY';
var FB_PROJECT = 'my-system-25497';
var FB_BASE = 'https://firestore.googleapis.com/v1/projects/'+FB_PROJECT+'/databases/(default)/documents/';

function toFS(val){
  if(Array.isArray(val)) return {arrayValue:{values:val.map(function(v){return toFS(v);})}};
  if(typeof val==='object'&&val!==null) return {mapValue:{fields:Object.fromEntries(Object.entries(val).map(function(e){return [e[0],toFS(e[1])]}))}};
  if(typeof val==='number') return {doubleValue:val};
  if(typeof val==='boolean') return {booleanValue:val};
  if(val===null||val===undefined) return {nullValue:null};
  return {stringValue:String(val)};
}
function fromFS(v){
  if(!v) return null;
  if('stringValue' in v){ try{return JSON.parse(v.stringValue);}catch(e){return v.stringValue;} }
  if('doubleValue' in v) return v.doubleValue;
  if('integerValue' in v) return Number(v.integerValue);
  if('booleanValue' in v) return v.booleanValue;
  if('nullValue' in v) return null;
  if('arrayValue' in v) return (v.arrayValue.values||[]).map(fromFS);
  if('mapValue' in v){ var o={}; Object.entries(v.mapValue.fields||{}).forEach(function(e){o[e[0]]=fromFS(e[1]);}); return o; }
  return null;
}
function fbSave(col, doc, data){
  var fields={};
  Object.entries(data).forEach(function(e){ fields[e[0]]=toFS(e[1]); });
  return fetch(FB_BASE+col+'/'+doc+'?key='+FB_KEY,{
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({fields:fields})
  }).then(function(r){return r.json();});
}
function fbGet(col, doc){
  return fetch(FB_BASE+col+'/'+doc+'?key='+FB_KEY)
    .then(function(r){return r.ok?r.json():null;})
    .then(function(d){ if(!d||!d.fields) return null; var o={}; Object.entries(d.fields).forEach(function(e){o[e[0]]=fromFS(e[1]);}); return o; });
}

/* ===== 로컬 키 ===== */
var CK='re_costs', CHK='re_chk', MK='re_memos', CMK='re_costmemos';
var _memoTab='general';

/* ===== 날짜/시각 헬퍼 ===== */
function todayKR(){
  var n=new Date(); var off=n.getTimezoneOffset();
  var kr=new Date(n.getTime()+(9*60+off)*60000);
  return kr.getFullYear()+'-'+String(kr.getMonth()+1).padStart(2,'0')+'-'+String(kr.getDate()).padStart(2,'0');
}
function nowTimeKR(){
  var n=new Date(); var off=n.getTimezoneOffset();
  var kr=new Date(n.getTime()+(9*60+off)*60000);
  return String(kr.getHours()).padStart(2,'0')+':'+String(kr.getMinutes()).padStart(2,'0');
}
function fmtAmt(n){ return Number(n).toLocaleString()+'원'; }

/* ===== 비용 ===== */
function getCosts(){ try{return JSON.parse(localStorage.getItem(CK)||'[]');}catch(e){return [];} }
function saveCostsLocal(arr){ localStorage.setItem(CK,JSON.stringify(arr)); }
function syncCosts(arr){
  fbSave('re-costs','main',{data:JSON.stringify(arr)})
    .then(function(){setSync('cost-sync','✅ 동기화됨');})
    .catch(function(){setSync('cost-sync','⚠ 오프라인 저장');});
}
function setSync(id,msg){ var el=document.getElementById(id); if(el) el.textContent=msg; }

function addCost(){
  var date=document.getElementById('c-date').value;
  var place=document.getElementById('c-place').value.trim();
  var cat=document.getElementById('c-cat').value;
  var amount=Number(document.getElementById('c-amount').value);
  var time=document.getElementById('c-time').value;
  var memo=document.getElementById('c-memo').value.trim();
  if(!date||!amount){alert('날짜와 금액을 입력하세요.');return;}
  var costs=getCosts();
  costs.push({id:Date.now(),date:date,time:time,place:place,cat:cat,amount:amount,memo:memo});
  costs.sort(function(a,b){return (b.date+b.time).localeCompare(a.date+a.time);});
  saveCostsLocal(costs);
  syncCosts(costs);
  document.getElementById('c-amount').value='';
  document.getElementById('c-memo').value='';
  renderAll();
  alert('저장됐습니다!');
}

function deleteCost(id){
  if(!confirm('삭제할까요?')) return;
  var costs=getCosts().filter(function(c){return c.id!==id;});
  saveCostsLocal(costs); syncCosts(costs); renderAll();
}

/* ===== 합산/기록 렌더 ===== */
function renderSum(){
  var costs=getCosts();
  var total=costs.reduce(function(s,c){return s+Number(c.amount);},0);
  // 카테고리별
  var byC={}; costs.forEach(function(c){byC[c.cat]=(byC[c.cat]||0)+Number(c.amount);});
  var catRows=Object.entries(byC).sort(function(a,b){return b[1]-a[1];}).map(function(e){
    var pct=total?Math.round(e[1]/total*100):0;
    return '<div class="cat-row"><span class="cat-name">'+e[0]+'</span>'+
      '<div class="cat-bar-wrap"><div class="cat-bar" style="width:'+pct+'%"></div></div>'+
      '<span class="cat-amt">'+fmtAmt(e[1])+'</span><span class="cat-pct">'+pct+'%</span></div>';
  }).join('');
  // 물건별
  var byP={}; costs.forEach(function(c){if(c.place) byP[c.place]=(byP[c.place]||0)+Number(c.amount);});
  var placeRows=Object.entries(byP).sort(function(a,b){return b[1]-a[1];}).map(function(e){
    return '<div class="place-row"><span class="place-name">'+e[0]+'</span><span class="place-amt">'+fmtAmt(e[1])+'</span></div>';
  }).join('') || '<div style="color:#9CA3AF;font-size:12px;padding:8px">물건/장소 미입력</div>';

  document.getElementById('sum-content').innerHTML=
    '<div class="sum-grid">'+
      '<div class="sum-card"><div class="label">총 누적 비용</div><div class="value">'+fmtAmt(total)+'</div><div class="sub">'+costs.length+'건</div></div>'+
      '<div class="sum-card"><div class="label">항목 수</div><div class="value">'+costs.length+'</div><div class="sub">'+Object.keys(byC).length+'개 카테고리</div></div>'+
    '</div>'+
    '<div class="cat-list"><h4>카테고리별 합산</h4>'+catRows+'</div>'+
    '<div class="place-list"><h4>물건/장소별 합산</h4>'+placeRows+'</div>';
}

function renderLog(){
  var costs=getCosts();
  document.getElementById('log-count').textContent='총 '+costs.length+'건 / '+fmtAmt(costs.reduce(function(s,c){return s+Number(c.amount);},0));
  var rows=costs.map(function(c){
    return '<tr>'+
      '<td>'+c.date+'</td>'+
      '<td>'+(c.time||'')+'</td>'+
      '<td>'+(c.place||'')+'</td>'+
      '<td>'+c.cat+'</td>'+
      '<td style="font-weight:700;color:#059669">'+fmtAmt(c.amount)+'</td>'+
      '<td><div>'+(c.memo?'<span class="memo-i">'+esc(c.memo)+'</span>':'')+'</div></td>'+
      '<td><button class="del-i" onclick="deleteCost('+c.id+')">삭제</button></td>'+
    '</tr>';
  }).join('');
  document.getElementById('log-body').innerHTML=rows||'<tr><td colspan="7" style="text-align:center;color:#9CA3AF;padding:20px">기록 없음</td></tr>';
}

function copyTable(){
  var costs=getCosts();
  var txt='날짜\t시각\t물건/장소\t카테고리\t금액\t메모\n'+
    costs.map(function(c){return [c.date,c.time||'',c.place||'',c.cat,c.amount,c.memo||''].join('\t');}).join('\n');
  navigator.clipboard.writeText(txt).then(function(){alert('복사됐습니다. 엑셀에 붙여넣기 하세요.');}).catch(function(){alert('복사 실패');});
}

/* ===== 체크리스트 ===== */
function getChk(){ try{var d=localStorage.getItem(CHK); return Array.isArray(d)?d:(d?JSON.parse(d):[]);}catch(e){return [];} }
function saveChkLocal(arr){ localStorage.setItem(CHK,JSON.stringify(arr)); }
function syncChk(arr){
  fbSave('re-checklist','main',{data:JSON.stringify(arr)})
    .then(function(){setSync('chk-sync','✅ 동기화됨');})
    .catch(function(){setSync('chk-sync','⚠ 오프라인 저장');});
}

function addChk(){
  var txt=document.getElementById('chk-input').value.trim(); if(!txt) return;
  var arr=getChk();
  arr.push({id:Date.now(),text:txt,done:false,date:todayKR()});
  saveChkLocal(arr); syncChk(arr);
  document.getElementById('chk-input').value='';
  renderChk();
}
function toggleChk(id){
  var arr=getChk().map(function(c){return c.id===id?Object.assign({},c,{done:!c.done}):c;});
  saveChkLocal(arr); syncChk(arr); renderChk();
}
function deleteChk(id){
  var arr=getChk().filter(function(c){return c.id!==id;});
  saveChkLocal(arr); syncChk(arr); renderChk();
}
function renderChk(){
  var arr=getChk();
  var done=arr.filter(function(c){return c.done;}).length;
  document.getElementById('chk-count').textContent=arr.length+'개 중 '+done+'개 완료';
  document.getElementById('chk-list').innerHTML=arr.map(function(c){
    return '<div class="chk-item'+(c.done?' done':'')+'">'+
      '<input type="checkbox" class="chk-cb"'+(c.done?' checked':'')+' onchange="toggleChk('+c.id+')">'+
      '<span class="chk-text">'+esc(c.text)+'</span>'+
      '<span class="chk-date">'+c.date+'</span>'+
      '<button class="chk-del" onclick="deleteChk('+c.id+')" title="삭제">×</button>'+
    '</div>';
  }).join('')||'<div style="color:#9CA3AF;font-size:12px;padding:10px">항목 없음</div>';
}
function copyChk(){
  var arr=getChk();
  var txt=arr.map(function(c){return (c.done?'[✓] ':'[ ] ')+c.text;}).join('\n');
  navigator.clipboard.writeText(txt).then(function(){alert('복사됐습니다.');}).catch(function(){alert('복사 실패');});
}

/* ===== 메모 ===== */
function getMemos(type){ try{var k=type==='cost'?CMK:MK; var d=localStorage.getItem(k); return Array.isArray(d)?d:(d?JSON.parse(d):[]);}catch(e){return [];} }
function saveMemoLocal(type,arr){ localStorage.setItem(type==='cost'?CMK:MK,JSON.stringify(arr)); }
function syncMemo(type,arr){
  var col=type==='cost'?'re-costmemos':'re-memos';
  fbSave(col,'main',{data:JSON.stringify(arr)})
    .then(function(){setSync('memo-sync','✅ 동기화됨');})
    .catch(function(){setSync('memo-sync','⚠ 오프라인 저장');});
}
function setMemoTab(type,btn){
  _memoTab=type;
  document.querySelectorAll('.memo-tab').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  renderMemoList();
}
function saveMemo(){
  var txt=document.getElementById('memo-text').value.trim(); if(!txt) return;
  var arr=getMemos(_memoTab);
  var n=new Date(); var off=n.getTimezoneOffset();
  var kr=new Date(n.getTime()+(9*60+off)*60000);
  var date=kr.getFullYear()+'-'+String(kr.getMonth()+1).padStart(2,'0')+'-'+String(kr.getDate()).padStart(2,'0');
  var time=String(kr.getHours()).padStart(2,'0')+':'+String(kr.getMinutes()).padStart(2,'0');
  arr.unshift({id:Date.now(),text:txt,date:date,time:time});
  saveMemoLocal(_memoTab,arr); syncMemo(_memoTab,arr);
  document.getElementById('memo-text').value='';
  renderMemoList();
}
function deleteMemo(type,id){
  var arr=getMemos(type).filter(function(m){return m.id!==id;});
  saveMemoLocal(type,arr); syncMemo(type,arr); renderMemoList();
}
function renderMemoList(){
  var arr=getMemos(_memoTab);
  document.getElementById('memo-list').innerHTML=arr.map(function(m){
    return '<div class="memo-list-item">'+
      '<div class="meta"><span class="dt">'+m.date+' '+m.time+'</span>'+
      '<button class="del-i" onclick="deleteMemo(\''+_memoTab+'\','+m.id+')">삭제</button></div>'+
      '<div class="txt">'+esc(m.text)+'</div>'+
    '</div>';
  }).join('')||'<div style="color:#9CA3AF;font-size:12px;padding:10px">저장된 메모 없음</div>';
}

/* ===== 달력 ===== */
var _calYM;
function calInit(){ var n=new Date(); _calYM={y:n.getFullYear(),m:n.getMonth()}; }
function calMove(d){ _calYM.m+=d; if(_calYM.m<0){_calYM.m=11;_calYM.y--;} if(_calYM.m>11){_calYM.m=0;_calYM.y++;} renderCal(); }
function renderCal(){
  if(!_calYM) calInit();
  var y=_calYM.y, m=_calYM.m;
  document.getElementById('cal-ym').textContent=y+'년 '+(m+1)+'월';
  var costs=getCosts();
  var byDate={};
  costs.forEach(function(c){ if(!byDate[c.date]) byDate[c.date]=[]; byDate[c.date].push(c); });
  var first=new Date(y,m,1).getDay();
  var last=new Date(y,m+1,0).getDate();
  var today=todayKR();
  var cells='';
  var days=['일','월','화','수','목','금','토'];
  days.forEach(function(d){ cells+='<div class="cal-head">'+d+'</div>'; });
  for(var i=0;i<first;i++) cells+='<div class="cal-day other"></div>';
  for(var d=1;d<=last;d++){
    var ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var isToday=ds===today;
    var hasCost=byDate[ds]&&byDate[ds].length;
    cells+='<div class="cal-day'+(isToday?' today':'')+'\" onclick="showCalDay(\''+ds+'\')">'
      +'<div class="cal-num">'+d+'</div>'
      +(hasCost?'<div class="cal-dot">●'+byDate[ds].length+'</div>':'')
      +'</div>';
  }
  document.getElementById('cal-grid').innerHTML=cells;
}
function showCalDay(ds){
  var costs=getCosts().filter(function(c){return c.date===ds;});
  var html='<div class="cal-day-detail"><h4>📅 '+ds+' 지출 내역</h4>';
  if(costs.length){
    var total=costs.reduce(function(s,c){return s+Number(c.amount);},0);
    html+=costs.map(function(c){
      return '<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #F3F4F6">'+
        '<span style="font-size:13px">'+c.cat+(c.place?' · '+c.place:'')+'</span>'+
        '<span style="font-size:13px;font-weight:700;color:#059669">'+fmtAmt(c.amount)+'</span></div>';
    }).join('');
    html+='<div style="text-align:right;margin-top:8px;font-weight:800;color:#059669">합계: '+fmtAmt(total)+'</div>';
  } else { html+='<div style="color:#9CA3AF;font-size:12px">지출 없음</div>'; }
  html+='</div>';
  document.getElementById('cal-detail').innerHTML=html;
}

/* ===== 탭 ===== */
function activateTab(name){
  var btn=document.querySelector('.tabs button[data-tab="'+name+'"]'); if(!btn) return;
  document.querySelectorAll('.tabs button').forEach(function(b){b.classList.remove('active');});
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
  btn.classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
  try{localStorage.setItem('re_invest_tab',name);}catch(e){}
  if(name==='sum') renderSum();
  if(name==='log') renderLog();
  if(name==='checklist') renderChk();
  if(name==='memo') renderMemoList();
  if(name==='cal') renderCal();
}
document.getElementById('tabs').addEventListener('click',function(e){
  var b=e.target.closest('button'); if(!b) return;
  activateTab(b.dataset.tab);
});

/* ===== Firebase에서 불러오기 ===== */
function loadFromFirebase(){
  // 비용
  fbGet('re-costs','main').then(function(doc){
    if(doc&&doc.data){
      var arr=Array.isArray(doc.data)?doc.data:JSON.parse(doc.data);
      localStorage.setItem(CK,JSON.stringify(arr));
      renderAll();
    }
  }).catch(function(){});
  // 체크리스트
  fbGet('re-checklist','main').then(function(doc){
    if(doc&&doc.data){
      var arr=Array.isArray(doc.data)?doc.data:JSON.parse(doc.data);
      localStorage.setItem(CHK,JSON.stringify(arr));
      renderChk();
    }
  }).catch(function(){});
  // 일반메모
  fbGet('re-memos','main').then(function(doc){
    if(doc&&doc.data){
      var arr=Array.isArray(doc.data)?doc.data:JSON.parse(doc.data);
      localStorage.setItem(MK,JSON.stringify(arr));
      if(_memoTab==='general') renderMemoList();
    }
  }).catch(function(){});
  // 비용메모
  fbGet('re-costmemos','main').then(function(doc){
    if(doc&&doc.data){
      var arr=Array.isArray(doc.data)?doc.data:JSON.parse(doc.data);
      localStorage.setItem(CMK,JSON.stringify(arr));
      if(_memoTab==='cost') renderMemoList();
    }
  }).catch(function(){});
}

/* ===== esc ===== */
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ===== renderAll ===== */
function renderAll(){ renderSum(); renderLog(); renderChk(); renderMemoList(); }

/* ===== 초기화 ===== */
(function init(){
  document.getElementById('c-date').value=todayKR();
  document.getElementById('c-time').value=nowTimeKR();
  renderAll(); renderCal();
  loadFromFirebase();
  try{
    var t=localStorage.getItem('re_invest_tab');
    if(t) activateTab(t);
  }catch(e){}
})();
</script>
</body>
