<head>

<!--
  ===== youtube.html 변경 이력 =====
  v1.2 (2026-05-28): 종목 링크를 미국=야후 파이낸스, 한국=네이버 증권으로 분기(인베스팅닷컴 대체).
                     티커 추출에 market(US/KR) 추가, 한국종목은 6자리 코드로 네이버 직접 연결
  v1.1 (2026-05-28): 영상 개별/합쳐서 분석 선택 추가(개별 시 시청기록에 따로 저장),
                     카드형 삭제버튼 확대, 목록형에 링크 열(제목↔분석시간 사이) 추가,
                     핵심단어 목록에 링크 열 추가, 종목 티커 클릭 시 가격사이트 연결, 버전 표기 도입
  v1.0 (이전):        채널분석 · 시청기록(카드/목록) · 핵심단어(목록/빈도) · 종목 워치리스트 · 채널 비교
                     · 검색/정렬/월필터 · MD/JSON 백업 · 중복 감지 · API키 소진 안내
-->

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#F5F5F7;font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;color:#1A1A2E;}
.hdr{background:#fff;border-bottom:1px solid #E5E7EB;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.back{font-size:20px;color:#9CA3AF;text-decoration:none;margin-right:10px;}
.abtn{font-size:11px;padding:5px 12px;border-radius:20px;border:none;cursor:pointer;font-family:inherit;font-weight:600;}
.abtn.on{background:#D1FAE5;color:#059669;}.abtn.off{background:#FEE2E2;color:#DC2626;}
.sync-badge{font-size:10px;padding:3px 8px;border-radius:12px;background:#EDE9FE;color:#6D28D9;font-weight:600;}
.wrap{padding:16px;max-width:720px;margin:0 auto;}
.tnav{display:flex;background:#fff;border:1px solid #E5E7EB;border-radius:12px;padding:4px;gap:2px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tnav::-webkit-scrollbar{height:0;}
.tbtn{flex:0 0 auto;padding:10px 13px;border:none;background:transparent;font-size:12px;font-weight:600;color:#9CA3AF;border-radius:8px;cursor:pointer;font-family:inherit;white-space:nowrap;}
.tbtn.on{background:#1A1A2E;color:#fff;}
.tp{display:none;}.tp.on{display:block;}
.ch-hdr{display:flex;align-items:center;gap:12px;margin-bottom:14px;padding:14px;background:#fff;border-radius:12px;border:1px solid #E5E7EB;}
.ch-icon{font-size:30px;}
.ch-name{font-size:15px;font-weight:700;}
.ch-desc{font-size:11px;color:#9CA3AF;margin-top:2px;}
.card{background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:14px;margin-bottom:10px;}
.hint{font-size:11px;color:#9CA3AF;padding:8px 10px;background:#F9FAFB;border-radius:6px;margin-bottom:10px;line-height:1.7;}
.vid-row{border:1px dashed #D1D5DB;border-radius:10px;padding:12px;margin-bottom:10px;background:#FAFAFB;}
.vid-row-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.vid-num{font-size:12px;font-weight:800;color:#6366F1;}
.vid-del{font-size:10px;padding:3px 9px;background:#FEE2E2;color:#DC2626;border:none;border-radius:6px;cursor:pointer;font-family:inherit;}
input[type=text]{width:100%;border:1px solid #E5E7EB;border-radius:8px;padding:9px 10px;font-size:12px;font-family:inherit;outline:none;margin-bottom:8px;color:#374151;}
input[type=text]:focus{border-color:#6366F1;}
textarea{width:100%;border:1px solid #E5E7EB;border-radius:8px;padding:10px;font-size:13px;font-family:inherit;outline:none;resize:vertical;line-height:1.6;color:#374151;min-height:130px;}
textarea:focus{border-color:#6366F1;}
.add-btn{width:100%;padding:10px;background:#EEF2FF;color:#4338CA;border:1px dashed #A5B4FC;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:8px;}
.mode-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.mode-lbl{font-size:11px;color:#6B7280;font-weight:700;}
.mchip{font-size:11px;padding:6px 12px;border-radius:20px;border:1px solid #E5E7EB;background:#fff;color:#6B7280;cursor:pointer;font-family:inherit;font-weight:700;}
.mchip.on{background:#4338CA;color:#fff;border-color:#4338CA;}
.card-del{font-size:12px;padding:8px 18px;background:#FEE2E2;color:#DC2626;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:800;}
.card-del:hover{background:#FECACA;}
.lt-linkcell{white-space:nowrap;}
.sym-link{color:#1A1A2E;text-decoration:none;border-bottom:2px dotted #DC2626;}
.sym-link:hover{color:#DC2626;}
.run-btn{width:100%;padding:12px;background:#1A1A2E;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;}
.run-btn:disabled{opacity:0.5;cursor:not-allowed;}
.report-actions{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.act-btn{flex:1;min-width:70px;padding:9px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.act-save{background:#6366F1;color:#fff;}
.act-fs{background:#0EA5E9;color:#fff;}
.act-print{background:#374151;color:#fff;}
.act-close{background:#F3F4F6;color:#6B7280;}
.report-frame{border:1px solid #E5E7EB;border-radius:10px;overflow:hidden;}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;}
.fchip{font-size:11px;padding:6px 14px;border-radius:20px;border:1px solid #E5E7EB;background:#fff;color:#6B7280;cursor:pointer;font-family:inherit;font-weight:600;}
.fchip.on{background:#1A1A2E;color:#fff;border-color:#1A1A2E;}
.view-toggle{display:flex;gap:4px;background:#fff;border:1px solid #E5E7EB;border-radius:20px;padding:3px;}
.vchip{font-size:11px;padding:5px 12px;border-radius:16px;border:none;background:transparent;color:#9CA3AF;cursor:pointer;font-family:inherit;font-weight:700;}
.vchip.on{background:#1A1A2E;color:#fff;}
.ctrl-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:10px;}
.ctrl-row input.search{flex:1;min-width:130px;border:1px solid #E5E7EB;border-radius:8px;padding:7px 10px;font-size:12px;font-family:inherit;outline:none;margin:0;}
.ctrl-row select{border:1px solid #E5E7EB;border-radius:8px;padding:7px 8px;font-size:12px;font-family:inherit;background:#fff;color:#374151;}
.export-btns{display:flex;gap:6px;}
.export-btns button{font-size:11px;padding:4px 10px;border:none;border-radius:20px;cursor:pointer;font-family:inherit;font-weight:600;}
.exp-md{background:#E0F2FE;color:#0369A1;}.exp-json{background:#F3E8FF;color:#7E22CE;}
.hist-item{background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;}
.hist-item:hover{border-color:#6366F1;}
.hist-title{font-size:13.5px;font-weight:800;color:#1A1A2E;margin-bottom:4px;line-height:1.4;}
.hist-meta{font-size:11px;color:#9CA3AF;margin-bottom:6px;}
.hist-prev{font-size:11.5px;color:#6B7280;line-height:1.5;}
.hist-links{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;}
.hist-links a{font-size:10px;color:#2563EB;text-decoration:none;background:#EFF6FF;padding:2px 8px;border-radius:12px;border:1px solid #BFDBFE;}
.hist-table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #E5E7EB;border-radius:10px;overflow:hidden;font-size:12px;}
.hist-table thead tr{background:#F9FAFB;}
.hist-table th{text-align:left;padding:9px 10px;font-size:11px;font-weight:700;color:#6B7280;border-bottom:1px solid #E5E7EB;white-space:nowrap;}
.hist-table td{padding:9px 10px;border-bottom:1px solid #F3F4F6;color:#374151;vertical-align:middle;}
.hist-table tbody tr{cursor:pointer;}
.hist-table tbody tr:hover{background:#F5F7FF;}
.hist-table tbody tr:last-child td{border-bottom:none;}
.lt-date{color:#9CA3AF;white-space:nowrap;font-size:11px;}
.lt-ch{font-weight:800;white-space:nowrap;}
.lt-title{font-weight:700;color:#1A1A2E;line-height:1.4;}
.lt-time{color:#9CA3AF;white-space:nowrap;font-size:11px;text-align:right;}
.lt-sym{font-weight:900;color:#1A1A2E;white-space:nowrap;}
.lt-links{white-space:nowrap;}
.lt-link{display:inline-block;font-size:10px;color:#DC2626;text-decoration:none;background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:0 6px;margin-left:3px;vertical-align:middle;}
.sector{display:inline-block;font-size:11px;font-weight:700;background:#FEF3C7;color:#92400E;border-radius:10px;padding:2px 9px;white-space:nowrap;}
.lt-del{font-size:10px;padding:2px 7px;background:#FEE2E2;color:#DC2626;border:none;border-radius:4px;cursor:pointer;font-family:inherit;}
.kw-words{color:#4338CA;font-weight:600;line-height:1.5;}
.kw-words .kw{display:inline-block;background:#EEF2FF;border:1px solid #C7D2FE;border-radius:10px;padding:1px 7px;margin:1px 2px;font-size:11px;}
.freq-wrap{display:flex;flex-wrap:wrap;gap:8px;}
.freq{background:#EEF2FF;border:1px solid #C7D2FE;color:#4338CA;border-radius:16px;padding:6px 13px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.freq .cnt{color:#6366F1;font-weight:900;margin-left:5px;}
.tone{display:inline-block;font-size:11px;font-weight:800;padding:2px 9px;border-radius:12px;white-space:nowrap;}
.tone.pos{background:#EBFBEE;color:#2F9E44;}.tone.neu{background:#F1F3F5;color:#868E96;}.tone.neg{background:#FFF0F0;color:#E03131;}
.pick-item{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #E5E7EB;border-radius:8px;padding:9px 11px;margin-bottom:6px;cursor:pointer;}
.pick-item.sel{border-color:#6366F1;background:#F5F7FF;}
.pick-item input{width:17px;height:17px;flex-shrink:0;accent-color:#6366F1;}
.pick-item .pi-title{font-size:12.5px;font-weight:700;color:#1A1A2E;line-height:1.4;}
.pick-item .pi-meta{font-size:10.5px;color:#9CA3AF;margin-top:1px;}
.clear-chip{display:inline-block;font-size:11px;padding:4px 10px;background:#FEF3C7;color:#92400E;border:none;border-radius:20px;cursor:pointer;font-family:inherit;font-weight:600;margin-bottom:10px;}
.empty{text-align:center;color:#9CA3AF;padding:40px;font-size:13px;}
.loading{text-align:center;color:#9CA3AF;padding:20px;font-size:12px;}
.summary-line{font-size:12px;color:#6B7280;margin-bottom:10px;}
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:#fff;border-radius:14px;padding:24px;width:100%;max-width:360px;}
.modal h3{font-size:15px;font-weight:700;margin-bottom:6px;}
.modal p{font-size:12px;color:#6B7280;margin-bottom:14px;line-height:1.6;}
.modal input{width:100%;border:1px solid #E5E7EB;border-radius:8px;padding:10px 12px;font-size:13px;font-family:inherit;outline:none;margin-bottom:12px;}
.mbtns{display:flex;gap:8px;}
.mbtns button{flex:1;padding:10px;border-radius:8px;border:none;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600;}
.bok{background:#1A1A2E;color:#fff;}.bcl{background:#F3F4F6;color:#6B7280;}
.fs-ov{position:fixed;inset:0;background:#fff;z-index:200;display:flex;flex-direction:column;}
.fs-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#1A1A2E;color:#fff;flex-shrink:0;}
.fs-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-right:10px;}
.fs-bar .grp{display:flex;gap:8px;flex-shrink:0;}
.fs-bar button{font-size:12px;padding:7px 14px;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:700;}
.fs-print{background:#374151;color:#fff;}.fs-close{background:#EF4444;color:#fff;}
.fs-ov iframe{flex:1;width:100%;border:none;}
.hide{display:none!important;}
</style>
</head>

function esc(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function ytId(url){ if(!url) return ''; var m=String(url).match(/(?:youtu\.be\/|v=|\/embed\/|\/shorts\/|\/live\/)([A-Za-z0-9_-]{11})/); return m?m[1]:''; }
function stripHtml(h){ return (h||'').replace(/<style[\s\S]*?<\/style>/gi,' ').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim(); }
function getTags(r){ try{ return r.tags?JSON.parse(r.tags):[]; }catch(e){ return []; } }
function getLinks(r){ try{ return r.links?JSON.parse(r.links):[]; }catch(e){ return []; } }
function getTickers(r){ try{ return r.tickers?JSON.parse(r.tickers):[]; }catch(e){ return []; } }

function toneClass(t){ if(/긍정|매수|확대/.test(t))return'pos'; if(/부정|매도|경계|축소/.test(t))return'neg'; return'neu'; }
function tickerUrl(x){
  var sym=(x.sym||'').trim(), name=(x.name||'').trim(), mkt=(x.market||'').toUpperCase();
  // 한국: 6자리 코드면 네이버 종목 페이지로 직접
  if(/^\d{6}$/.test(sym)) return 'https://finance.naver.com/item/main.naver?code='+sym;
  // 한국인데 코드 없음(또는 한글 심볼) → 네이버 통합검색 주가
  if(mkt==='KR' || /[가-힣]/.test(sym)) return 'https://search.naver.com/search.naver?query='+encodeURIComponent((name||sym)+' 주가');
  // 미국·해외: 야후 파이낸스 (티커 형식이면 quote, 아니면 lookup)
  if(sym && sym!=='-' && /^[A-Za-z][A-Za-z.\-]{0,9}$/.test(sym)) return 'https://finance.yahoo.com/quote/'+encodeURIComponent(sym);
  return 'https://finance.yahoo.com/lookup?s='+encodeURIComponent(name||sym);
}

}

function toFS(obj){ var f={}; Object.keys(obj).forEach(function(k){ var v=obj[k];
  if(typeof v==='string')f[k]={stringValue:v}; else if(typeof v==='number')f[k]={integerValue:String(Math.floor(v))};
  else if(typeof v==='boolean')f[k]={booleanValue:v}; else f[k]={stringValue:JSON.stringify(v)}; }); return {fields:f}; }
function fromFS(doc){ if(!doc||!doc.fields)return null; var o={_id:doc.name?doc.name.split('/').pop():''};
  Object.keys(doc.fields).forEach(function(k){ var f=doc.fields[k];
    if(f.stringValue!==undefined)o[k]=f.stringValue; else if(f.integerValue!==undefined)o[k]=parseInt(f.integerValue);
    else if(f.booleanValue!==undefined)o[k]=f.booleanValue; else o[k]=null; }); return o; }
function fbAdd(d){ return fetch(FB_BASE+'/'+COLLECTION+'?key='+FB_KEY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(toFS(d))}).then(function(r){return r.json();}); }
function fbList(){ return fetch(FB_BASE+'/'+COLLECTION+'?key='+FB_KEY+'&pageSize=200').then(function(r){return r.json();}).then(function(d){ if(!d.documents)return[]; return d.documents.map(fromFS).filter(Boolean); }); }
function fbDelete(id){ return fetch(FB_BASE+'/'+COLLECTION+'/'+id+'?key='+FB_KEY,{method:'DELETE'}); }

function loadView(which){

  var el=document.getElementById(map[which]); el.innerHTML='<div class="loading">&#9729; Firebase에서 불러오는 중...</div>';

    if(which==='hist'){ populateMonths(); renderHist(); } else if(which==='kw') renderKeywords();

  }).catch(function(e){ el.innerHTML='<div class="empty">불러오기 실패: '+e.message+'</div>'; });
}

  var n=new Date(), dateStr=n.getFullYear()+'년 '+(n.getMonth()+1)+'월 '+n.getDate()+'일';
  var block=items.map(function(it,i){ return '[분석 '+(i+1)+'] 채널: '+it.chName+' / 제목: '+it.title+' / 날짜: '+it.date+'\n내용:\n'+it.text.slice(0,2500); }).join('\n\n──────────\n\n');
  return '너는 주식·거시경제 분석 전문가야. 아래는 서로 다른 채널/영상의 분석 내용이야. '+
    (focus?('특히 "'+focus+'" 관점에서 '):'')+'교차 비교해줘.\n\n'+
    '【비교 대상】\n'+block+'\n\n'+
    '출력: 첫 줄 메타 주석, 다음 줄부터 <!DOCTYPE html>~</html>. 그 외 금지.\n'+
    '<!--META:{"title":"비교 제목","tags":["태그"],"tickers":[]}-->\n\n'+REPORT_CSS+'\n\n'+
    '구조:\n[헤더] h1=비교 제목, sub="채널 비교 | '+dateStr+' | 분석 '+items.length+'건"\n'+
    '[SECTION 🤝 공통된 견해] ul.bullet\n'+
    '[SECTION ⚔️ 엇갈리는 지점] 표: 쟁점 | 각 채널 입장(채널명 명시) | 시사점\n'+
    '[SECTION 🎯 채널별 고유 포인트] 채널마다 .vid-summary(채널명 제목 + 불릿)\n'+
    '[SECTION 🧭 종합 결론 — 내가 어떻게 받아들일까] .story-box + ul.bullet 액션 3~5개\n[푸터] 채널 비교 | '+dateStr;
}

function apiErr(d){
  var m=(d&&d.error&&d.error.message)||'', t=(d&&d.error&&d.error.type)||'';
  if(/credit|balance/i.test(m)) return '크레딧이 소진됐어 — console.anthropic.com에서 결제·충전이 필요해.';
  if(t==='authentication_error'||/api[\s_-]?key|x-api-key|authentication|invalid x-api/i.test(m)) return 'API 키 오류 — 우측 상단 "AI 설정"에서 키를 다시 확인해줘.';
  if(t==='rate_limit_error'||/rate limit|overloaded|too many|429/i.test(m)) return '요청 한도 초과 또는 서버 혼잡 — 잠시 후 다시 시도해줘.';
  return '오류: '+(m||'알 수 없는 오류');
}
function parseMeta(text){
  var meta={title:'',tags:[],tickers:[]}; var mm=text.match(/<!--META:([\s\S]*?)-->/);
  if(mm){ try{ var p=JSON.parse(mm[1].trim()); meta.title=p.title||''; meta.tags=p.tags||[]; meta.tickers=p.tickers||[]; }catch(e){} }
  var hm=text.match(/<!DOCTYPE[\s\S]*<\/html>/i); var html=hm?hm[0]:text;
  if(!meta.title){ var h1=html.match(/<h1[^>]*>([\s\S]*?)<\/h1>/i); meta.title=h1?h1[1].replace(/<[^>]+>/g,'').trim():'분석'; }
  return {meta:meta, html:html};
}

/* ---------- 분석 ---------- */
function analyze(idx){
  var key=localStorage.getItem(AK); if(!key){ openM(); return; }
  var videos=gatherVideos(idx); if(!videos.length){ alert('영상 자막/내용을 최소 1개 입력해줘'); return; }
  // 중복 감지
  var newIds=videos.map(function(v){return ytId(v.link);}).filter(Boolean);
  if(newIds.length && allDocs.length){
    var dup=allDocs.find(function(r){ return getLinks(r).some(function(u){ var id=ytId(u); return id && newIds.indexOf(id)>=0; }); });
    if(dup && !confirm('이 영상은 이미 분석한 적 있어 ('+dup.date+' · '+dup.chName+').\n그래도 계속할까?')) return;
  }
  if(analyzeMode[idx]==='individual' && videos.length>1) analyzeIndividual(idx,videos);
  else analyzeCombined(idx,videos);
}

function analyzeCombined(idx,videos){
  var key=localStorage.getItem(AK);
  var btn=document.getElementById('btn-'+idx); btn.disabled=true; btn.textContent='분석 중... (30~60초)';
  fetch('https://api.anthropic.com/v1/messages',{method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:MODEL,max_tokens:5000,messages:[{role:'user',content:getPrompt(idx,videos)}]})})
  .then(function(r){return r.json();}).then(function(d){
    btn.disabled=false; updateAnalyzeBtn(idx);
    if(d.error){ alert(apiErr(d)); return; }
    var text=''; if(d.content)d.content.forEach(function(b){ if(b.type==='text')text+=b.text; });
    var pr=parseMeta(text);
    tempResults[idx]={html:pr.html,title:pr.meta.title,tags:pr.meta.tags,tickers:pr.meta.tickers,
      links:videos.map(function(v){return v.link;}).filter(Boolean),videoCount:videos.length,idx:idx};
    showResult(idx,tempResults[idx]);
  }).catch(function(e){ btn.disabled=false; updateAnalyzeBtn(idx); alert('네트워크 오류: '+e.message); });
}

function analyzeIndividual(idx,videos){
  var key=localStorage.getItem(AK);
  var el=document.getElementById('result-'+idx);
  el.innerHTML='<div style="margin-bottom:10px"><div style="font-size:13px;font-weight:800;margin-bottom:8px;">개별 분석 결과 ('+videos.length+'개) <span style="font-size:11px;color:#9CA3AF;font-weight:400">— 각각 시청기록에 따로 저장돼요</span></div>'+
    '<button class="act-btn act-save" id="saveall-'+idx+'" style="width:100%">&#128190; 전체 저장</button></div><div id="indiv-'+idx+'"></div>';
  var btn=document.getElementById('btn-'+idx); btn.disabled=true;
  var results=new Array(videos.length);
  function step(i){
    if(i>=videos.length){
      btn.disabled=false; updateAnalyzeBtn(idx);
      var sa=document.getElementById('saveall-'+idx);
      sa.addEventListener('click',function(){ saveAllIndividual(idx,results,sa); });
      return;
    }
    btn.textContent='개별 분석 중 ('+(i+1)+'/'+videos.length+')...';
    fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:MODEL,max_tokens:5000,messages:[{role:'user',content:getPrompt(idx,[videos[i]])}]})})
    .then(function(r){return r.json();}).then(function(d){
      if(d.error){ appendResultError('indiv-'+idx,'영상 '+(i+1)+': '+apiErr(d)); }
      else { var text=''; if(d.content)d.content.forEach(function(b){ if(b.type==='text')text+=b.text; });
        var pr=parseMeta(text);
        var data={html:pr.html,title:pr.meta.title,tags:pr.meta.tags,tickers:pr.meta.tickers,
          links:[videos[i].link].filter(Boolean),videoCount:1,idx:idx};
        results[i]=data; appendResultBlock('indiv-'+idx,idx,data,'영상 '+(i+1));
      }
      step(i+1);
    }).catch(function(e){ appendResultError('indiv-'+idx,'영상 '+(i+1)+': 네트워크 오류 '+e.message); step(i+1); });
  }
  step(0);
}

function appendResultBlock(containerId, chIdx, data, tag){
  var box=document.createElement('div'); box.className='card'; box.style.padding='10px';
  box.innerHTML='<div style="font-size:12.5px;font-weight:800;margin-bottom:6px;line-height:1.4;"><span style="color:#6366F1">'+esc(tag||'')+'</span> '+esc(data.title)+'</div>'+
    '<div class="report-actions"><button class="act-btn act-save sv">&#128190; 저장</button>'+
    '<button class="act-btn act-fs fs">&#128279; 전체화면</button>'+
    '<button class="act-btn act-print pr">&#128438; 인쇄</button></div>'+
    '<div class="report-frame"><iframe style="width:100%;height:460px;border:none;"></iframe></div>';
  document.getElementById(containerId).appendChild(box);
  var ifr=box.querySelector('iframe'); ifr.srcdoc=data.html;
  box.querySelector('.sv').addEventListener('click',function(){ saveRecordData(chIdx,data,this); });
  box.querySelector('.fs').addEventListener('click',function(){ openFS(data.html,data.title); });
  box.querySelector('.pr').addEventListener('click',function(){ ifr.contentWindow.print(); });
}
function appendResultError(containerId,msg){
  var box=document.createElement('div'); box.className='card'; box.style.cssText='padding:10px;border-color:#FCA5A5;background:#FEF2F2;';
  box.innerHTML='<div style="font-size:12px;color:#DC2626;">&#9888; '+esc(msg)+'</div>';
  document.getElementById(containerId).appendChild(box);
}
function saveAllIndividual(idx,results,btn){
  var todo=results.filter(function(d){ return d && !d._saved; });
  if(!todo.length){ alert('저장할 새 결과가 없어'); return; }
  btn.textContent='전체 저장 중...'; btn.disabled=true;
  Promise.all(todo.map(function(d){ return saveRecordData(idx,d,null); }))
    .then(function(){ btn.innerHTML='&#10003; 전체 저장됨!'; setTimeout(function(){ btn.innerHTML='&#128190; 전체 저장'; btn.disabled=false; },2000); })
    .catch(function(e){ btn.disabled=false; btn.textContent='일부 저장 실패'; alert('저장 오류: '+e.message); });
}

function showResult(idx,data){
  var el=document.getElementById('result-'+idx);
  el.innerHTML='<div style="margin-bottom:10px"><div style="font-size:13px;font-weight:800;color:#1A1A2E;margin-bottom:8px;line-height:1.4">'+esc(data.title)+'</div>'+
    '<div class="report-actions"><button class="act-btn act-save" id="savebtn-'+idx+'">&#128190; 저장</button>'+
    '<button class="act-btn act-fs" id="fsbtn-'+idx+'">&#128279; 전체화면</button>'+
    '<button class="act-btn act-print" id="printbtn-'+idx+'">&#128438; 인쇄</button>'+
    '<button class="act-btn act-close" id="closebtn-'+idx+'">닫기</button></div></div>'+
    '<div class="report-frame"><iframe id="iframe-'+idx+'" style="width:100%;height:600px;border:none;" srcdoc=""></iframe></div>';
  document.getElementById('iframe-'+idx).srcdoc=data.html;
  document.getElementById('savebtn-'+idx).addEventListener('click',function(){ saveResult(idx); });
  document.getElementById('fsbtn-'+idx).addEventListener('click',function(){ openFS(data.html,data.title); });
  document.getElementById('printbtn-'+idx).addEventListener('click',function(){ document.getElementById('iframe-'+idx).contentWindow.print(); });
  document.getElementById('closebtn-'+idx).addEventListener('click',function(){ el.innerHTML=''; tempResults[idx]=null; });
}
function saveResult(idx){ var data=tempResults[idx]; if(!data){ alert('먼저 분석을 실행해줘'); return; } saveRecordData(idx,data,document.getElementById('savebtn-'+idx)); }
function saveRecordData(chIdx,data,btn){
  if(data._saved){ if(btn){btn.innerHTML='&#10003; 저장됨';} return Promise.resolve(); }
  var ch=CHANNELS[chIdx]||{name:'비교',color:'#6B7280'}; var n=new Date();
  var rec={chIdx:chIdx,chName:ch.name,color:ch.color,title:data.title,tags:data.tags||[],tickers:data.tickers||[],
    links:data.links||[],videoCount:data.videoCount||1,date:n.getFullYear()+'-'+(n.getMonth()+1)+'-'+n.getDate(),
    time:n.toLocaleTimeString('ko-KR'),html:data.html,preview:stripHtml(data.html).slice(0,160),ts:Date.now()};
  if(btn){ btn.textContent='저장 중...'; btn.disabled=true; }
  return fbAdd(rec).then(function(r){ if(r&&r.name){ rec._id=r.name.split('/').pop(); allDocs.unshift(rec); } data._saved=true;
    if(btn){ btn.innerHTML='&#10003; 저장됨!'; setTimeout(function(){ btn.innerHTML='&#128190; 저장'; btn.disabled=false; },2000); }
  }).catch(function(e){ if(btn){ btn.disabled=false; btn.textContent='저장 실패'; } throw e; });
}

/* ---------- 시청기록 ---------- */
function populateMonths(){
  var sel=document.getElementById('hist-month'), keys={};
  allDocs.forEach(function(r){ var k=monthKey(r); if(k)keys[k]=1; });
  var arr=Object.keys(keys).sort().reverse();
  sel.innerHTML='<option value="all">전체 기간</option>'+arr.map(function(k){ return '<option value="'+k+'">'+k.replace('-','.')+'</option>'; }).join('');
  sel.value=histMonth;
}
function filteredHist(){
  var q=histSearch.trim().toLowerCase();
  var list=allDocs.filter(function(r){
    if(histFilter!=='all' && r.chName!==histFilter) return false;
    if(histMonth!=='all' && monthKey(r)!==histMonth) return false;
    if(q){ var hay=((r.title||'')+' '+(r.preview||'')+' '+getTags(r).join(' ')).toLowerCase(); if(hay.indexOf(q)<0) return false; }
    return true;
  });
  if(histSort==='old') list=list.slice().sort(function(a,b){return(a.ts||0)-(b.ts||0);});
  else if(histSort==='ch') list=list.slice().sort(function(a,b){return(a.chName||'').localeCompare(b.chName||'')||((b.ts||0)-(a.ts||0));});
  else list=list.slice().sort(function(a,b){return(b.ts||0)-(a.ts||0);});
  return list;
}
function renderHist(){
  var el=document.getElementById('hist-list'); var list=filteredHist();
  if(!list.length){ el.innerHTML='<div class="empty">조건에 맞는 기록이 없어</div>'; return; }
  if(histView==='list') renderHistList(el,list); else renderHistCards(el,list);
  wireHistEvents(el);
}
function renderHistCards(el,list){
  var html=''; list.forEach(function(r){
    var chips=getLinks(r).map(function(u,i){ var id=ytId(u); return '<a href="'+esc(u)+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">&#9654; 영상'+(i+1)+(id?' ('+id+')':'')+'</a>'; }).join('');
    var cnt=r.videoCount?(' · 영상 '+r.videoCount+'개'):'';
    html+='<div class="hist-item" data-id="'+r._id+'"><div class="hist-title">'+esc(r.title||'(제목 없음)')+'</div>'+
      '<div style="display:flex;justify-content:space-between;align-items:center;"><div class="hist-meta"><span style="color:'+(r.color||'#6B7280')+';font-weight:800">'+esc(r.chName||'')+'</span> · '+esc(r.date||'')+' '+esc(r.time||'')+cnt+'</div>'+
      '<button class="del-btn card-del" data-id="'+r._id+'">&#128465;&#65039; 삭제</button></div>'+
      '<div class="hist-prev">'+esc((r.preview||'').slice(0,120))+'...</div>'+(chips?'<div class="hist-links">'+chips+'</div>':'')+'</div>';
  }); el.innerHTML=html;
}
function renderHistList(el,list){
  var rows=''; list.forEach(function(r){
    rows+='<tr class="hist-item" data-id="'+r._id+'"><td class="lt-date">'+esc(r.date||'')+'</td>'+
      '<td class="lt-ch" style="color:'+(r.color||'#6B7280')+'">'+esc(r.chName||'')+'</td>'+
      '<td class="lt-title">'+esc(r.title||'(제목 없음)')+'</td>'+
      '<td class="lt-linkcell">'+linkCellHtml(r)+'</td>'+
      '<td class="lt-time">'+esc(r.time||'')+'</td>'+
      '<td style="text-align:right"><button class="del-btn lt-del" data-id="'+r._id+'">삭제</button></td></tr>';
  });
  el.innerHTML='<div style="overflow-x:auto"><table class="hist-table"><thead><tr><th>날짜</th><th>채널</th><th>제목</th><th>링크</th><th>분석시간</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}
function wireHistEvents(el){
  el.querySelectorAll('.hist-item').forEach(function(item){ item.addEventListener('click',function(e){
    if(e.target.classList.contains('del-btn')||e.target.tagName==='A')return;
    var found=allDocs.find(function(d){return d._id===this.getAttribute('data-id');}.bind(this)); if(found) openFS(found.html||'',found.title||'분석 리포트');
  }); });
  el.querySelectorAll('.del-btn').forEach(function(btn){ btn.addEventListener('click',function(e){ e.stopPropagation();
    var id=this.getAttribute('data-id'); if(confirm('이 기록을 삭제할까요?')) fbDelete(id).then(function(){ allDocs=allDocs.filter(function(d){return d._id!==id;}); renderHist(); });
  }); });
}
document.querySelectorAll('#filter-row .fchip').forEach(function(chip){ chip.addEventListener('click',function(){
  histFilter=this.getAttribute('data-f'); document.querySelectorAll('#filter-row .fchip').forEach(function(c){c.classList.toggle('on',c===chip);}); renderHist(); }); });
document.querySelectorAll('#view-toggle .vchip').forEach(function(chip){ chip.addEventListener('click',function(){
  histView=this.getAttribute('data-v'); document.querySelectorAll('#view-toggle .vchip').forEach(function(c){c.classList.toggle('on',c===chip);}); renderHist(); }); });
document.getElementById('hist-search').addEventListener('input',function(){ histSearch=this.value; renderHist(); });
document.getElementById('hist-sort').addEventListener('change',function(){ histSort=this.value; renderHist(); });
document.getElementById('hist-month').addEventListener('change',function(){ histMonth=this.value; renderHist(); });
document.getElementById('clear-hist-btn').addEventListener('click',function(){
  var target=filteredHist(); if(!target.length){ alert('삭제할 기록이 없어'); return; }
  if(!confirm('현재 보이는 '+target.length+'개 기록을 삭제할까요?')) return;
  Promise.all(target.map(function(d){return fbDelete(d._id);})).then(function(){ loadView('hist'); });
});

/* ---------- 백업 ---------- */
function download(name,content,type){ var blob=new Blob([content],{type:type+';charset=utf-8'}); var a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=name; document.body.appendChild(a); a.click();
  setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(a.href); },100); }
document.getElementById('exp-md').addEventListener('click',function(){
  if(!allDocs.length){ alert('내보낼 기록이 없어'); return; }
  var L=['# 유튜브 분석 백업','','생성: '+new Date().toLocaleString('ko-KR'),'총 '+allDocs.length+'건',''];
  allDocs.forEach(function(r){ L.push('## '+(r.title||'(제목없음)'));
    L.push('- 채널: '+r.chName+' / 날짜: '+r.date+' '+(r.time||''));
    var t=getTags(r); if(t.length)L.push('- 핵심단어: '+t.join(', '));
    var tk=getTickers(r); if(tk.length)L.push('- 종목: '+tk.map(function(x){return x.sym+'('+x.tone+')';}).join(', '));
    var ls=getLinks(r); if(ls.length)L.push('- 링크: '+ls.join(' '));
    L.push(''); L.push(stripHtml(r.html).slice(0,800)); L.push(''); L.push('---'); L.push('');
  });
  download('youtube-분석백업.md',L.join('\n'),'text/markdown');
});
document.getElementById('exp-json').addEventListener('click',function(){
  if(!allDocs.length){ alert('내보낼 기록이 없어'); return; }
  download('youtube-분석백업.json',JSON.stringify(allDocs,null,2),'application/json');
});

/* ---------- 핵심단어 ---------- */
function renderKeywords(){
  var el=document.getElementById('kw-list');
  var base=allDocs.filter(function(r){ return kwFilter==='all'||r.chName===kwFilter; });
  if(!base.length){ el.innerHTML='<div class="empty">아직 추출된 핵심단어가 없어</div>'; return; }
  if(kwView==='freq'){
    var map={}; base.forEach(function(r){ getTags(r).forEach(function(t){ var k=String(t).replace(/^#/,'').trim(); if(k) map[k]=(map[k]||0)+1; }); });
    var arr=Object.keys(map).map(function(k){return{w:k,c:map[k]};}).sort(function(a,b){return b.c-a.c;});
    if(!arr.length){ el.innerHTML='<div class="empty">핵심단어가 없어</div>'; return; }
    el.innerHTML='<div class="summary-line">단어를 누르면 관련 분석을 모아 봐요</div><div class="freq-wrap">'+
      arr.map(function(x){ return '<button class="freq" data-w="'+esc(x.w)+'">'+esc(x.w)+'<span class="cnt">'+x.c+'</span></button>'; }).join('')+'</div>';
    el.querySelectorAll('.freq').forEach(function(b){ b.addEventListener('click',function(){ kwQuery=this.getAttribute('data-w'); kwView='list';
      document.querySelectorAll('#kw-view .vchip').forEach(function(c){ c.classList.toggle('on',c.getAttribute('data-v')==='list'); }); renderKeywords(); }); });
    return;
  }
  var list=base; if(kwQuery){ var q=kwQuery.toLowerCase(); list=base.filter(function(r){ return getTags(r).some(function(t){return String(t).toLowerCase().indexOf(q)>=0;}); }); }
  list=list.slice().sort(function(a,b){return(b.ts||0)-(a.ts||0);});
  var head=kwQuery?'<button class="clear-chip" id="kw-clear">&#10005; "'+esc(kwQuery)+'" 필터 해제</button>':'';
  if(!list.length){ el.innerHTML=head+'<div class="empty">해당 단어가 든 분석이 없어</div>'; if(kwQuery)wireKwClear(); return; }
  var rows=list.map(function(r){
    var words=getTags(r); var wr=words.length?words.map(function(t){return '<span class="kw">'+esc(String(t).replace(/^#/,''))+'</span>';}).join(''):'<span style="color:#9CA3AF">-</span>';
    return '<tr class="hist-item" data-id="'+r._id+'"><td class="lt-date">'+esc(r.date||'')+'</td>'+
      '<td class="lt-ch" style="color:'+(r.color||'#6B7280')+'">'+esc(r.chName||'')+'</td>'+
      '<td class="lt-title">'+esc(r.title||'(제목 없음)')+'</td><td class="kw-words">'+wr+'</td>'+
      '<td class="lt-linkcell">'+linkCellHtml(r)+'</td></tr>';
  }).join('');
  el.innerHTML=head+'<div style="overflow-x:auto"><table class="hist-table"><thead><tr><th>날짜</th><th>채널</th><th>제목</th><th>핵심단어</th><th>링크</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  if(kwQuery) wireKwClear();
  el.querySelectorAll('.hist-item').forEach(function(item){ item.addEventListener('click',function(){
    var found=allDocs.find(function(d){return d._id===this.getAttribute('data-id');}.bind(this)); if(found)openFS(found.html||'',found.title||'분석 리포트'); }); });
}
function wireKwClear(){ var c=document.getElementById('kw-clear'); if(c)c.addEventListener('click',function(){ kwQuery=''; renderKeywords(); }); }
document.querySelectorAll('#kw-filter .fchip').forEach(function(chip){ chip.addEventListener('click',function(){
  kwFilter=this.getAttribute('data-f'); kwQuery=''; document.querySelectorAll('#kw-filter .fchip').forEach(function(c){c.classList.toggle('on',c===chip);}); renderKeywords(); }); });
document.querySelectorAll('#kw-view .vchip').forEach(function(chip){ chip.addEventListener('click',function(){
  kwView=this.getAttribute('data-v'); document.querySelectorAll('#kw-view .vchip').forEach(function(c){c.classList.toggle('on',c===chip);}); renderKeywords(); }); });

/* ---------- 종목 워치리스트 ---------- */
function renderTickers(){
  var el=document.getElementById('tk-list');
  var base=allDocs.filter(function(r){ return tkFilter==='all'||r.chName===tkFilter; });
  var rows=[]; base.forEach(function(r){ getTickers(r).forEach(function(tk){ if(tk&&(tk.sym||tk.name)) rows.push({sym:tk.sym||'-',name:tk.name||'',sector:tk.sector||'',market:tk.market||'',tone:tk.tone||'중립',chName:r.chName,color:r.color,date:r.date,ts:r.ts,id:r._id}); }); });
  if(!rows.length){ el.innerHTML='<div class="empty">아직 추출된 종목이 없어<br>이 업데이트 이후 분석한 기록부터 채워져요</div>'; return; }
  rows.sort(function(a,b){ return (b.ts||0)-(a.ts||0); });
  var uniq={}; rows.forEach(function(x){ uniq[(x.sym+'|'+x.name)]=1; });
  var html='<div class="summary-line">총 '+rows.length+'회 언급 · 종목 '+Object.keys(uniq).length+'개 · 티커를 누르면 시세 확인 (미국=야후, 한국=네이버 증권)</div>';
  html+='<div style="overflow-x:auto"><table class="hist-table"><thead><tr><th>티커</th><th>종목명</th><th>섹터</th><th>채널</th><th>톤</th><th>날짜</th></tr></thead><tbody>'+
    rows.map(function(x){ var url=tickerUrl(x); var label=(x.sym&&x.sym!=='-')?x.sym:(x.name||'-');
      return '<tr class="hist-item" data-id="'+x.id+'"><td class="lt-sym"><a class="sym-link" href="'+url+'" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="시세 보기">'+esc(label)+'</a></td>'+
      '<td>'+esc(x.name)+'</td><td>'+(x.sector?'<span class="sector">'+esc(x.sector)+'</span>':'<span style="color:#C0C4CC">-</span>')+'</td>'+
      '<td class="lt-ch" style="color:'+(x.color||'#6B7280')+'">'+esc(x.chName)+'</td>'+
      '<td><span class="tone '+toneClass(x.tone)+'">'+esc(x.tone)+'</span></td><td class="lt-date">'+esc(x.date||'')+'</td></tr>'; }).join('')+
    '</tbody></table></div>';
  el.innerHTML=html;
  el.querySelectorAll('.hist-item').forEach(function(item){ item.addEventListener('click',function(){
    var found=allDocs.find(function(d){return d._id===this.getAttribute('data-id');}.bind(this)); if(found)openFS(found.html||'',found.title||'분석 리포트'); }); });
}
document.querySelectorAll('#tk-filter .fchip').forEach(function(chip){ chip.addEventListener('click',function(){
  tkFilter=this.getAttribute('data-f'); document.querySelectorAll('#tk-filter .fchip').forEach(function(c){c.classList.toggle('on',c===chip);}); renderTickers(); }); });

/* ---------- 채널 비교 ---------- */
function renderComparePick(){
  var el=document.getElementById('cmp-pick');
  var list=allDocs.filter(function(r){ return r.chName!=='비교'; }).slice().sort(function(a,b){return(b.ts||0)-(a.ts||0);});
  if(!list.length){ el.innerHTML='<div class="empty">비교할 분석이 없어<br>먼저 채널 분석을 저장해줘</div>'; return; }
  el.innerHTML=list.map(function(r){
    return '<label class="pick-item" data-id="'+r._id+'"><input type="checkbox" value="'+r._id+'">'+
      '<div><div class="pi-title">'+esc(r.title||'(제목 없음)')+'</div>'+
      '<div class="pi-meta"><span style="color:'+(r.color||'#6B7280')+';font-weight:800">'+esc(r.chName||'')+'</span> · '+esc(r.date||'')+'</div></div></label>';
  }).join('');
  el.querySelectorAll('.pick-item').forEach(function(it){ var cb=it.querySelector('input');
    cb.addEventListener('change',function(){ it.classList.toggle('sel',cb.checked); }); });
}
document.getElementById('cmp-btn').addEventListener('click',function(){
  var key=localStorage.getItem(AK); if(!key){ openM(); return; }
  var checked=Array.prototype.slice.call(document.querySelectorAll('#cmp-pick input:checked')).map(function(c){return c.value;});
  if(checked.length<2){ alert('비교하려면 분석을 2개 이상 선택해줘'); return; }
  var items=checked.map(function(id){ var r=allDocs.find(function(d){return d._id===id;}); return {chName:r.chName,title:r.title,date:r.date,text:stripHtml(r.html)}; });
  var focus=document.getElementById('cmp-focus').value.trim();
  var btn=this; btn.disabled=true; btn.textContent='비교 분석 중... (30~60초)';
  fetch('https://api.anthropic.com/v1/messages',{method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:MODEL,max_tokens:4500,messages:[{role:'user',content:getComparePrompt(items,focus)}]})})
  .then(function(r){return r.json();}).then(function(d){
    btn.disabled=false; btn.innerHTML='&#9878;&#65039; 선택한 분석 비교하기';
    if(d.error){ alert(apiErr(d)); return; }
    var text=''; if(d.content)d.content.forEach(function(b){ if(b.type==='text')text+=b.text; });
    var pr=parseMeta(text); tempCompare={html:pr.html,title:pr.meta.title,count:items.length};
    showCompareResult(tempCompare);
  }).catch(function(e){ btn.disabled=false; btn.innerHTML='&#9878;&#65039; 선택한 분석 비교하기'; alert('네트워크 오류: '+e.message); });
});
function showCompareResult(data){
  var el=document.getElementById('cmp-result');
  el.innerHTML='<div style="margin-bottom:10px"><div style="font-size:13px;font-weight:800;margin-bottom:8px;line-height:1.4">'+esc(data.title)+'</div>'+
    '<div class="report-actions"><button class="act-btn act-save" id="cmp-save">&#128190; 저장</button>'+
    '<button class="act-btn act-fs" id="cmp-fs">&#128279; 전체화면</button>'+
    '<button class="act-btn act-print" id="cmp-print">&#128438; 인쇄</button>'+
    '<button class="act-btn act-close" id="cmp-close">닫기</button></div></div>'+
    '<div class="report-frame"><iframe id="cmp-iframe" style="width:100%;height:600px;border:none;" srcdoc=""></iframe></div>';
  document.getElementById('cmp-iframe').srcdoc=data.html;
  document.getElementById('cmp-fs').addEventListener('click',function(){ openFS(data.html,data.title); });
  document.getElementById('cmp-print').addEventListener('click',function(){ document.getElementById('cmp-iframe').contentWindow.print(); });
  document.getElementById('cmp-close').addEventListener('click',function(){ el.innerHTML=''; tempCompare=null; });
  document.getElementById('cmp-save').addEventListener('click',function(){
    var b=this; b.textContent='저장 중...'; b.disabled=true; var n=new Date();
    var rec={chIdx:99,chName:'비교',color:'#6B7280',title:data.title,tags:[],tickers:[],links:[],videoCount:data.count,
      date:n.getFullYear()+'-'+(n.getMonth()+1)+'-'+n.getDate(),time:n.toLocaleTimeString('ko-KR'),html:data.html,preview:stripHtml(data.html).slice(0,160),ts:Date.now()};
    fbAdd(rec).then(function(r){ if(r&&r.name){rec._id=r.name.split('/').pop(); allDocs.unshift(rec);} b.innerHTML='&#10003; 저장됨!'; setTimeout(function(){b.innerHTML='&#128190; 저장';b.disabled=false;},2000); })
    .catch(function(e){ b.disabled=false; b.textContent='저장 실패'; alert('저장 오류: '+e.message); });
  });
}

/* ---------- 전체화면 ---------- */
function openFS(html,title){ document.getElementById('fs-title').textContent=title||'분석 리포트'; document.getElementById('fs-iframe').srcdoc=html||''; document.getElementById('fsov').classList.remove('hide'); }
function closeFS(){ document.getElementById('fsov').classList.add('hide'); document.getElementById('fs-iframe').srcdoc=''; }
document.getElementById('fs-close').addEventListener('click',closeFS);
document.getElementById('fs-print').addEventListener('click',function(){ document.getElementById('fs-iframe').contentWindow.print(); });
document.addEventListener('keydown',function(e){ if(e.key==='Escape')closeFS(); });

/* ---------- 시작 시 백그라운드 로드(중복 감지용) ---------- */
fbList().then(function(d){ d.sort(function(a,b){return(b.ts||0)-(a.ts||0);}); allDocs=d; }).catch(function(){});
</script>
