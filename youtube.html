/* ---------- Firestore ---------- */
function toFS(obj) {
  var fields = {};
  Object.keys(obj).forEach(function(k) {
    var v = obj[k];
    if (typeof v === 'string') fields[k] = {stringValue: v};
    else if (typeof v === 'number') fields[k] = {integerValue: String(Math.floor(v))};
    else if (typeof v === 'boolean') fields[k] = {booleanValue: v};
    else fields[k] = {stringValue: JSON.stringify(v)};
  });
  return {fields: fields};
}
function fromFS(doc) {
  if (!doc || !doc.fields) return null;
  var obj = {_id: doc.name ? doc.name.split('/').pop() : ''};
  Object.keys(doc.fields).forEach(function(k) {
    var f = doc.fields[k];
    if (f.stringValue !== undefined) obj[k] = f.stringValue;
    else if (f.integerValue !== undefined) obj[k] = parseInt(f.integerValue);
    else if (f.booleanValue !== undefined) obj[k] = f.booleanValue;
    else obj[k] = null;
  });
  return obj;
}
function fbAdd(data) {
  return fetch(FB_BASE+'/'+COLLECTION+'?key='+FB_KEY, {
    method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(toFS(data))
  }).then(function(r){ return r.json(); });
}
function fbList() {
  return fetch(FB_BASE+'/'+COLLECTION+'?key='+FB_KEY+'&pageSize=100').then(function(r){ return r.json(); }).then(function(d) {
    if (!d.documents) return [];
    return d.documents.map(fromFS).filter(Boolean);
  });
}
function fbDelete(docId) { return fetch(FB_BASE+'/'+COLLECTION+'/'+docId+'?key='+FB_KEY, {method:'DELETE'}); }

/* ---------- 분석 ---------- */
function analyze(idx) {
  var key = localStorage.getItem(AK);
  if (!key) { openM(); return; }
  var videos = gatherVideos(idx);
  if (!videos.length) { alert('영상 자막/내용을 최소 1개 입력해줘'); return; }

  var btn = document.getElementById('btn-'+idx);
  btn.disabled = true; btn.textContent = '분석 중... (30~60초)';

  fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body: JSON.stringify({model:MODEL,max_tokens:5000,messages:[{role:'user',content:getPrompt(idx,videos)}]})
  })
  .then(function(r){ return r.json(); })
  .then(function(d) {
    btn.disabled=false; updateAnalyzeBtn(idx);
    if (d.error){ alert('오류: '+d.error.message); return; }
    var text='';
    if (d.content) d.content.forEach(function(b){ if(b.type==='text') text+=b.text; });

    var meta = {title:'', tags:[]};
    var mm = text.match(/<!--META:([\s\S]*?)-->/);
    if (mm) { try { meta = JSON.parse(mm[1].trim()); } catch(e){} }

    var hm = text.match(/<!DOCTYPE[\s\S]*<\/html>/i);
    var html = hm ? hm[0] : text;
    if (!meta.title) {
      var h1 = html.match(/<h1[^>]*>([\s\S]*?)<\/h1>/i);
      meta.title = h1 ? h1[1].replace(/<[^>]+>/g,'').trim() : (CHANNELS[idx].name+' 분석');
    }

    tempResults[idx] = {
      html: html, title: meta.title, tags: meta.tags||[],
      links: videos.map(function(v){ return v.link; }).filter(Boolean),
      videoCount: videos.length, idx: idx
    };
    showResult(idx, tempResults[idx]);
  })
  .catch(function(e){ btn.disabled=false; updateAnalyzeBtn(idx); alert('오류: '+e.message); });
}

function showResult(idx, data) {
  var el = document.getElementById('result-'+idx);
  el.innerHTML =
    '<div style="margin-bottom:10px">'+
      '<div style="font-size:13px;font-weight:800;color:#1A1A2E;margin-bottom:8px;line-height:1.4">'+esc(data.title)+'</div>'+
      '<div class="report-actions">'+
        '<button class="act-btn act-save" id="savebtn-'+idx+'">&#128190; 저장</button>'+
        '<button class="act-btn act-fs" id="fsbtn-'+idx+'">&#128279; 전체화면</button>'+
        '<button class="act-btn act-print" id="printbtn-'+idx+'">&#128438; 인쇄</button>'+
        '<button class="act-btn act-close" id="closebtn-'+idx+'">닫기</button>'+
      '</div>'+
    '</div>'+
    '<div class="report-frame"><iframe id="iframe-'+idx+'" style="width:100%;height:600px;border:none;" srcdoc=""></iframe></div>';
  document.getElementById('iframe-'+idx).srcdoc = data.html;
  document.getElementById('savebtn-'+idx).addEventListener('click', function(){ saveResult(idx); });
  document.getElementById('fsbtn-'+idx).addEventListener('click', function(){ openFS(data.html, data.title); });
  document.getElementById('printbtn-'+idx).addEventListener('click', function(){ document.getElementById('iframe-'+idx).contentWindow.print(); });
  document.getElementById('closebtn-'+idx).addEventListener('click', function(){ el.innerHTML=''; tempResults[idx]=null; });
}

function saveResult(idx) {
  var data = tempResults[idx];
  if (!data) { alert('먼저 분석을 실행해줘'); return; }
  var n = new Date();
  var rec = {
    chIdx: idx, chName: CHANNELS[idx].name, color: CHANNELS[idx].color,
    title: data.title, tags: data.tags, links: data.links, videoCount: data.videoCount,
    date: n.getFullYear()+'-'+(n.getMonth()+1)+'-'+n.getDate(),
    time: n.toLocaleTimeString('ko-KR'),
    html: data.html,
    preview: data.html.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').slice(0,160),
    ts: Date.now()
  };
  var b = document.getElementById('savebtn-'+idx);
  b.textContent='저장 중...'; b.disabled=true;
  fbAdd(rec).then(function() {
    b.innerHTML='&#10003; 저장됨!';
    setTimeout(function(){ b.innerHTML='&#128190; 저장'; b.disabled=false; }, 2000);
  }).catch(function(e){ b.disabled=false; b.textContent='저장 실패'; alert('저장 오류: '+e.message); });
}

/* ---------- 시청기록 ---------- */
function loadHist() {
  var el = document.getElementById('hist-list');
  el.innerHTML = '<div class="loading">&#9729; Firebase에서 불러오는 중...</div>';
  fbList().then(function(docs) {
    docs.sort(function(a,b){ return (b.ts||0)-(a.ts||0); });
    histDocs = docs;
    renderHist();
  }).catch(function(e){ el.innerHTML='<div class="empty">불러오기 실패: '+e.message+'</div>'; });
}

function renderHist() {
  var el = document.getElementById('hist-list');
  var list = histDocs.filter(function(r){ return histFilter==='all' || r.chName===histFilter; });
  if (!list.length) {
    el.innerHTML = '<div class="empty">'+(histFilter==='all'?'아직 본 영상이 없어<br>분석 후 저장 버튼을 눌러줘':histFilter+' 기록이 없어')+'</div>';
    return;
  }
  var html = '';
  list.forEach(function(r) {
    var links = [];
    try { links = r.links ? JSON.parse(r.links) : []; } catch(e){ links=[]; }
    var chips = links.map(function(u,i){
      var id = ytId(u);
      return '<a href="'+esc(u)+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">&#9654; 영상'+(i+1)+(id?' ('+id+')':'')+'</a>';
    }).join('');
    var cnt = r.videoCount ? (' · 영상 '+r.videoCount+'개') : '';
    html += '<div class="hist-item" data-id="'+r._id+'">'+
        '<div class="hist-title">'+esc(r.title||'(제목 없음)')+'</div>'+
        '<div style="display:flex;justify-content:space-between;align-items:center;">'+
          '<div class="hist-meta"><span style="color:'+(r.color||'#6B7280')+';font-weight:800">'+esc(r.chName||'')+'</span> · '+esc(r.date||'')+' '+esc(r.time||'')+cnt+'</div>'+
          '<button class="del-btn" data-id="'+r._id+'" style="font-size:10px;padding:2px 8px;background:#FEE2E2;color:#DC2626;border:none;border-radius:4px;cursor:pointer;">삭제</button>'+
        '</div>'+
        '<div class="hist-prev">'+esc((r.preview||'').slice(0,120))+'...</div>'+
        (chips?'<div class="hist-links">'+chips+'</div>':'')+
      '</div>';
  });
  el.innerHTML = html;
  el.querySelectorAll('.hist-item').forEach(function(item) {
    item.addEventListener('click', function(e) {
      if (e.target.classList.contains('del-btn') || e.target.tagName==='A') return;
      var id = this.getAttribute('data-id');
      var found = histDocs.find(function(d){ return d._id===id; });
      if (found) openFS(found.html||'', found.title||'분석 리포트');
    });
  });
  el.querySelectorAll('.del-btn').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var id = this.getAttribute('data-id');
      if (confirm('이 기록을 삭제할까요?')) {
        fbDelete(id).then(function(){ histDocs = histDocs.filter(function(d){return d._id!==id;}); renderHist(); });
      }
    });
  });
}

document.querySelectorAll('#filter-row .fchip').forEach(function(chip){
  chip.addEventListener('click', function(){
    histFilter = this.getAttribute('data-f');
    document.querySelectorAll('#filter-row .fchip').forEach(function(c){ c.classList.toggle('on', c===chip); });
    renderHist();
  });
});

document.getElementById('clear-hist-btn').addEventListener('click', function() {
  var target = histFilter==='all' ? histDocs : histDocs.filter(function(r){return r.chName===histFilter;});
  if (!target.length) { alert('삭제할 기록이 없어'); return; }
  if (!confirm((histFilter==='all'?'전체':histFilter)+' 기록 '+target.length+'개를 삭제할까요?')) return;
  Promise.all(target.map(function(d){ return fbDelete(d._id); })).then(function(){ loadHist(); });
});

/* ---------- 전체화면 (닫기 버튼 포함) ---------- */
function openFS(html, title) {
  document.getElementById('fs-title').textContent = title || '분석 리포트';
  document.getElementById('fs-iframe').srcdoc = html || '';
  document.getElementById('fsov').classList.remove('hide');
}
function closeFS() {
  document.getElementById('fsov').classList.add('hide');
  document.getElementById('fs-iframe').srcdoc = '';
}
document.getElementById('fs-close').addEventListener('click', closeFS);
document.getElementById('fs-print').addEventListener('click', function(){ document.getElementById('fs-iframe').contentWindow.print(); });
document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeFS(); });
</script>
