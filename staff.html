<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>직원 관리 기록</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#F5F5F7;font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;color:#1A1A2E;}
.hdr{background:#fff;border-bottom:1px solid #E5E7EB;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.back{font-size:20px;color:#9CA3AF;text-decoration:none;margin-right:10px;}
.sync{font-size:10px;padding:3px 8px;border-radius:12px;background:#EDE9FE;color:#6D28D9;font-weight:600;}
.wrap{padding:16px;max-width:720px;margin:0 auto;}
.tnav{display:flex;background:#fff;border:1px solid #E5E7EB;border-radius:12px;padding:4px;gap:2px;margin-bottom:14px;}
.tbtn{flex:1;padding:9px 4px;border:none;background:transparent;font-size:11px;font-weight:600;color:#9CA3AF;border-radius:8px;cursor:pointer;font-family:inherit;}
.tbtn.on{background:#1A1A2E;color:#fff;}
.tp{display:none;}.tp.on{display:block;}
/* 토글 */
.grp{background:#fff;border:1.5px solid #E5E7EB;border-radius:12px;margin-bottom:10px;overflow:hidden;}
.grp-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;cursor:pointer;user-select:none;}
.grp-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.grp-title{font-size:14px;font-weight:700;}
.grp-sub{font-size:11px;color:#9CA3AF;}
.unres-badge{font-size:10px;padding:2px 8px;border-radius:8px;background:#FEE2E2;color:#DC2626;font-weight:700;}
.chev{font-size:11px;color:#9CA3AF;transition:transform 0.2s;}
.grp.open .chev{transform:rotate(180deg);}
.grp-body{display:none;border-top:1px solid #F3F4F6;}
.grp.open .grp-body{display:block;}
/* 직원 행 */
.srow{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid #F9FAFB;cursor:pointer;gap:10px;}
.srow:last-child{border-bottom:none;}
.srow:hover{background:#F9FAFB;}
.srow.sel{background:#EEF2FF;}
.sav{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0;}
.sname{font-size:13px;font-weight:700;}
.srole{font-size:10px;color:#9CA3AF;margin-left:4px;}
.stags{display:flex;gap:4px;margin-left:auto;align-items:center;}
.tag-unr{font-size:10px;padding:2px 7px;border-radius:8px;background:#FEE2E2;color:#DC2626;font-weight:700;}
.tag-tot{font-size:10px;padding:2px 7px;border-radius:8px;background:#F3F4F6;color:#6B7280;}
.tag-none{font-size:11px;color:#D1D5DB;}
/* 상세 패널 */
.det{background:#fff;border:1px solid #E5E7EB;border-radius:12px;padding:14px;margin-top:10px;}
.det-top{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px;border-bottom:1px solid #F3F4F6;margin-bottom:12px;}
.det-av{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:800;}
.det-name{font-size:15px;font-weight:700;}
.det-role{font-size:11px;color:#9CA3AF;margin-top:1px;}
.det-stats{display:flex;gap:14px;}
.dstat{text-align:center;}
.dstat-n{font-size:17px;font-weight:800;display:block;}
.dstat-l{font-size:10px;color:#9CA3AF;}
/* 입력 */
.fbox{background:#F9FAFB;border:1px dashed #E5E7EB;border-radius:10px;padding:12px;margin-bottom:10px;}
.frow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px;}
.fg label{font-size:11px;color:#6B7280;font-weight:600;display:block;margin-bottom:3px;}
.fg input,.fg select,.fg textarea{width:100%;border:1px solid #E5E7EB;border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;outline:none;background:#fff;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:#6366F1;}
.abtn{width:100%;padding:10px;background:#6366F1;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;}
.abtn:disabled{opacity:0.5;}
/* 기록 */
.reclist{display:flex;flex-direction:column;gap:6px;}
.rec{background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:11px 12px;}
.rec.st-완료{border-left:3px solid #10B981;}
.rec.st-진행중{border-left:3px solid #F59E0B;}
.rec.st-미해결{border-left:3px solid #EF4444;}
.rec-head{display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap;}
.rdate{font-size:11px;color:#9CA3AF;font-weight:600;}
.ctag{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:700;}
.c업무지시{background:#EEF2FF;color:#4338CA;}
.c근태{background:#FEF3C7;color:#92400E;}
.c주의경고{background:#FEE2E2;color:#DC2626;}
.rcont{font-size:13px;color:#374151;line-height:1.6;margin-bottom:7px;}
.strow{display:flex;gap:5px;align-items:center;}
.stbtn{font-size:11px;padding:4px 10px;border-radius:20px;border:1.5px solid #E5E7EB;cursor:pointer;font-family:inherit;font-weight:700;background:#F9FAFB;color:#9CA3AF;}
.stbtn.on-완료{background:#D1FAE5;color:#065F46;border-color:#10B981;}
.stbtn.on-진행중{background:#FEF3C7;color:#92400E;border-color:#F59E0B;}
.stbtn.on-미해결{background:#FEE2E2;color:#DC2626;border-color:#EF4444;}
.delbtn{font-size:10px;padding:3px 8px;border:none;border-radius:6px;cursor:pointer;font-family:inherit;font-weight:600;background:#F3F4F6;color:#9CA3AF;margin-left:auto;}
/* 전체 기록 */
.frow-f{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.ffbtn{padding:5px 12px;border-radius:20px;border:1.5px solid #E5E7EB;background:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;color:#6B7280;}
.ffbtn.on{background:#1A1A2E;color:#fff;border-color:#1A1A2E;}
.aname{font-size:11px;font-weight:700;color:#6B7280;padding:2px 7px;background:#F3F4F6;border-radius:6px;}
/* 통계 */
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.sbox{background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:12px;text-align:center;}
.sn{font-size:22px;font-weight:800;}
.sl{font-size:11px;color:#9CA3AF;margin-top:2px;}
.empty{text-align:center;color:#9CA3AF;padding:30px;font-size:13px;}
.loading{text-align:center;color:#9CA3AF;padding:16px;font-size:12px;}
</style>
</head>
<body>

<div class="hdr">
  <div style="display:flex;align-items:center">
    <a href="./index.html" class="back">&#8249;</a>
    <div>
      <div style="font-size:15px;font-weight:700">&#128101; 직원 관리 기록</div>
      <div style="font-size:11px;color:#9CA3AF" id="hd"></div>
    </div>
  </div>
  <span class="sync">&#9729; PC+폰 동기화</span>
</div>

<div class="wrap">
  <div class="tnav">
    <button class="tbtn on" id="tb0">&#128101; 직원별</button>
    <button class="tbtn" id="tb1">&#128203; 전체 기록</button>
    <button class="tbtn" id="tb2">&#128202; 현황</button>
  </div>

  <!-- 직원별 -->
  <div class="tp on" id="tp0">
    <div class="grp" id="grpAll">
      <div class="grp-hdr" id="grpHdr">
        <div class="grp-left">
          <span style="font-size:18px">&#128101;</span>
          <span class="grp-title">전체 직원</span>
          <span class="grp-sub" id="grpSub">(12명)</span>
          <span class="unres-badge hide" id="grpBadge">미해결 0</span>
        </div>
        <span class="chev">&#9660;</span>
      </div>
      <div class="grp-body" id="grpBody"></div>
    </div>

    <div class="det hide" id="detPanel">
      <div class="det-top">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="det-av" id="detAv"></div>
          <div>
            <div class="det-name" id="detName"></div>
            <div class="det-role" id="detRole"></div>
          </div>
        </div>
        <div class="det-stats" id="detStats"></div>
      </div>
      <div class="fbox">
        <div class="frow">
          <div class="fg"><label>날짜</label><input type="date" id="fDate"></div>
          <div class="fg">
            <label>카테고리</label>
            <select id="fCat">
              <option value="업무지시">업무지시</option>
              <option value="근태">근태</option>
              <option value="주의경고">주의/경고</option>
            </select>
          </div>
          <div class="fg">
            <label>처리 상태</label>
            <select id="fStat">
              <option value="진행중">진행중</option>
              <option value="완료">완료</option>
              <option value="미해결">미해결</option>
            </select>
          </div>
        </div>
        <div class="fg" style="margin-bottom:6px">
          <label>내용</label>
          <textarea id="fCont" rows="3" placeholder="전달 내용, 지시 사항, 근태 기록 등을 입력해..."></textarea>
        </div>
        <button class="abtn" id="addBtn">+ 기록 추가</button>
      </div>
      <div id="recArea"><div class="loading">불러오는 중...</div></div>
    </div>
    <div class="empty" id="selHint">&#8593; 직원 이름을 눌러봐</div>
  </div>

  <!-- 전체 기록 -->
  <div class="tp" id="tp1">
    <div class="frow-f">
      <button class="ffbtn on" data-f="전체">전체</button>
      <button class="ffbtn" data-f="업무지시">업무지시</button>
      <button class="ffbtn" data-f="근태">근태</button>
      <button class="ffbtn" data-f="주의경고">주의/경고</button>
      <button class="ffbtn" data-f="미해결">미해결</button>
      <button class="ffbtn" data-f="진행중">진행중</button>
    </div>
    <div id="allList"><div class="loading">불러오는 중...</div></div>
  </div>

  <!-- 현황 -->
  <div class="tp" id="tp2">
    <div class="sgrid" id="statGrid"></div>
    <div id="staffStat"></div>
  </div>
</div>

<script>
var FB_KEY = 'AIzaSyAyG1chECYsbO7cSZUuXmNa0_KDYBmahPY';
var FB_URL = 'https://firestore.googleapis.com/v1/projects/my-system-25497/databases/(default)/documents/staff-records';

var STAFF = [
  {id:'조태경',name:'조태경',role:'실장'},
  {id:'김대환',name:'김대환',role:'경비'},
  {id:'정지환',name:'정지환',role:'경비'},
  {id:'마재곤',name:'마재곤',role:'경비'},
  {id:'구자경',name:'구자경',role:'경비'},
  {id:'배옥식',name:'배옥식',role:'청소반장'},
  {id:'김태경',name:'김태경',role:'미화'},
  {id:'한광희',name:'한광희',role:'미화'},
  {id:'정은지',name:'정은지',role:'미화'},
  {id:'오희성',name:'오희성',role:'미화'},
  {id:'차민자',name:'차민자',role:'미화'},
  {id:'박일월',name:'박일월',role:'미화'}
];
var RC = {실장:'#DC2626',경비:'#2563EB',청소반장:'#059669',미화:'#D97706'};

var allRecs = [];
var selId = null;
var curFilt = '전체';

// 날짜
(function(){
  var n = new Date();
  var days = ['일','월','화','수','목','금','토'];
  document.getElementById('hd').textContent = (n.getMonth()+1)+'월 '+n.getDate()+'일('+days[n.getDay()]+')';
  document.getElementById('fDate').value = n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');
})();

// Firestore 헬퍼
function toFS(o) {
  var f = {};
  Object.keys(o).forEach(function(k) {
    var v = o[k];
    if (v === null || v === undefined) f[k] = {nullValue: null};
    else if (typeof v === 'string') f[k] = {stringValue: v};
    else if (typeof v === 'number') f[k] = {integerValue: String(Math.floor(v))};
    else if (typeof v === 'boolean') f[k] = {booleanValue: v};
    else f[k] = {stringValue: JSON.stringify(v)};
  });
  return {fields: f};
}
function fromFS(doc) {
  if (!doc || !doc.fields) return null;
  var o = {_id: doc.name ? doc.name.split('/').pop() : ''};
  Object.keys(doc.fields).forEach(function(k) {
    var f = doc.fields[k];
    if (f.stringValue !== undefined) { try { o[k] = JSON.parse(f.stringValue); } catch(e) { o[k] = f.stringValue; } }
    else if (f.integerValue !== undefined) o[k] = parseInt(f.integerValue);
    else if (f.booleanValue !== undefined) o[k] = f.booleanValue;
    else o[k] = null;
  });
  return o;
}
function fbAdd(d) {
  return fetch(FB_URL + '?key=' + FB_KEY, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(toFS(d))}).then(function(r){return r.json();});
}
function fbPatch(id, d) {
  return fetch(FB_URL + '/' + id + '?key=' + FB_KEY, {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify(toFS(d))}).then(function(r){return r.json();});
}
function fbDel(id) {
  return fetch(FB_URL + '/' + id + '?key=' + FB_KEY, {method:'DELETE'});
}
function fbAll() {
  return fetch(FB_URL + '?key=' + FB_KEY + '&pageSize=300').then(function(r){return r.json();}).then(function(d){
    return d.documents ? d.documents.map(fromFS).filter(Boolean) : [];
  });
}

// 탭 전환
document.getElementById('tb0').addEventListener('click', function(){ switchTab(0); });
document.getElementById('tb1').addEventListener('click', function(){ switchTab(1); });
document.getElementById('tb2').addEventListener('click', function(){ switchTab(2); });
function switchTab(i) {
  ['tb0','tb1','tb2'].forEach(function(id, j){ document.getElementById(id).classList.toggle('on', j===i); });
  ['tp0','tp1','tp2'].forEach(function(id, j){ document.getElementById(id).classList.toggle('on', j===i); });
  if (i===1) drawAll();
  if (i===2) drawStats();
}

// 토글 열기/닫기
document.getElementById('grpHdr').addEventListener('click', function(){
  document.getElementById('grpAll').classList.toggle('open');
});

// 직원 목록 그리기
function drawStaffList() {
  var unresTotal = 0;
  var html = '';
  STAFF.forEach(function(s) {
    var color = RC[s.role] || '#6B7280';
    var recs = allRecs.filter(function(r){ return r.staffId === s.id; });
    var unr = recs.filter(function(r){ return r.status === '미해결'; }).length;
    unresTotal += unr;
    var isSel = selId === s.id;
    html += '<div class="srow' + (isSel ? ' sel' : '') + '" data-sid="' + s.id + '">';
    html += '<div class="sav" style="background:' + color + '">' + s.name[0] + '</div>';
    html += '<div style="flex:1"><span class="sname">' + s.name + '</span><span class="srole">' + s.role + '</span></div>';
    html += '<div class="stags">';
    if (unr > 0) html += '<span class="tag-unr">미해결 ' + unr + '</span>';
    if (recs.length > 0) html += '<span class="tag-tot">' + recs.length + '건</span>';
    else html += '<span class="tag-none">기록없음</span>';
    html += '</div>';
    html += '<span style="font-size:12px;color:#D1D5DB">&#8250;</span>';
    html += '</div>';
  });
  document.getElementById('grpBody').innerHTML = html;
  // 이벤트 바인딩
  document.querySelectorAll('.srow').forEach(function(row) {
    row.addEventListener('click', function(){
      selectStaff(this.getAttribute('data-sid'));
    });
  });
  // 배지 업데이트
  var badge = document.getElementById('grpBadge');
  var sub = document.getElementById('grpSub');
  sub.textContent = '(' + STAFF.length + '명 · ' + allRecs.length + '건)';
  if (unresTotal > 0) {
    badge.textContent = '미해결 ' + unresTotal;
    badge.classList.remove('hide');
  } else {
    badge.classList.add('hide');
  }
}

// 직원 선택
function selectStaff(sid) {
  selId = sid;
  var s = STAFF.find(function(x){ return x.id === sid; });
  if (!s) return;
  // 선택 표시
  document.querySelectorAll('.srow').forEach(function(r){ r.classList.remove('sel'); });
  var rows = document.querySelectorAll('.srow');
  rows.forEach(function(r){ if (r.getAttribute('data-sid') === sid) r.classList.add('sel'); });
  // 그룹 열기
  document.getElementById('grpAll').classList.add('open');
  // 패널 표시
  document.getElementById('selHint').style.display = 'none';
  document.getElementById('detPanel').classList.remove('hide');
  // 헤더
  var color = RC[s.role] || '#6366F1';
  var av = document.getElementById('detAv');
  av.style.background = color;
  av.textContent = s.name[0];
  document.getElementById('detName').textContent = s.name;
  document.getElementById('detRole').textContent = s.role;
  drawDetStats(s);
  drawDetRecs(s);
  setTimeout(function(){ document.getElementById('detPanel').scrollIntoView({behavior:'smooth', block:'start'}); }, 100);
}

function drawDetStats(s) {
  var recs = allRecs.filter(function(r){ return r.staffId === s.id; });
  var done = recs.filter(function(r){ return r.status === '완료'; }).length;
  var ing = recs.filter(function(r){ return r.status === '진행중'; }).length;
  var unr = recs.filter(function(r){ return r.status === '미해결'; }).length;
  document.getElementById('detStats').innerHTML =
    '<div class="dstat"><span class="dstat-n">' + recs.length + '</span><span class="dstat-l">전체</span></div>' +
    '<div class="dstat"><span class="dstat-n" style="color:#10B981">' + done + '</span><span class="dstat-l">완료</span></div>' +
    '<div class="dstat"><span class="dstat-n" style="color:#F59E0B">' + ing + '</span><span class="dstat-l">진행중</span></div>' +
    '<div class="dstat"><span class="dstat-n" style="color:#EF4444">' + unr + '</span><span class="dstat-l">미해결</span></div>';
}

function drawDetRecs(s) {
  var recs = allRecs.filter(function(r){ return r.staffId === s.id; });
  recs.sort(function(a,b){ return (b.date||'').localeCompare(a.date||''); });
  var el = document.getElementById('recArea');
  if (!recs.length) { el.innerHTML = '<div class="empty">기록 없음</div>'; return; }
  el.innerHTML = '<div class="reclist">' + recs.map(makeRecHTML).join('') + '</div>';
}

function makeRecHTML(r) {
  var nm = r.staffId ? '<span class="aname">' + r.staffId + '</span>' : '';
  var catClass = 'c' + r.cat;
  return '<div class="rec st-' + r.status + '" id="rc' + r._id + '">' +
    '<div class="rec-head">' +
      '<span class="rdate">' + (r.date||'') + '</span>' +
      '<span class="ctag ' + catClass + '">' + (r.cat||'') + '</span>' +
      nm +
    '</div>' +
    '<div class="rcont">' + (r.content||'') + '</div>' +
    '<div class="strow">' +
      '<button class="stbtn' + (r.status==='진행중'?' on-진행중':'') + '" data-id="' + r._id + '" data-st="진행중">진행중</button>' +
      '<button class="stbtn' + (r.status==='완료'?' on-완료':'') + '" data-id="' + r._id + '" data-st="완료">&#10003; 완료</button>' +
      '<button class="stbtn' + (r.status==='미해결'?' on-미해결':'') + '" data-id="' + r._id + '" data-st="미해결">&#10007; 미해결</button>' +
      '<button class="delbtn" data-id="' + r._id + '">삭제</button>' +
    '</div>' +
  '</div>';
}

// 이벤트 위임으로 상태변경/삭제
document.addEventListener('click', function(e) {
  if (e.target.classList.contains('stbtn')) {
    var id = e.target.getAttribute('data-id');
    var st = e.target.getAttribute('data-st');
    if (id && st) chgStatus(id, st);
  }
  if (e.target.classList.contains('delbtn')) {
    var id = e.target.getAttribute('data-id');
    if (id) delRec(id);
  }
  if (e.target.classList.contains('ffbtn')) {
    document.querySelectorAll('.ffbtn').forEach(function(b){ b.classList.remove('on'); });
    e.target.classList.add('on');
    curFilt = e.target.getAttribute('data-f');
    drawAll();
  }
});

function chgStatus(id, status) {
  var rec = allRecs.find(function(r){ return r._id === id; });
  if (!rec) return;
  rec.status = status;
  fbPatch(id, rec).then(function(){
    drawStaffList();
    var s = STAFF.find(function(x){ return x.id === selId; });
    if (s) { drawDetStats(s); drawDetRecs(s); }
    if (document.getElementById('tp1').classList.contains('on')) drawAll();
  });
}

function delRec(id) {
  if (!confirm('이 기록을 삭제할까요?')) return;
  allRecs = allRecs.filter(function(r){ return r._id !== id; });
  fbDel(id).then(function(){
    drawStaffList();
    var s = STAFF.find(function(x){ return x.id === selId; });
    if (s) { drawDetStats(s); drawDetRecs(s); }
    if (document.getElementById('tp1').classList.contains('on')) drawAll();
  });
}

// 기록 추가
document.getElementById('addBtn').addEventListener('click', function(){
  if (!selId) { alert('직원을 먼저 선택해줘'); return; }
  var cont = document.getElementById('fCont').value.trim();
  if (!cont) { alert('내용을 입력해줘'); return; }
  var s = STAFF.find(function(x){ return x.id === selId; });
  var rec = {
    staffId: selId,
    staffRole: s ? s.role : '',
    date: document.getElementById('fDate').value,
    cat: document.getElementById('fCat').value,
    status: document.getElementById('fStat').value,
    content: cont,
    ts: Date.now()
  };
  var btn = document.getElementById('addBtn');
  btn.disabled = true; btn.textContent = '저장 중...';
  fbAdd(rec).then(function(d){
    if (d.name) rec._id = d.name.split('/').pop();
    allRecs.unshift(rec);
    document.getElementById('fCont').value = '';
    drawStaffList();
    var sf = STAFF.find(function(x){ return x.id === selId; });
    if (sf) { drawDetStats(sf); drawDetRecs(sf); }
    btn.disabled = false; btn.textContent = '+ 기록 추가';
  }).catch(function(e){ btn.disabled = false; btn.textContent = '+ 기록 추가'; alert('오류: ' + e.message); });
});

// 전체 기록
function drawAll() {
  var recs = allRecs.slice();
  if (curFilt !== '전체') recs = recs.filter(function(r){ return r.cat === curFilt || r.status === curFilt; });
  recs.sort(function(a,b){ return (b.date||'').localeCompare(a.date||''); });
  var el = document.getElementById('allList');
  if (!recs.length) { el.innerHTML = '<div class="empty">기록 없음</div>'; return; }
  el.innerHTML = '<div class="reclist">' + recs.map(makeRecHTML).join('') + '</div>';
}

// 통계
function drawStats() {
  var total = allRecs.length;
  var done = allRecs.filter(function(r){ return r.status === '완료'; }).length;
  var unr = allRecs.filter(function(r){ return r.status === '미해결'; }).length;
  document.getElementById('statGrid').innerHTML =
    '<div class="sbox"><div class="sn">' + total + '</div><div class="sl">총 기록</div></div>' +
    '<div class="sbox"><div class="sn" style="color:#10B981">' + done + '</div><div class="sl">완료</div></div>' +
    '<div class="sbox"><div class="sn" style="color:#EF4444">' + unr + '</div><div class="sl">미해결</div></div>';
  var rows = STAFF.map(function(s){
    var sr = allRecs.filter(function(r){ return r.staffId === s.id; });
    var u = sr.filter(function(r){ return r.status === '미해결'; }).length;
    return {s:s, cnt:sr.length, u:u};
  }).sort(function(a,b){ return b.cnt - a.cnt; });
  document.getElementById('staffStat').innerHTML =
    '<div style="font-size:12px;font-weight:700;margin-bottom:8px">직원별 현황</div>' +
    rows.map(function(item){
      var c = RC[item.s.role] || '#6B7280';
      var pct = total > 0 ? Math.round(item.cnt / total * 100) : 0;
      return '<div style="background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px">' +
        '<div style="width:32px;height:32px;border-radius:8px;background:' + c + ';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px">' + item.s.name[0] + '</div>' +
        '<div style="flex:1">' +
          '<div style="display:flex;justify-content:space-between;margin-bottom:4px">' +
            '<span style="font-size:12px;font-weight:700">' + item.s.name + '</span>' +
            '<span style="font-size:11px;color:#9CA3AF">' + item.cnt + '건' + (item.u > 0 ? ' <span style="color:#EF4444;font-weight:700">미해결 ' + item.u + '</span>' : '') + '</span>' +
          '</div>' +
          '<div style="background:#F3F4F6;border-radius:4px;height:5px;overflow:hidden"><div style="background:' + c + ';width:' + pct + '%;height:100%"></div></div>' +
        '</div>' +
      '</div>';
    }).join('');
}

// 초기 로드
fbAll().then(function(docs){
  allRecs = docs.sort(function(a,b){ return (b.ts||0)-(a.ts||0); });
  drawStaffList();
}).catch(function(){ drawStaffList(); });
</script>
</body>
</html>
