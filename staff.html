<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>직원 관리 v44-0626-1050</title>
<meta name="theme-color" content="#4C6EF5">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="직원관리">
<link rel="manifest" href="staff-manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ===== RESET & TOKENS ===== */
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#F2F5FF;
  --card:#FFFFFF;
  --card2:#F7F9FF;
  --border:#E2E8F8;
  --border2:#C9D4F0;
  --ink:#1A2540;
  --ink2:#4A5680;
  --ink3:#8C99C0;
  --accent:#4C6EF5;
  --accent-s:#EEF2FF;
  --accent2:#748FFC;
  --green:#16A34A; --green-s:#DCFCE7;
  --amber:#D97706; --amber-s:#FEF3C7;
  --red:#DC2626;   --red-s:#FEE2E2;
  --blue:#2563EB;  --blue-s:#DBEAFE;
  --실장:#E53E3E; --경비:#2563EB; --청소반장:#16A34A; --미화:#B7791F;
  --r:14px; --shadow:0 2px 12px rgba(76,110,245,.10);
}
html,body{background:var(--bg);color:var(--ink);font-family:'Noto Sans KR',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;}

/* ===== HEADER ===== */
.hdr{background:var(--card);border-bottom:2px solid var(--border);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:var(--shadow);}
.hdr-left{display:flex;align-items:center;gap:10px;}
.back{width:34px;height:34px;border-radius:10px;border:2px solid var(--border2);background:var(--bg);color:var(--ink2);display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:20px;font-weight:700;transition:.15s;}
.back:hover{background:var(--accent-s);border-color:var(--accent);}
.hdr-info h1{font-size:16px;font-weight:900;}
.hdr-info p{font-size:11px;color:var(--ink3);}
.badge{font-size:11px;font-weight:700;padding:4px 11px;border-radius:20px;background:var(--accent-s);color:var(--accent);border:1.5px solid var(--accent2);}
.ver-badge{font-size:10px;color:var(--ink3);font-weight:600;}

/* ===== SEARCH ===== */
.search-bar{padding:10px 16px;}
.search-inner{display:flex;align-items:center;background:var(--card);border:2px solid var(--border2);border-radius:12px;padding:9px 14px;gap:8px;transition:.15s;}
.search-inner:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(76,110,245,.12);}
.search-inner input{flex:1;border:none;outline:none;font-size:14px;color:var(--ink);background:transparent;font-family:inherit;}
.search-inner input::placeholder{color:var(--ink3);}
.s-ico{font-size:18px;}
.s-clr{font-size:16px;cursor:pointer;color:var(--ink3);background:none;border:none;font-family:inherit;}

/* ===== TABS ===== */
.tabs{display:flex;margin:0 16px;background:var(--card);border:2px solid var(--border);border-radius:12px;padding:4px;gap:3px;overflow-x:auto;}
.tab{flex:1;min-width:54px;padding:9px 4px;border:none;background:transparent;font-size:12px;font-weight:700;color:var(--ink3);border-radius:9px;cursor:pointer;font-family:inherit;transition:.18s;display:flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap;}
.tab-ico{font-size:18px;}
.tab.on{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(76,110,245,.35);}
.tab:not(.on):hover{background:var(--accent-s);}
.panel{display:none;padding:14px 16px;}
.panel.on{display:block;}

/* ===== 직원 필터 칩 ===== */
.staff-filter{display:flex;gap:6px;margin:10px 16px 0;flex-wrap:wrap;}
.sf-chip{padding:6px 14px;border-radius:20px;border:2px solid var(--border2);background:var(--card);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--ink3);transition:.15s;display:flex;align-items:center;gap:4px;}
.sf-chip.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.sf-chip:hover:not(.on){border-color:var(--border);color:var(--ink2);}

/* ===== 직원 그리드 — 가로형 직사각 ===== */
.staff-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:14px;}
@media(min-width:540px){.staff-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:800px){.staff-grid{grid-template-columns:repeat(4,1fr);}}

/* 가로형 카드: 아바타 왼쪽, 텍스트 오른쪽 */
.sc{
  background:var(--card);border:2px solid var(--border);border-radius:12px;
  padding:10px 12px;display:flex;flex-direction:row;align-items:center;gap:10px;
  cursor:pointer;transition:.18s;position:relative;min-height:54px;
}
.sc:hover{border-color:var(--accent2);background:var(--accent-s);box-shadow:var(--shadow);}
.sc.active{border-color:var(--accent);background:var(--accent-s);box-shadow:0 0 0 3px rgba(76,110,245,.18);}
.sc.retired{opacity:.4;filter:grayscale(.7);}

.sc-av{
  width:40px;height:40px;border-radius:11px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:17px;font-weight:900;
  box-shadow:0 2px 8px rgba(0,0,0,.15);
}
.sc-info{flex:1;min-width:0;}
.sc-name{font-size:13px;font-weight:800;color:var(--ink);letter-spacing:-.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sc-role{font-size:10px;color:var(--ink3);font-weight:600;margin-top:1px;}
.sc-phone-link{
  font-size:10px;font-weight:700;color:var(--accent);text-decoration:none;
  display:flex;align-items:center;gap:2px;margin-top:3px;
  transition:.15s;white-space:nowrap;
}
.sc-phone-link:hover{color:var(--accent2);}
.sc-badge{
  position:absolute;top:-5px;right:-5px;
  width:18px;height:18px;border-radius:50%;
  background:var(--red);font-size:9px;font-weight:900;color:#fff;
  display:flex;align-items:center;justify-content:center;
  border:2px solid var(--bg);
}
.sc-edit{
  flex-shrink:0;width:26px;height:26px;border-radius:8px;
  background:var(--bg);border:1.5px solid var(--border2);
  font-size:12px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:.15s;padding:0;opacity:0;
}
.sc:hover .sc-edit{opacity:1;}
.sc-edit:hover{background:var(--accent-s);border-color:var(--accent);}

/* 신규 직원 추가 버튼 */
.add-staff-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:10px;margin-bottom:10px;
  background:var(--green-s);border:2px dashed var(--green);border-radius:12px;
  color:var(--green);font-size:13px;font-weight:800;cursor:pointer;
  font-family:inherit;transition:.15s;
}
.add-staff-btn:hover{background:var(--green);color:#fff;}

/* ===== 최근기록 섹션 ===== */
.recent-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.recent-head h3{font-size:13px;font-weight:800;color:var(--ink2);display:flex;align-items:center;gap:6px;}
.recent-more{font-size:12px;color:var(--accent);font-weight:700;cursor:pointer;background:none;border:none;font-family:inherit;}
.recent-more:hover{text-decoration:underline;}

/* ===== 기록 카드 ===== */
.rec-card{background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:7px;transition:.15s;}
.rec-card:hover{border-color:var(--border2);box-shadow:var(--shadow);}
.rec-card.s-완료{border-left:4px solid var(--green);}
.rec-card.s-진행중{border-left:4px solid var(--amber);}
.rec-card.s-미해결{border-left:4px solid var(--red);}
.rec-top{display:flex;align-items:center;gap:6px;margin-bottom:7px;flex-wrap:wrap;}
.rdate{font-size:11px;color:var(--ink3);font-weight:600;}
.cat-tag{font-size:11px;padding:2px 9px;border-radius:7px;font-weight:700;}
.cat-업무지시{background:var(--blue-s);color:var(--blue);}
.cat-근태{background:var(--amber-s);color:var(--amber);}
.cat-주의경고{background:var(--red-s);color:var(--red);}
.st-badge{font-size:11px;padding:2px 9px;border-radius:7px;font-weight:700;margin-left:auto;}
.st-완료{background:var(--green-s);color:var(--green);}
.st-진행중{background:var(--amber-s);color:var(--amber);}
.st-미해결{background:var(--red-s);color:var(--red);}
.who-tag{font-size:11px;padding:2px 9px;border-radius:7px;background:var(--accent-s);color:var(--accent);font-weight:700;}
.rcont{font-size:13px;color:var(--ink);line-height:1.65;margin-bottom:8px;white-space:pre-wrap;}
.rec-acts{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.act-btn{font-size:11px;padding:4px 11px;border-radius:20px;border:2px solid var(--border2);cursor:pointer;font-family:inherit;font-weight:700;background:var(--bg);color:var(--ink3);transition:.15s;display:flex;align-items:center;gap:3px;}
.act-btn:hover{border-color:var(--border);}
.act-btn.on-완료{background:var(--green-s);color:var(--green);border-color:var(--green);}
.act-btn.on-진행중{background:var(--amber-s);color:var(--amber);border-color:var(--amber);}
.act-btn.on-미해결{background:var(--red-s);color:var(--red);border-color:var(--red);}
.edit-btn{font-size:11px;padding:4px 11px;border-radius:20px;border:2px solid var(--border2);cursor:pointer;font-family:inherit;font-weight:700;background:var(--bg);color:var(--ink2);transition:.15s;display:flex;align-items:center;gap:3px;}
.edit-btn:hover{border-color:var(--accent2);color:var(--accent);}
.del-btn{font-size:11px;padding:4px 10px;border-radius:20px;border:none;cursor:pointer;font-family:inherit;font-weight:700;background:transparent;color:var(--ink3);margin-left:auto;transition:.15s;}
.del-btn:hover{background:var(--red-s);color:var(--red);}

/* 엑셀 목록 */
.tbl-wrap{overflow-x:auto;border-radius:var(--r);border:2px solid var(--border);}
.tbl{width:100%;border-collapse:collapse;min-width:540px;font-size:12px;}
.tbl th{background:var(--card2);color:var(--ink2);font-weight:800;padding:9px 11px;text-align:left;border-bottom:2px solid var(--border2);white-space:nowrap;}
.tbl td{padding:8px 11px;border-bottom:1px solid var(--border);color:var(--ink);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--accent-s);}

/* ===== 슬라이드 패널 ===== */
.slide-overlay{position:fixed;inset:0;background:rgba(26,37,64,.5);z-index:400;display:none;backdrop-filter:blur(3px);}
.slide-overlay.show{display:block;}
.slide-panel{
  position:fixed;right:0;top:0;bottom:0;width:420px;max-width:100%;
  background:var(--card);border-left:2px solid var(--border2);
  display:flex;flex-direction:column;z-index:401;
  transform:translateX(100%);transition:transform .28s cubic-bezier(.34,1.1,.64,1);
  box-shadow:-4px 0 30px rgba(76,110,245,.12);
}
.slide-panel.open{transform:translateX(0);}
.sp-hdr{padding:16px 18px 12px;border-bottom:2px solid var(--border);background:var(--card);flex-shrink:0;}
.sp-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.sp-av{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:900;box-shadow:0 3px 10px rgba(0,0,0,.15);}
.sp-name{font-size:18px;font-weight:900;}
.sp-role{font-size:11px;color:var(--ink3);margin-top:2px;}
.sp-phone{font-size:13px;font-weight:700;color:var(--accent);display:flex;align-items:center;gap:5px;margin-top:4px;}
.sp-phone a{color:inherit;text-decoration:none;}
.sp-phone a:hover{text-decoration:underline;}
.sp-close{margin-left:auto;background:var(--red);color:#fff;border:none;border-radius:12px;padding:10px 18px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;flex-shrink:0;box-shadow:0 2px 8px rgba(220,38,38,.25);}
.sp-stats{display:flex;gap:8px;}
.sp-stat{flex:1;background:var(--bg);border:2px solid var(--border);border-radius:10px;padding:8px;text-align:center;}
.sp-stat-n{font-size:18px;font-weight:900;display:block;}
.sp-stat-l{font-size:10px;color:var(--ink3);font-weight:600;}
.sp-body{flex:1;overflow-y:auto;padding:14px 18px 20px;}
.sp-body::-webkit-scrollbar{width:4px;}
.sp-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* 입력 폼 */
.form-card{background:var(--bg);border:2px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:14px;}
.form-title{font-size:12px;font-weight:800;color:var(--ink2);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px;}
.fg label{font-size:11px;color:var(--ink3);font-weight:700;display:block;margin-bottom:3px;}
.fg input,.fg select,.fg textarea{width:100%;background:var(--card);border:2px solid var(--border2);border-radius:9px;padding:8px 10px;font-size:13px;font-family:inherit;color:var(--ink);outline:none;transition:.15s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(76,110,245,.1);}
.fg.full{grid-column:1/-1;}
.fg textarea{min-height:72px;resize:vertical;line-height:1.6;}
.add-btn{width:100%;padding:11px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;transition:.15s;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:6px;}
.add-btn:hover{background:#15803d;}
.add-btn:disabled{opacity:.4;cursor:not-allowed;}

.sp-rec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.sp-rec-cnt{font-size:12px;font-weight:700;color:var(--ink2);}
.vt-grp{display:flex;gap:4px;}
.vt-btn{padding:4px 10px;border-radius:8px;border:2px solid var(--border2);background:transparent;color:var(--ink3);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;}
.vt-btn.on{background:var(--accent-s);color:var(--accent);border-color:var(--accent2);}

/* ===== 달력 ===== */
.cal-nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-nav-row h2{font-size:17px;font-weight:900;color:var(--ink);}
.cal-nav-btns{display:flex;gap:6px;}
.cal-nav-btn{width:34px;height:34px;border-radius:10px;border:2px solid var(--border2);background:var(--card);color:var(--ink2);font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;display:flex;align-items:center;justify-content:center;}
.cal-nav-btn:hover{border-color:var(--accent);color:var(--accent);}
.cal-today-btn{padding:6px 14px;border-radius:10px;border:2px solid var(--border2);background:var(--card);color:var(--ink2);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;}
.cal-today-btn:hover{border-color:var(--accent);color:var(--accent);}

.cal-legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--ink2);}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;border-radius:var(--r);overflow:hidden;}
.cal-dow{background:var(--card2);padding:7px 4px;text-align:center;font-size:11px;font-weight:800;color:var(--ink3);}
.cal-dow.sun{color:var(--red);}
.cal-cell{
  background:var(--card);border:1.5px solid var(--border);border-radius:10px;
  padding:6px 5px;min-height:90px;cursor:pointer;transition:.15s;
  display:flex;flex-direction:column;
}
.cal-cell:hover{border-color:var(--accent2);background:var(--accent-s);}
.cal-cell.today{border-color:var(--accent);border-width:2px;background:var(--accent-s);}
.cal-cell.selected{border-color:var(--accent);border-width:2.5px;box-shadow:0 0 0 2px rgba(76,110,245,.2);}
.cal-cell.empty{background:transparent;border-color:transparent;cursor:default;min-height:78px;}
.cal-cell.empty:hover{background:transparent;border-color:transparent;}
.cal-dnum{font-size:12px;font-weight:800;color:var(--ink2);margin-bottom:4px;line-height:1;}
.cal-cell.today .cal-dnum{color:var(--accent);}
.cal-cell.sun .cal-dnum{color:var(--red);}
.cal-dot-row{display:flex;flex-wrap:wrap;gap:2px;margin-bottom:3px;}
.cal-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.cal-item{font-size:9px;color:var(--ink2);line-height:1.35;overflow:hidden;margin-top:2px;word-break:keep-all;}
/* 입퇴사 마커 */
.cal-hire{font-size:9px;font-weight:800;color:var(--green);background:var(--green-s);border-radius:4px;padding:1px 4px;margin-top:2px;}
.cal-resign{font-size:9px;font-weight:800;color:var(--red);background:var(--red-s);border-radius:4px;padding:1px 4px;margin-top:2px;}

/* 날짜 상세 */
.cal-detail{background:var(--card);border:2px solid var(--border2);border-radius:var(--r);padding:14px;margin-top:12px;}
.cal-detail-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-detail-hdr h3{font-size:14px;font-weight:800;color:var(--ink);}
.cal-add-btn{padding:6px 14px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}

/* ===== 현황 ===== */
.stat-kpi{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px;}
@media(min-width:540px){.stat-kpi{grid-template-columns:repeat(4,1fr);}}
.kpi{background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:14px;text-align:center;}
.kpi-n{font-size:26px;font-weight:900;display:block;}
.kpi-l{font-size:11px;color:var(--ink3);font-weight:600;margin-top:2px;}
.staff-row{background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:7px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:.15s;}
.staff-row:hover{border-color:var(--accent2);box-shadow:var(--shadow);}
.sr-av{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:900;flex-shrink:0;}
.sr-bar-w{flex:1;}
.sr-top{display:flex;justify-content:space-between;margin-bottom:4px;}
.sr-name{font-size:13px;font-weight:800;}
.sr-bar{background:var(--border);border-radius:3px;height:5px;overflow:hidden;}
.sr-fill{height:100%;border-radius:3px;transition:width .5s;}

/* ===== 입퇴사 이력 탭 ===== */
.hist-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.hf-chip{padding:5px 13px;border-radius:20px;border:2px solid var(--border2);background:var(--card);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--ink3);transition:.15s;}
.hf-chip.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.hf-chip:hover:not(.on){border-color:var(--border);color:var(--ink2);}

.hist-card{background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px;display:flex;gap:14px;align-items:flex-start;}
.hist-card.type-입사{border-left:4px solid var(--green);}
.hist-card.type-퇴사{border-left:4px solid var(--red);}
.hist-card.type-복직{border-left:4px solid var(--accent);}
.hist-icon{font-size:24px;flex-shrink:0;}
.hist-body{flex:1;}
.hist-type-badge{display:inline-block;font-size:11px;font-weight:800;padding:2px 9px;border-radius:7px;margin-bottom:5px;}
.type-badge-입사{background:var(--green-s);color:var(--green);}
.type-badge-퇴사{background:var(--red-s);color:var(--red);}
.type-badge-복직{background:var(--accent-s);color:var(--accent);}
.hist-name{font-size:15px;font-weight:900;color:var(--ink);margin-bottom:3px;}
.hist-meta{font-size:12px;color:var(--ink3);font-weight:600;line-height:1.7;}
.hist-memo{font-size:13px;color:var(--ink2);margin-top:6px;line-height:1.6;}
.hist-date{font-size:12px;color:var(--ink3);font-weight:700;white-space:nowrap;flex-shrink:0;}
.hist-del{font-size:11px;padding:3px 9px;border-radius:20px;border:none;cursor:pointer;font-family:inherit;font-weight:700;background:transparent;color:var(--ink3);transition:.15s;margin-top:4px;}
.hist-del:hover{background:var(--red-s);color:var(--red);}

/* ===== 전체기록 탭 필터 ===== */
.flt-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.flt-btn{padding:6px 13px;border-radius:20px;border:2px solid var(--border2);background:var(--card);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--ink3);transition:.15s;display:flex;align-items:center;gap:4px;}
.flt-btn.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.flt-btn:hover:not(.on){border-color:var(--border);color:var(--ink2);}
.all-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid var(--border);}
.all-hdr h3{font-size:13px;font-weight:800;color:var(--ink2);}
.copy-btn{padding:6px 13px;border-radius:9px;border:2px solid var(--border2);background:var(--card);color:var(--ink2);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;display:flex;align-items:center;gap:4px;}
.copy-btn:hover{border-color:var(--accent2);color:var(--accent);}

/* ===== 신규 직원 등록 모달 ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(26,37,64,.55);z-index:600;display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px);}
.modal-overlay.show{display:flex;}
.modal-box{background:var(--card);border:2px solid var(--border);border-radius:20px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:22px;box-shadow:0 12px 40px rgba(76,110,245,.18);animation:pop .22s cubic-bezier(.34,1.26,.64,1);}
@keyframes pop{from{transform:scale(.9);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal-box h3{font-size:16px;font-weight:900;margin-bottom:4px;display:flex;align-items:center;gap:8px;}
.modal-box p{font-size:12px;color:var(--ink3);margin-bottom:14px;}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.modal-grid .fg.full{grid-column:1/-1;}
.m-btn-row{display:flex;gap:8px;margin-top:14px;}
.m-save{flex:1;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;}
.m-cancel{padding:11px 18px;background:var(--bg);border:2px solid var(--border2);color:var(--ink2);border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.m-cancel:hover{border-color:var(--red);color:var(--red);}
.retire-warn{background:var(--amber-s);border:1.5px solid var(--amber);border-radius:9px;padding:9px 12px;font-size:12px;color:var(--amber);font-weight:600;margin-bottom:4px;display:none;}
.m-del{padding:11px 14px;background:var(--red-s);border:2px solid var(--red);color:var(--red);border-radius:11px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;}
.m-del:hover{background:var(--red);color:#fff;}

/* ===== 기록 수정 모달 ===== */
.rec-edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.rec-edit-grid .fg.full{grid-column:1/-1;}

/* ===== 입퇴사 등록 모달 ===== */
.hist-reg-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.hist-reg-grid .fg.full{grid-column:1/-1;}

/* ===== MISC ===== */
.empty{text-align:center;color:var(--ink3);padding:28px;font-size:13px;font-weight:600;}
.empty-ico{font-size:36px;display:block;margin-bottom:8px;}
.loading{text-align:center;color:var(--ink3);padding:18px;font-size:12px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--ink);color:#fff;padding:11px 20px;border-radius:999px;font-size:13px;font-weight:700;opacity:0;transition:.28s;z-index:9999;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(26,37,64,.3);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.divider{font-size:11px;font-weight:700;color:var(--ink3);padding:12px 0 6px;display:flex;align-items:center;gap:8px;}
.divider::after{content:'';flex:1;height:1.5px;background:var(--border);}

/* 근속연수 뱃지 */
.tenure-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:7px;background:var(--accent-s);color:var(--accent);margin-left:4px;}

/* ===== PIN 잠금 ===== */
.lock-screen{position:fixed;inset:0;background:linear-gradient(145deg,#F2F5FF 0%,#E8EEFF 100%);z-index:9000;display:flex;align-items:center;justify-content:center;padding:20px;}
.lock-screen.hide{display:none;}
.lock-card{background:#fff;border:2px solid var(--border);border-radius:24px;padding:28px 24px;width:100%;max-width:360px;box-shadow:0 8px 40px rgba(76,110,245,.15);text-align:center;box-sizing:border-box;}
.lock-icon{font-size:40px;margin-bottom:10px;}
.lock-title{font-size:20px;font-weight:900;color:var(--ink);margin-bottom:4px;}
.lock-sub{font-size:13px;color:var(--ink3);font-weight:600;margin-bottom:20px;}
.pin-dots{display:flex;gap:12px;justify-content:center;margin-bottom:20px;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2.5px solid var(--border2);background:transparent;transition:.15s;}
.pin-dot.filled{background:var(--accent);border-color:var(--accent);}
.pin-dot.err{background:var(--red);border-color:var(--red);}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.pin-btn{height:54px;border-radius:14px;border:2px solid var(--border);background:var(--bg);font-size:20px;font-weight:800;color:var(--ink);cursor:pointer;font-family:inherit;transition:.15s;display:flex;align-items:center;justify-content:center;}
.pin-btn:hover{background:var(--accent-s);border-color:var(--accent2);}
.pin-btn:active{transform:scale(.95);}
.pin-err{font-size:12px;color:var(--red);font-weight:700;min-height:18px;margin-bottom:6px;}
.pin-setup-btns{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.pin-setup-btn{padding:13px;border-radius:12px;border:none;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;transition:.15s;}
.pin-setup-btn.primary{background:var(--accent);color:#fff;}
.pin-setup-btn.secondary{background:var(--bg);color:var(--ink2);border:2px solid var(--border2);}
.pin-change-btns{text-align:center;}
.pin-change-link{background:none;border:none;font-size:12px;color:var(--ink3);font-weight:700;cursor:pointer;font-family:inherit;}
.pin-change-link:hover{color:var(--accent);}
</style>
</head>
<body>

<!-- ===== PIN 잠금 ===== -->
<div class="lock-screen" id="lockScreen">
  <div class="lock-card">
    <div class="lock-icon">🏢</div>
    <div class="lock-title" id="lockTitle">🔐 직원 관리</div>
    <div class="lock-sub" id="lockSub"></div>
    <div class="pin-dots" id="pinDots" style="display:none">
      <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-err" id="pinErr" style="display:none"></div>
    <div class="pin-pad" id="pinPad" style="display:none">
      <button class="pin-btn" data-n="1">1</button><button class="pin-btn" data-n="2">2</button><button class="pin-btn" data-n="3">3</button>
      <button class="pin-btn" data-n="4">4</button><button class="pin-btn" data-n="5">5</button><button class="pin-btn" data-n="6">6</button>

      <button class="pin-btn" data-n="0">0</button>
      <button class="pin-btn" style="font-size:13px;color:var(--ink3)" onclick="lockApp&&lockApp()">🔒</button>
    </div>
    <div class="pin-setup-btns" id="pinSetupBtns" style="display:none">
      <button class="pin-setup-btn primary" id="pinSetupOk">🔐 PIN 설정하기</button>
      <button class="pin-setup-btn secondary" id="pinSkip">잠금 없이 사용</button>
    </div>
    <div class="pin-change-btns" id="pinChangeBtns" style="display:none">
      <button class="pin-change-link" id="pinChangeBtn">PIN 변경</button>
    </div>
  </div>
</div>

<!-- ===== HEADER ===== */
<div class="hdr">
  <div class="hdr-left">
    <a class="back" href="worklog.html">←</a>
    <div class="hdr-info">
      <h1>👥 직원 관리</h1>
      <p id="hd"></p>
    </div>
  </div>

    <span class="badge" id="staffCntBadge">재직 0명</span>
    <span class="ver-badge" id="verBadge">v44-0626-1050</span>
  </div>
</div>

<!-- ===== SEARCH ===== -->
<div class="search-bar">
  <div class="search-inner">
    <span class="s-ico">🔍</span>
    <input type="search" id="searchInput" placeholder="이름·직책·기록 검색...">
    <button class="s-clr" id="searchClear">✕</button>

</div>

<!-- ===== TABS ===== -->
<div class="tabs">

<!-- ===== 달력 탭 ===== -->

    <div class="leg-item"><span style="background:var(--red-s);color:var(--red);font-size:10px;font-weight:800;padding:1px 5px;border-radius:4px">퇴사</span></div>

<!-- ===== 전체기록 탭 ===== -->

  <div class="divider">📊 직원별 현황</div>

</div>

/* 근속연수 계산 */
function calcTenure(hiredStr, resignedStr){
  if(!hiredStr)return'';
  // 형식: YY.MM.DD 또는 YYYY.MM.DD
  try{
    var parts=hiredStr.split('.');
    var y=parseInt(parts[0]);var m=parseInt(parts[1]||1)-1;var d=parseInt(parts[2]||1);
    if(y<100)y+=2000;
    var start=new Date(y,m,d);
    var end=resignedStr?new Date(resignedStr):new Date();
    var diff=end-start;
    if(diff<0)return'';
    var months=Math.floor(diff/(1000*60*60*24*30.44));
    if(months<1)return'1개월 미만';
    if(months<12)return months+'개월';
    var yrs=Math.floor(months/12);var rem=months%12;
    return yrs+'년'+(rem>0?' '+rem+'개월':'');
  }catch(e){return'';}
}

/* ===== Firestore REST ===== */
function colUrl(c){return'https://firestore.googleapis.com/v1/projects/'+PRJ+'/databases/(default)/documents/'+c;}
function toFS(o){
  var f={};
  Object.keys(o).forEach(function(k){
    var v=o[k];
    if(v===null||v===undefined)f[k]={nullValue:null};
    else if(typeof v==='string')f[k]={stringValue:v};
    else if(typeof v==='number')f[k]={integerValue:String(Math.floor(v))};
    else if(typeof v==='boolean')f[k]={booleanValue:v};
    else f[k]={stringValue:JSON.stringify(v)};
  });
  return{fields:f};
}
function fromFS(doc){
  if(!doc||!doc.fields)return null;
  var o={_id:doc.name?doc.name.split('/').pop():''};
  Object.keys(doc.fields).forEach(function(k){
    var f=doc.fields[k];
    if(f.stringValue!==undefined)o[k]=f.stringValue;
    else if(f.integerValue!==undefined)o[k]=parseInt(f.integerValue);
    else if(f.booleanValue!==undefined)o[k]=f.booleanValue;
    else o[k]=null;
  });
  return o;
}
function fbAdd(col,d){return fetch(colUrl(col)+'?key='+FB_KEY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(toFS(d))}).then(function(r){return r.json();});}
function fbPatch(col,id,d){return fetch(colUrl(col)+'/'+id+'?key='+FB_KEY,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(toFS(d))}).then(function(r){return r.json();});}
function fbDel(col,id){return fetch(colUrl(col)+'/'+id+'?key='+FB_KEY,{method:'DELETE'});}
function fbAll(col){return fetch(colUrl(col)+'?key='+FB_KEY+'&pageSize=300').then(function(r){return r.json();}).then(function(d){return d.documents?d.documents.map(fromFS).filter(Boolean):[];});}
function fbQuery(col,field,value){
  var url='https://firestore.googleapis.com/v1/projects/'+PRJ+'/databases/(default)/documents:runQuery?key='+FB_KEY;
  var body={structuredQuery:{from:[{collectionId:col}],where:{fieldFilter:{field:{fieldPath:field},op:'EQUAL',value:{stringValue:value}}}}};
  return fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
    .then(function(r){return r.json();})
    .then(function(d){return Array.isArray(d)?d.filter(function(x){return x.document;}).map(function(x){return fromFS(x.document);}):[];});
}

    else{var ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();toast('📋 복사됨');}
  });
  /* 입퇴사 이력 */
  var ahb=document.getElementById('addHistBtn');if(ahb)ahb.addEventListener('click',openHistModal);
  var hm=document.getElementById('histModal');if(hm)hm.addEventListener('click',function(e){if(e.target===this)closeHistModal();});
  var hsb=document.getElementById('histSaveBtn');
  if(hsb)hsb.addEventListener('click',async function(){
    var sid=document.getElementById('hmStaff').value;
    if(!sid){toast('직원을 선택하세요');return;}
    var s=STAFF.find(function(x){return x.id===sid;});if(!s){toast('직원을 찾을 수 없습니다');return;}
    var type=document.getElementById('hmType').value,date=document.getElementById('hmDate').value;
    if(!date){toast('날짜를 입력하세요');return;}
    var memo=document.getElementById('hmMemo').value.trim();
    try{
      var h={staffId:s.id,staffName:s.name,type:type,date:date,memo:memo,ts:Date.now()};
      await addHistoryEntry(h);
      if(type==='퇴사'){s.status='퇴사';s.resigned=date;await saveStaffToFirebase(s);await syncContact(s);}
      if(type==='복직'){s.status='재직중';s.resigned='';await saveStaffToFirebase(s);await syncContact(s);}
      closeHistModal();drawHist();drawGrid();refreshAll();toast('✅ '+type+' 이력 등록됨');
    }catch(err){toast('⚠️ 오류: '+(err.message||err));}
  });
  /* 달력 */
  var cp=document.getElementById('calPrev');if(cp)cp.addEventListener('click',function(){calM--;if(calM<0){calM=11;calY--;}calSelDay=null;renderCal();});
  var cn=document.getElementById('calNext');if(cn)cn.addEventListener('click',function(){calM++;if(calM>11){calM=0;calY++;}calSelDay=null;renderCal();});
  var ct=document.getElementById('calToday');if(ct)ct.addEventListener('click',function(){var n=new Date();calY=n.getFullYear();calM=n.getMonth();calSelDay=todayStr();renderCal();});
  /* 백업 */
  var dbb=document.getElementById('doBackupBtn');
  if(dbb)dbb.addEventListener('click',function(){
    var data={app:'staff',version:'v44',exportedAt:new Date().toISOString(),count:allRecs.length,records:allRecs};
    var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    var url=URL.createObjectURL(blob);var a=document.createElement('a');var d=new Date();
    a.href=url;a.download='직원관리_기록백업_'+d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+'.json';
    document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);toast('✅ 기록 백업 완료');
  });
  var dsb=document.getElementById('doStaffBackupBtn');
  if(dsb)dsb.addEventListener('click',function(){
    var data={app:'staff',version:'v44',exportedAt:new Date().toISOString(),staff:STAFF,history:allHistory};
    var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    var url=URL.createObjectURL(blob);var a=document.createElement('a');var d=new Date();
    a.href=url;a.download='직원관리_직원정보백업_'+d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+'.json';
    document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);toast('✅ 직원정보 백업 완료');
  });
  var rf=document.getElementById('restoreFile');
  if(rf)rf.addEventListener('change',function(e){
    var file=e.target.files&&e.target.files[0];e.target.value='';if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      var data;try{data=JSON.parse(ev.target.result);}catch(err){toast('❌ 파일 읽기 실패');return;}
      var arr=Array.isArray(data)?data:(data.records||[]);
      if(!Array.isArray(arr)||!arr.length){toast('복구할 데이터가 없습니다');return;}
      if(!confirm('백업 파일에서 '+arr.length+'건을 복구합니다. 계속할까요?'))return;
      var byId={};allRecs.forEach(function(x){if(x._id)byId[x._id]=x;});
      var added=0,updated=0;
      arr.forEach(function(rec){
        if(!rec||typeof rec!=='object')return;
        if(!rec._id)rec._id='R'+Date.now()+Math.random().toString(36).slice(2,6);
        if(byId[rec._id])updated++;else added++;byId[rec._id]=rec;
        fbPatch('staff-records',rec._id,rec).catch(function(){fbAdd('staff-records',rec);});
      });
      allRecs=Object.values(byId);refreshAll();
      var bm=document.getElementById('backupModal');if(bm)bm.classList.remove('show');
      toast('✅ 복구 완료 — 신규 '+added+'건, 갱신 '+updated+'건');
    };
    reader.onerror=function(){toast('파일 읽기 실패');};
    reader.readAsText(file);
  });
  /* 앱 초기화 */
  initApp();
});

/* =========================================================
   PIN 잠금 시스템 v44-0626-1050
   - shared_pin 에 저장된 값 사용
   - 없으면 '1028' 기본값
   ========================================================= */
var PIN_LS = 'shared_pin';
var pinBuffer = '';
var pinMode = 'unlock';
var pinTemp = '';

function getPIN(){
  try{
    var p = localStorage.getItem(PIN_LS);
    return (p && p.length >= 4) ? p : '1028';
  }catch(e){ return '1028'; }
}
function setPIN(p){
  try{ localStorage.setItem(PIN_LS, p); }catch(e){}
}

function processPIN(){
  var stored = getPIN();
  if(pinMode === 'unlock'){
    if(pinBuffer === stored){ unlockApp(); }
    else { pinShake(); setLockSub('PIN이 틀렸습니다 ❌'); setTimeout(function(){ pinBuffer=''; updateDots(); setLockSub('PIN 4자리를 입력하세요'); }, 800); }
  } else if(pinMode === 'setup1'){
    pinTemp = pinBuffer; pinBuffer = ''; updateDots();
    setLockSub('한 번 더 입력하세요'); pinMode = 'setup2';
  } else if(pinMode === 'setup2'){
    if(pinBuffer === pinTemp){ setPIN(pinBuffer); unlockApp(); }
    else { pinShake(); setLockSub('일치하지 않습니다. 다시 입력하세요'); setTimeout(function(){ pinBuffer=''; pinTemp=''; updateDots(); pinMode='setup1'; }, 800); }
  } else if(pinMode === 'change1'){
    if(pinBuffer === stored){ pinTemp=''; pinBuffer=''; updateDots(); pinMode='change2'; setLockSub('새 PIN 4자리를 입력하세요'); }
    else { pinShake(); setLockSub('현재 PIN이 틀렸습니다 ❌'); setTimeout(function(){ pinBuffer=''; updateDots(); setLockSub('현재 PIN을 입력하세요'); }, 800); }
  } else if(pinMode === 'change2'){
    pinTemp = pinBuffer; pinBuffer = ''; updateDots();
    setLockSub('새 PIN을 한 번 더 입력하세요'); pinMode = 'change3';
  } else if(pinMode === 'change3'){
    if(pinBuffer === pinTemp){ setPIN(pinBuffer); unlockApp(); toast('🔐 PIN이 변경되었습니다'); }
    else { pinShake(); setLockSub('일치하지 않습니다. 다시 입력하세요'); setTimeout(function(){ pinBuffer=''; pinTemp=''; updateDots(); pinMode='change2'; }, 800); }
  }
}

function setLockSub(msg){
  var el = document.getElementById('lockSub');
  if(el) el.textContent = msg;
}
function pinShake(){
  for(var i=0;i<4;i++){
    var d=document.getElementById('pd'+i);
    if(d){ d.style.background='var(--red)'; d.style.borderColor='var(--red)'; }
  }
}
function updateDots(){
  for(var i=0;i<4;i++){
    var d=document.getElementById('pd'+i);
    if(!d) continue;
    d.style.background = i < pinBuffer.length ? 'var(--accent)' : 'transparent';
    d.style.borderColor = i < pinBuffer.length ? 'var(--accent)' : 'var(--border2)';
  }
}
function unlockApp(){
  pinBuffer=''; updateDots();
  var ls=document.getElementById('lockScreen');
  if(ls) ls.classList.add('hide');
}
function lockApp(){
  pinBuffer=''; pinMode='unlock';
  var ls=document.getElementById('lockScreen');
  if(ls) ls.classList.remove('hide');
  showUnlockScreen();
}
function showUnlockScreen(){
  pinMode='unlock'; pinBuffer='';
  setLockSub('PIN 4자리를 입력하세요');
  var el;
  el=document.getElementById('lockTitle');    if(el) el.textContent='🔐 직원 관리';
  el=document.getElementById('pinPad');       if(el) el.style.display='grid';
  el=document.getElementById('pinDots');      if(el) el.style.display='flex';
  el=document.getElementById('pinErr');       if(el) el.style.display='none';
  el=document.getElementById('pinSetupBtns'); if(el) el.style.display='none';
  el=document.getElementById('pinChangeBtns');if(el) el.style.display='block';
  updateDots();
}
function initLock(){
  showUnlockScreen();
}

document.addEventListener('DOMContentLoaded', function(){
  /* 숫자 버튼 */
  document.querySelectorAll('.pin-btn[data-n]').forEach(function(btn){
    btn.addEventListener('click', function(){
      if(pinBuffer.length >= 4) return;
      pinBuffer += btn.dataset.n;
      updateDots();
      if(pinBuffer.length === 4) setTimeout(processPIN, 100);
    });
  });
  /* 지우기 */
  var delBtn = document.getElementById('pinDel');
  if(delBtn) delBtn.addEventListener('click', function(){
    if(pinBuffer.length > 0){ pinBuffer = pinBuffer.slice(0,-1); updateDots(); }
  });
  /* PIN 변경 */
  var changeBtn = document.getElementById('pinChangeBtn');
  if(changeBtn) changeBtn.addEventListener('click', function(){
    pinMode='change1'; pinBuffer=''; updateDots();
    setLockSub('현재 PIN을 입력하세요');
    var pcb=document.getElementById('pinChangeBtns');
    if(pcb) pcb.style.display='none';
  });
  /* 백업에서 PIN 변경 */
  var cfbBtn = document.getElementById('pinChangeFromBackup');
  if(cfbBtn) cfbBtn.addEventListener('click', function(){
    var bm=document.getElementById('backupModal'); if(bm) bm.classList.remove('show');
    pinMode='change1'; pinBuffer=''; pinTemp=''; updateDots();
    var ls=document.getElementById('lockScreen'); if(ls) ls.classList.remove('hide');
    var el;
    el=document.getElementById('lockTitle');    if(el) el.textContent='PIN 변경';
    el=document.getElementById('pinPad');       if(el) el.style.display='grid';
    el=document.getElementById('pinDots');      if(el) el.style.display='flex';
    el=document.getElementById('pinSetupBtns'); if(el) el.style.display='none';
    el=document.getElementById('pinChangeBtns');if(el) el.style.display='none';
    setLockSub('현재 PIN을 입력하세요');
  });
  /* 초기화 */
  initLock();
});
</script>
</body>
</html>
