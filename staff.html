<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>직원 관리 v44-0626-1144</title>
<meta name="theme-color" content="#4C6EF5">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="직원관리">
<link rel="manifest" href="staff-manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#F2F5FF; --card:#FFFFFF; --card2:#F7F9FF;
  --border:#E2E8F8; --border2:#C9D4F0;
  --ink:#1A2540; --ink2:#4A5680; --ink3:#8C99C0;
  --accent:#4C6EF5; --accent-s:#EEF2FF; --accent2:#748FFC;
  --green:#16A34A; --green-s:#DCFCE7;
  --amber:#D97706; --amber-s:#FEF3C7;
  --red:#DC2626; --red-s:#FEE2E2;
  --blue:#2563EB; --blue-s:#DBEAFE;
  --r:14px; --shadow:0 2px 12px rgba(76,110,245,.10);
}
html,body{background:var(--bg);color:var(--ink);font-family:'Noto Sans KR',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;}

/* ===== HEADER ===== */
.hdr{background:var(--card);border-bottom:2px solid var(--border);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:var(--shadow);}
.hdr-left{display:flex;align-items:center;gap:10px;}
.back{width:34px;height:34px;border-radius:10px;border:2px solid var(--border2);background:var(--bg);color:var(--ink2);display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:20px;font-weight:700;}
.hdr-info h1{font-size:16px;font-weight:900;}
.hdr-info p{font-size:11px;color:var(--ink3);}
.hdr-right{display:flex;align-items:center;gap:8px;}
.badge{font-size:11px;font-weight:700;padding:4px 11px;border-radius:20px;background:var(--accent-s);color:var(--accent);border:1.5px solid var(--accent2);}
.ver-badge{font-size:10px;color:var(--ink3);font-weight:600;}

/* ===== SEARCH ===== */
.search-bar{padding:10px 16px;}
.search-inner{display:flex;align-items:center;background:var(--card);border:2px solid var(--border2);border-radius:12px;padding:9px 14px;gap:8px;}
.search-inner:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(76,110,245,.12);}
.search-inner input{flex:1;border:none;outline:none;font-size:14px;color:var(--ink);background:transparent;font-family:inherit;}
.search-inner input::placeholder{color:var(--ink3);}
.s-clr{font-size:16px;cursor:pointer;color:var(--ink3);background:none;border:none;font-family:inherit;}

/* ===== TABS ===== */
.tabs{display:flex;margin:0 16px;background:var(--card);border:2px solid var(--border);border-radius:12px;padding:4px;gap:3px;overflow-x:auto;}
.tab{flex:1;min-width:54px;padding:9px 4px;border:none;background:transparent;font-size:12px;font-weight:700;color:var(--ink3);border-radius:9px;cursor:pointer;font-family:inherit;transition:.18s;display:flex;align-items:center;justify-content:center;gap:4px;white-space:nowrap;}
.tab.on{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(76,110,245,.35);}
.tab:not(.on):hover{background:var(--accent-s);}
.panel{display:none;padding:14px 16px;}
.panel.on{display:block;}

/* ===== 직원 필터 ===== */
.staff-filter{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.sf-chip{padding:6px 14px;border-radius:20px;border:2px solid var(--border2);background:var(--card);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--ink3);transition:.15s;}
.sf-chip.on{background:var(--accent);color:#fff;border-color:var(--accent);}

/* ===== 신규 등록 버튼 ===== */
.add-staff-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:10px;margin-bottom:10px;background:var(--green-s);border:2px dashed var(--green);border-radius:12px;color:var(--green);font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;transition:.15s;}
.add-staff-btn:hover{background:var(--green);color:#fff;}

/* ===== 직원 그리드 4열 ===== */
.staff-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:14px;}
@media(min-width:540px){.staff-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:900px){.staff-grid{grid-template-columns:repeat(4,1fr);}}

/* ===== 직원 카드 ===== */
.sc{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:10px 12px;display:flex;flex-direction:row;align-items:center;gap:10px;cursor:pointer;transition:.18s;position:relative;min-height:54px;}
.sc:hover{border-color:var(--accent2);background:var(--accent-s);box-shadow:var(--shadow);}
.sc.active{border-color:var(--accent);background:var(--accent-s);}
.sc.retired{opacity:.4;filter:grayscale(.7);}
.sc-av{width:40px;height:40px;border-radius:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;font-weight:900;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.sc-info{flex:1;min-width:0;}
.sc-name{font-size:14px;font-weight:800;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sc-role{font-size:12px;color:var(--ink3);font-weight:600;margin-top:2px;}
.sc-phone-link{font-size:12px;font-weight:700;color:var(--accent);text-decoration:none;display:flex;align-items:center;gap:2px;margin-top:3px;white-space:nowrap;}
.sc-badge{position:absolute;top:-5px;right:-5px;width:18px;height:18px;border-radius:50%;background:var(--red);font-size:9px;font-weight:900;color:#fff;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg);}
.tenure-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:6px;background:var(--accent-s);color:var(--accent);margin-left:3px;}

/* ===== 기록 그리드 4열 (직원카드와 동일) ===== */
.rec-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;}
@media(min-width:540px){.rec-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:900px){.rec-grid{grid-template-columns:repeat(4,1fr);}}

/* ===== 기록 카드 ===== */
.rec-card{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:10px 12px;position:relative;transition:.18s;cursor:pointer;}
.rec-card:hover{border-color:var(--border2);box-shadow:var(--shadow);}
.rec-card.s-완료{border-left:4px solid var(--green);}
.rec-card.s-진행중{border-left:4px solid var(--amber);}
.rec-card.s-미해결{border-left:4px solid var(--red);}
.rc-row1{display:flex;align-items:center;gap:5px;margin-bottom:5px;flex-wrap:wrap;}
.rc-title{font-size:13px;font-weight:800;color:var(--ink);margin:4px 0;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.rc-row2{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.rc-date{font-size:10px;color:var(--ink3);font-weight:600;margin-left:auto;}
.cat-tag{font-size:12px;padding:3px 8px;border-radius:6px;font-weight:700;}
.cat-업무지시{background:var(--blue-s);color:var(--blue);}
.cat-근태{background:var(--amber-s);color:var(--amber);}
.cat-주의경고{background:var(--red-s);color:var(--red);}
.st-badge{font-size:12px;padding:3px 8px;border-radius:6px;font-weight:700;}
.st-완료{background:var(--green-s);color:var(--green);}
.st-진행중{background:var(--amber-s);color:var(--amber);}
.st-미해결{background:var(--red-s);color:var(--red);}
.who-tag{font-size:12px;padding:3px 8px;border-radius:6px;background:var(--accent-s);color:var(--accent);font-weight:700;}
/* 삭제 버튼 항상 보임 (지침) */
.rc-del{position:absolute;top:6px;right:6px;font-size:11px;padding:2px 7px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-weight:700;background:var(--red-s);color:var(--red);}
.rc-del:hover{background:var(--red);color:#fff;}

/* ===== 최근기록 섹션 ===== */
.recent-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.recent-head h3{font-size:13px;font-weight:800;color:var(--ink2);}
.recent-more{font-size:12px;color:var(--accent);font-weight:700;cursor:pointer;background:none;border:none;font-family:inherit;}

/* ===== 전체기록 필터 ===== */
.flt-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.flt-btn{padding:6px 13px;border-radius:20px;border:2px solid var(--border2);background:var(--card);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--ink3);transition:.15s;}
.flt-btn.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.all-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid var(--border);}
.all-hdr h3{font-size:13px;font-weight:800;color:var(--ink2);}
.copy-btn{padding:6px 13px;border-radius:9px;border:2px solid var(--border2);background:var(--card);color:var(--ink2);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}

/* ===== 현황 ===== */
.stat-kpi{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px;}
@media(min-width:540px){.stat-kpi{grid-template-columns:repeat(4,1fr);}}
.kpi{background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:14px;text-align:center;}
.kpi-n{font-size:26px;font-weight:900;display:block;}
.kpi-l{font-size:11px;color:var(--ink3);font-weight:600;margin-top:2px;}
.staff-row{background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:7px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:.15s;}
.staff-row:hover{border-color:var(--accent2);box-shadow:var(--shadow);}
.sr-av{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:900;flex-shrink:0;}
.sr-bar-w{flex:1;}
.sr-top{display:flex;justify-content:space-between;margin-bottom:4px;}
.sr-name{font-size:13px;font-weight:800;}
.sr-bar{background:var(--border);border-radius:3px;height:5px;overflow:hidden;}
.sr-fill{height:100%;border-radius:3px;}

/* ===== 입퇴사 이력 ===== */
.hist-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.hf-chip{padding:5px 13px;border-radius:20px;border:2px solid var(--border2);background:var(--card);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--ink3);transition:.15s;}
.hf-chip.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.hist-card{background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:14px;display:flex;flex-direction:column;gap:8px;}
.hist-card.type-입사{border-left:4px solid var(--green);}
.hist-card.type-퇴사{border-left:4px solid var(--red);}
.hist-card.type-복직{border-left:4px solid var(--accent);}
.hist-icon{font-size:22px;flex-shrink:0;}
.hist-body{flex:1;}
.hist-type-badge{display:inline-block;font-size:11px;font-weight:800;padding:2px 9px;border-radius:7px;margin-bottom:4px;}
.type-badge-입사{background:var(--green-s);color:var(--green);}
.type-badge-퇴사{background:var(--red-s);color:var(--red);}
.type-badge-복직{background:var(--accent-s);color:var(--accent);}
.hist-name{font-size:14px;font-weight:900;color:var(--ink);}
.hist-meta{font-size:11px;color:var(--ink3);font-weight:600;margin-top:2px;}
.hist-memo{font-size:12px;color:var(--ink2);margin-top:4px;}
.hist-date{font-size:12px;color:var(--ink3);font-weight:700;white-space:nowrap;flex-shrink:0;}
.hist-del{font-size:11px;padding:3px 9px;border-radius:20px;border:none;cursor:pointer;font-family:inherit;font-weight:700;background:var(--red-s);color:var(--red);margin-top:6px;display:inline-block;}
/* 달력 마커 */
.cal-hire{font-size:11px;font-weight:800;color:var(--green);background:var(--green-s);border-radius:4px;padding:2px 6px;margin-top:2px;}
.cal-resign{font-size:11px;font-weight:800;color:var(--red);background:var(--red-s);border-radius:4px;padding:2px 6px;margin-top:2px;}

/* ===== 달력 ===== */
.cal-nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-nav-row h2{font-size:17px;font-weight:900;}
.cal-nav-btns{display:flex;gap:6px;}
.cal-nav-btn{width:34px;height:34px;border-radius:10px;border:2px solid var(--border2);background:var(--card);color:var(--ink2);font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;}
.cal-today-btn{padding:6px 14px;border-radius:10px;border:2px solid var(--border2);background:var(--card);color:var(--ink2);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.cal-legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.leg-filter.on{background:var(--accent-s);border-color:var(--accent)!important;color:var(--accent);font-weight:800;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--ink2);}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;border-radius:var(--r);overflow:hidden;}
.cal-dow{background:var(--card2);padding:8px 4px;text-align:center;font-size:13px;font-weight:800;color:var(--ink3);}
.cal-cell{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:8px 6px;min-height:110px;cursor:pointer;transition:.15s;display:flex;flex-direction:column;}
.cal-cell:hover{border-color:var(--accent2);background:var(--accent-s);}
.cal-cell.today{border-color:var(--accent);border-width:2px;background:var(--accent-s);}
.cal-cell.selected{border-color:var(--accent);border-width:2.5px;}
.cal-cell.empty{background:transparent;border-color:transparent;cursor:default;}
.cal-cell.empty:hover{background:transparent;border-color:transparent;}
.cal-dnum{font-size:14px;font-weight:800;color:var(--ink2);margin-bottom:4px;}
.cal-cell.today .cal-dnum{color:var(--accent);}
.cal-dot-row{display:flex;flex-wrap:wrap;gap:2px;margin-bottom:2px;}
.cal-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.cal-item{font-size:11px;color:var(--ink2);line-height:1.4;overflow:hidden;margin-top:2px;}
.cal-detail{background:var(--card);border:2px solid var(--border2);border-radius:var(--r);padding:14px;margin-top:12px;}
.cal-detail-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-detail-hdr h3{font-size:14px;font-weight:800;}
.cal-add-btn{padding:6px 14px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}

/* ===== 모달 공통 ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(26,37,64,.55);z-index:600;display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px);}
.modal-overlay.show{display:flex;}
.modal-box{background:var(--card);border:2px solid var(--border);border-radius:20px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;padding:22px;box-shadow:0 12px 40px rgba(76,110,245,.18);animation:pop .22s cubic-bezier(.34,1.26,.64,1);}
@keyframes pop{from{transform:scale(.9);opacity:0;}to{transform:scale(1);opacity:1;}}
/* 모달 헤더 (지침: 조회모드 ✏️수정 🗑삭제 ✕닫기) */
.modal-hdr{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-bottom:12px;border-bottom:2px solid var(--border);}
.modal-hdr h3{font-size:16px;font-weight:900;flex:1;}
.modal-hdr-btns{display:flex;gap:6px;flex-shrink:0;}
.mhb{padding:6px 12px;border-radius:9px;border:2px solid var(--border2);background:var(--bg);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--ink2);transition:.15s;}
.mhb:hover{border-color:var(--accent2);color:var(--accent);}
.mhb.del:hover{border-color:var(--red);color:var(--red);background:var(--red-s);}
/* 모달 그리드 */
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.modal-grid .fg.full{grid-column:1/-1;}
.fg label{font-size:11px;color:var(--ink3);font-weight:700;display:block;margin-bottom:3px;}
.fg input,.fg select,.fg textarea{width:100%;background:var(--card);border:2px solid var(--border2);border-radius:9px;padding:8px 10px;font-size:13px;font-family:inherit;color:var(--ink);outline:none;transition:.15s;}
.fg input:disabled,.fg select:disabled,.fg textarea:disabled{background:var(--bg);color:var(--ink2);}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(76,110,245,.1);}
.fg.full{grid-column:1/-1;}
.fg textarea{min-height:72px;resize:vertical;line-height:1.6;}
.m-btn-row{display:flex;gap:8px;margin-top:14px;}
.m-save{flex:1;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;}
.m-cancel{padding:11px 18px;background:var(--bg);border:2px solid var(--border2);color:var(--ink2);border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.m-del-btn{padding:11px 14px;background:var(--red-s);border:2px solid var(--red);color:var(--red);border-radius:11px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;}
.m-del-btn:hover{background:var(--red);color:#fff;}
.retire-warn{background:var(--amber-s);border:1.5px solid var(--amber);border-radius:9px;padding:9px 12px;font-size:12px;color:var(--amber);font-weight:600;margin-top:6px;display:none;}

/* ===== 기록 상세 모달 ===== */
.rec-detail-content{font-size:14px;color:var(--ink);line-height:1.7;white-space:pre-wrap;padding:12px;background:var(--bg);border-radius:10px;margin-bottom:12px;}

/* ===== MISC ===== */
.divider{font-size:11px;font-weight:700;color:var(--ink3);padding:12px 0 6px;display:flex;align-items:center;gap:8px;}
.divider::after{content:'';flex:1;height:1.5px;background:var(--border);}
.empty{text-align:center;color:var(--ink3);padding:28px;font-size:13px;font-weight:600;}
.empty-ico{font-size:36px;display:block;margin-bottom:8px;}
.loading{text-align:center;color:var(--ink3);padding:18px;font-size:12px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--ink);color:#fff;padding:11px 20px;border-radius:999px;font-size:13px;font-weight:700;opacity:0;transition:.28s;z-index:9999;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(26,37,64,.3);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ===== PIN 잠금 ===== */
.lock-screen{position:fixed;inset:0;background:linear-gradient(145deg,#F2F5FF 0%,#E8EEFF 100%);z-index:9000;display:flex;align-items:center;justify-content:center;padding:20px;}
.lock-screen.hide{display:none;}
.lock-card{background:#fff;border:2px solid var(--border);border-radius:24px;padding:28px 24px;width:100%;max-width:360px;box-shadow:0 8px 40px rgba(76,110,245,.15);text-align:center;}
.lock-icon{font-size:40px;margin-bottom:10px;}
.lock-title{font-size:20px;font-weight:900;color:var(--ink);margin-bottom:4px;}
.lock-sub{font-size:13px;color:var(--ink3);font-weight:600;margin-bottom:20px;min-height:20px;}
.pin-dots{display:flex;gap:10px;justify-content:center;margin-bottom:20px;}
.pin-dot{width:13px;height:13px;border-radius:50%;border:2.5px solid var(--border2);background:transparent;transition:.15s;}
.pin-dot.filled{background:var(--accent);border-color:var(--accent);}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.pin-btn{height:54px;border-radius:14px;border:2px solid var(--border);background:var(--bg);font-size:20px;font-weight:800;color:var(--ink);cursor:pointer;font-family:inherit;transition:.15s;display:flex;align-items:center;justify-content:center;}

function resignedToDate(resignedStr){
  if(!resignedStr)return todayStr();
  // YY.MM.DD 또는 YYYY-MM-DD 또는 YYYY.MM.DD

  try{

    return y+'-'+pad(parseInt(p[1]||1))+'-'+pad(parseInt(p[2]||1));
  }catch(e){return todayStr();}
}

    var start=new Date(y,parseInt(p[1]||1)-1,parseInt(p[2]||1));
    var end=resignedStr?(function(){var p2=resignedStr.split('.');var y2=parseInt(p2[0]);if(y2<100)y2+=2000;return new Date(y2,parseInt(p2[1]||1)-1,parseInt(p2[2]||1));})():new Date();
    var months=Math.floor((end-start)/(1000*60*60*24*30.44));
    if(months<1)return'';if(months<12)return months+'개월';
    var yrs=Math.floor(months/12);var rem=months%12;
    return yrs+'년'+(rem>0?' '+rem+'개월':'');
  }catch(e){return'';}
}

/* ===== Firestore ===== */
function colUrl(c){return'https://firestore.googleapis.com/v1/projects/'+PRJ+'/databases/(default)/documents/'+c;}
function toFS(o){var f={};Object.keys(o).forEach(function(k){var v=o[k];if(v===null||v===undefined)f[k]={nullValue:null};else if(typeof v==='string')f[k]={stringValue:v};else if(typeof v==='number')f[k]={integerValue:String(Math.floor(v))};else if(typeof v==='boolean')f[k]={booleanValue:v};else f[k]={stringValue:JSON.stringify(v)};});return{fields:f};}
function fromFS(doc){if(!doc||!doc.fields)return null;var o={_id:doc.name?doc.name.split('/').pop():''};Object.keys(doc.fields).forEach(function(k){var f=doc.fields[k];if(f.stringValue!==undefined)o[k]=f.stringValue;else if(f.integerValue!==undefined)o[k]=parseInt(f.integerValue);else if(f.booleanValue!==undefined)o[k]=f.booleanValue;else o[k]=null;});return o;}
function fbAdd(col,d){return fetch(colUrl(col)+'?key='+FB_KEY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(toFS(d))}).then(function(r){return r.json();});}
function fbPatch(col,id,d){return fetch(colUrl(col)+'/'+id+'?key='+FB_KEY,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(toFS(d))}).then(function(r){return r.json();});}
function fbDel(col,id){return fetch(colUrl(col)+'/'+id+'?key='+FB_KEY,{method:'DELETE'});}
function fbAll(col){return fetch(colUrl(col)+'?key='+FB_KEY+'&pageSize=300').then(function(r){return r.json();}).then(function(d){return d.documents?d.documents.map(fromFS).filter(Boolean):[];});}
function fbQuery(col,field,value){var url='https://firestore.googleapis.com/v1/projects/'+PRJ+'/databases/(default)/documents:runQuery?key='+FB_KEY;var body={structuredQuery:{from:[{collectionId:col}],where:{fieldFilter:{field:{fieldPath:field},op:'EQUAL',value:{stringValue:value}}}}};return fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(function(r){return r.json();}).then(function(d){return Array.isArray(d)?d.filter(function(x){return x.document;}).map(function(x){return fromFS(x.document);}):[];});}

function renderCal(){
  var days=['일','월','화','수','목','금','토'];

  var first=new Date(calY,calM,1).getDay(),daysInMonth=new Date(calY,calM+1,0).getDate();
  var today=todayStr();
  var byDate={};
  allRecs.forEach(function(r){if(r.date)(byDate[r.date]=byDate[r.date]||[]).push(r);});
  var hireByDate={},resignByDate={};
  allHistory.forEach(function(h){
    if(h.type==='입사'&&h.date)(hireByDate[h.date]=hireByDate[h.date]||[]).push(h);
    if(h.type==='퇴사'&&h.date)(resignByDate[h.date]=resignByDate[h.date]||[]).push(h);
  });
  // 직원 hired 날짜도 입사 마커로
  STAFF.forEach(function(s){
    // 입사 마커
    if(s.hired){
      try{
        var ds2=hiredToDate(s.hired);
        if(!(hireByDate[ds2]||[]).find(function(h){return h.staffId===s.id;}))
          (hireByDate[ds2]=hireByDate[ds2]||[]).push({staffId:s.id,staffName:s.name,type:'입사'});
      }catch(e){}
    }
    // 퇴사 마커
    if(s.status==='퇴사'&&s.resigned){
      try{
        var ds3=resignedToDate(s.resigned);
        if(!(resignByDate[ds3]||[]).find(function(h){return h.staffId===s.id;}))
          (resignByDate[ds3]=resignByDate[ds3]||[]).push({staffId:s.id,staffName:s.name,type:'퇴사'});
      }catch(e){}
    }
  });
  var html=days.map(function(d,i){return'<div class="cal-dow'+(i===0?' sun':'')+'">'+(d)+'</div>';}).join('');
  for(var i=0;i<first;i++)html+='<div class="cal-cell empty"></div>';
  for(var d=1;d<=daysInMonth;d++){
    var ds=calY+'-'+pad(calM+1)+'-'+pad(d);
    var wd=new Date(calY,calM,d).getDay();
    var cls='cal-cell'+(wd===0?' sun':'')+(ds===today?' today':'')+(ds===calSelDay?' selected':'');
    var allDayRecs=byDate[ds]||[];
    // 필터 적용
    var dayRecs=calFilt==='전체'?allDayRecs:allDayRecs.filter(function(r){return r.cat===calFilt||r.status===calFilt;});
    var hires=hireByDate[ds]||[];
    var resigns=resignByDate[ds]||[];
    var showHires=(calFilt==='전체'||calFilt==='입사')?hires:[];
    var showResigns=(calFilt==='전체'||calFilt==='퇴사')?resigns:[];
    var dots=allDayRecs.slice(0,8).map(function(r){return'<span class="cal-dot" style="background:'+(CAT_COLOR[r.cat]||'#8C99C0')+'"></span>';}).join('');
    // 입퇴사 마커
    var hireMarkers=showHires.map(function(h){return'<div class="cal-hire">🟢 '+esc(h.staffName||'')+'</div>';}).join('');
    var resignMarkers=showResigns.map(function(h){return'<div class="cal-resign">🔴 '+esc(h.staffName||'')+'</div>';}).join('');
    // 기록 항목 — 더 구체적으로 (이름+내용 전체)
    var items=dayRecs.slice(0,3).map(function(r){
      var cont=(r.content||'').split('\n').join(' ');
      var preview=cont.length>16?cont.slice(0,16)+'…':cont;
      return'<div class="cal-item" style="font-size:11px;line-height:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+
        '<span style="font-weight:800;color:'+(CAT_COLOR[r.cat]||'#8C99C0')+'">'+esc(r.staffId||'')+'</span> '+
        '<span style="color:var(--ink2)">'+esc(preview)+'</span>'+
      '</div>';
    }).join('');
    var more=(dayRecs.length+hires.length+resigns.length)>3?'<div style="font-size:10px;color:var(--ink3)">+'+( dayRecs.length+hires.length+resigns.length-3)+'건</div>':'';
    html+='<div class="'+cls+'" data-day="'+ds+'">'+
      '<div class="cal-dnum">'+d+'</div>'+
      '<div class="cal-dot-row">'+dots+'</div>'+
      hireMarkers+resignMarkers+items+more+
    '</div>';
  }
  $('calGrid').innerHTML=html;
  $('calGrid').querySelectorAll('[data-day]').forEach(function(el){
    el.addEventListener('click',function(){calSelDay=el.dataset.day;renderCal();renderCalDetail(el.dataset.day);});
  });
  if(calSelDay)renderCalDetail(calSelDay);else $('calDetail').innerHTML='';
}
function renderCalDetail(ds){
  var recs=allRecs.filter(function(r){return r.date===ds;}).sort(function(a,b){return(b.ts||0)-(a.ts||0);});
  var d=new Date(ds+'T00:00:00');
  var label=(d.getMonth()+1)+'월 '+d.getDate()+'일 ('+['일','월','화','수','목','금','토'][d.getDay()]+')';
  $('calDetail').innerHTML='<div class="cal-detail">'+
    '<div class="cal-detail-hdr"><h3>📅 '+label+'</h3></div>'+
    (recs.length?'<div class="rec-grid">'+recs.map(function(r){return makeRecCard(r,true);}).join('')+'</div>':'<div class="empty" style="padding:16px">이 날 기록 없음</div>')+
  '</div>';
}

/* ===== 검색 ===== */
function applySearch(){
  var sr=$('searchResult');
  if(!searchQ){sr.style.display='none';return;}
  var q=searchQ.toLowerCase();
  var matchR=allRecs.filter(function(r){return(r.content||'').toLowerCase().includes(q)||(r.cat||'').toLowerCase().includes(q)||(r.staffId||'').toLowerCase().includes(q);});
  $('searchResultLabel').textContent='🔍 "'+searchQ+'" — '+matchR.length+'건';
  $('searchResultList').innerHTML='<div class="rec-grid">'+matchR.sort(function(a,b){return(b.date||'').localeCompare(a.date||'');}).map(function(r){return makeRecCard(r,true);}).join('')+'</div>';
  sr.style.display='block';
}

/* ===== syncContact ===== */
async function syncContact(s){
  try{
    var ex=await fbQuery('contacts','staffId',s.id);
    var cat=s.status==='퇴사'?'직원(퇴사)':'직원(재직중)';
    var tenure=calcTenure(s.hired,s.status==='퇴사'?s.resigned:'');
    var rec={name:s.name,cat:cat,person:s.name,phone:s.phone||'',email:'',address:'',
      memo:s.role+(s.hired?' · 입사 '+s.hired:'')+(s.floor?' · '+s.floor:'')+(tenure?' · 근속 '+tenure:''),
      fav:false,staffId:s.id,createdAt:Date.now()};
    if(ex.length)await fbPatch('contacts',ex[0]._id,rec);else await fbAdd('contacts',rec);
  }catch(e){}
}

/* =========================================================
   PIN 잠금 시스템
   PIN: 102800 / localStorage 'shared_pin'
   ========================================================= */
var PIN_LS='shared_pin';
var pinBuffer='',pinMode='unlock',pinTemp='';

function getPIN(){try{var p=localStorage.getItem(PIN_LS);return(p&&p.length>=4)?p:'102800';}catch(e){return'102800';}}
function setPIN(p){try{localStorage.setItem(PIN_LS,p);}catch(e){}}

function processPIN(){
  var stored=getPIN();
  if(pinMode==='unlock'){
    if(pinBuffer===stored)unlockApp();
    else{pinShake();setTimeout(function(){pinBuffer='';updateDots();setLockSub('PIN이 틀렸습니다. 다시 입력하세요');},200);}
  }else if(pinMode==='change1'){
    if(pinBuffer===stored){pinTemp='';pinBuffer='';updateDots();pinMode='change2';setLockSub('새 PIN 6자리를 입력하세요');}
    else{pinShake();setTimeout(function(){pinBuffer='';updateDots();setLockSub('현재 PIN이 틀렸습니다');},200);}
  }else if(pinMode==='change2'){
    pinTemp=pinBuffer;pinBuffer='';updateDots();setLockSub('새 PIN을 한 번 더 입력하세요');pinMode='change3';
  }else if(pinMode==='change3'){
    if(pinBuffer===pinTemp){setPIN(pinBuffer);unlockApp();toast('🔐 PIN이 변경되었습니다');}
    else{pinShake();setTimeout(function(){pinBuffer='';pinTemp='';updateDots();pinMode='change2';setLockSub('PIN이 일치하지 않습니다. 다시 입력하세요');},200);}
  }
}
function setLockSub(msg){var el=$('lockSub');if(el)el.textContent=msg;}
function pinShake(){for(var i=0;i<6;i++){var d=$('pd'+i);if(d){d.style.background='var(--red)';d.style.borderColor='var(--red)';}}}
function updateDots(){for(var i=0;i<6;i++){var d=$('pd'+i);if(!d)continue;d.style.background=i<pinBuffer.length?'var(--accent)':'transparent';d.style.borderColor=i<pinBuffer.length?'var(--accent)':'var(--border2)';}}
function unlockApp(){pinBuffer='';updateDots();var ls=$('lockScreen');if(ls)ls.classList.add('hide');}
function lockApp(){pinBuffer='';pinMode='unlock';var ls=$('lockScreen');if(ls)ls.classList.remove('hide');showUnlockScreen();}
function showUnlockScreen(){
  pinMode='unlock';pinBuffer='';
  setLockSub('PIN 6자리를 입력하세요');
  var el;
  el=$('lockTitle');if(el)el.textContent='🔐 직원 관리';
  el=$('pinPad');if(el)el.style.display='grid';
  el=$('pinDots');if(el)el.style.display='flex';
  el=$('pinChangeBtns');if(el)el.style.display='block';
  updateDots();
}
function initLock(){showUnlockScreen();}

  }).catch(function(e){
    console.error('Firebase 로드 오류',e);
    toast('⚠️ 오프라인 — 로컬 데이터 사용');
  });

  /* PIN 초기화 */
  initLock();
});

/* ===== 입퇴사 이력 추가 ===== */
async function addHistEntry(h){
  try{var d=await fbAdd('staff-history',h);if(d.name)h._id=d.name.split('/').pop();}catch(e){}
  allHistory.unshift(h);return h;
}

/* PWA */
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('./staff-sw.js').then(function(reg){
      reg.addEventListener('updatefound',function(){
        var nw=reg.installing;
        nw.addEventListener('statechange',function(){
          if(nw.state==='installed'&&navigator.serviceWorker.controller){nw.postMessage({type:'SKIP_WAITING'});window.location.reload();}
        });
      });
    }).catch(function(){});
  });
  navigator.serviceWorker.addEventListener('controllerchange',function(){window.location.reload();});
}
</script>
