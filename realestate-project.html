<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부동산 프로젝트 관리</title>

<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<style>
  :root{
    --bg:#f5f3ee; --panel:#fff; --ink:#23211c; --ink-soft:#6b6658;
    --line:#e3ded3; --accent:#3a5a40; --accent-soft:#e7eee7;
    --gold:#9a7b2e; --blue:#2f3e6e; --danger:#a23b2d; --radius:14px;
    --shadow:0 1px 2px rgba(0,0,0,.04), 0 8px 24px rgba(40,38,30,.06);
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); color:var(--ink);
    font-family:"Pretendard","Pretendard Variable",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.5;}
  button{font-family:inherit; cursor:pointer;}
  input,select,textarea{font-family:inherit;}

  header.topbar{background:var(--accent); color:#fff; padding:14px 22px;
    display:flex; align-items:center; gap:14px; position:sticky; top:0; z-index:20;}
  header.topbar h1{font-size:17px; margin:0; font-weight:700; letter-spacing:-.3px;}
  header.topbar .home{margin-left:auto; font-size:13px; color:#dce6dc; text-decoration:none;
    border:1px solid rgba(255,255,255,.3); padding:6px 12px; border-radius:8px;}

  .wrap{display:flex; min-height:calc(100vh - 52px);}
  aside{width:262px; flex:0 0 262px; background:var(--panel);
    border-right:1px solid var(--line); padding:16px 12px; overflow-y:auto;}
  aside .side-title{font-size:12px; color:var(--ink-soft); font-weight:700; letter-spacing:.4px; margin:4px 6px 10px;}
  .proj-item{padding:11px 12px; border-radius:10px; margin-bottom:6px; cursor:pointer; border:1px solid transparent; transition:.15s;}
  .proj-item:hover{background:var(--accent-soft);}
  .proj-item.active{background:var(--accent-soft); border-color:#cdddcd;}
  .proj-item .pname{font-weight:600; font-size:14px;}
  .proj-item .paddr{font-size:12px; color:var(--ink-soft); margin-top:2px;}
  .proj-item .pbar{height:5px; background:#ece8de; border-radius:4px; margin-top:7px; overflow:hidden;}
  .proj-item .pbar>i{display:block; height:100%; background:var(--accent);}
  .pstatus{display:inline-block; font-size:11px; margin-top:6px; padding:2px 8px; border-radius:20px; background:#eee; color:#555;}
  .pstatus.진행중{background:#e7f0e8; color:#2f6b3a;}
  .pstatus.완료{background:#e9eef5; color:#3a567f;}
  .pstatus.보류{background:#f5ece1; color:#9a6a2e;}

  .btn{border:none; border-radius:10px; padding:10px 14px; font-size:14px; font-weight:600;}
  .btn-primary{background:var(--accent); color:#fff;}
  .btn-ai{background:var(--blue); color:#fff;}
  .btn-ghost{background:var(--accent-soft); color:var(--accent);}
  .btn-line{background:#fff; border:1px solid var(--line); color:var(--ink);}
  .btn-block{width:100%;}
  .btn-sm{padding:6px 11px; font-size:13px;}

  main{flex:1; padding:20px 24px; overflow-y:auto;}
  .empty{color:var(--ink-soft); text-align:center; margin-top:14vh; font-size:15px;}

  .proj-head{display:flex; align-items:flex-start; gap:16px; flex-wrap:wrap; margin-bottom:12px;}
  .proj-head h2{margin:0 0 4px; font-size:22px; letter-spacing:-.5px;}
  .proj-head .sub{color:var(--ink-soft); font-size:13px;}
  .proj-head .acts{margin-left:auto; display:flex; gap:8px; flex-wrap:wrap;}

  .tabs{display:flex; gap:2px; border-bottom:1px solid var(--line); margin-bottom:18px; flex-wrap:wrap;}
  .tab{padding:10px 14px; font-size:14px; font-weight:600; color:var(--ink-soft); background:none; border:none; border-bottom:2px solid transparent; margin-bottom:-1px; white-space:nowrap;}
  .tab.active{color:var(--accent); border-bottom-color:var(--accent);}

  .stats{display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:16px;}
  .stat{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:13px 15px; box-shadow:var(--shadow);}
  .stat .label{font-size:12px; color:var(--ink-soft);}
  .stat .value{font-size:21px; font-weight:700; margin-top:4px; letter-spacing:-.5px;}
  .stat .value small{font-size:12px; font-weight:600; color:var(--ink-soft);}
  .progress-wrap{height:8px; background:#ece8de; border-radius:6px; overflow:hidden; margin-top:8px;}
  .progress-bar{height:100%; background:var(--accent); border-radius:6px; transition:width .3s;}

  .panel{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); margin-bottom:16px; box-shadow:var(--shadow);}
  .panel.ai{border-color:#c9d1ea;}
  .panel-h{padding:13px 17px; font-weight:700; font-size:15px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--line);}
  .panel-h .cnt{font-size:12px; color:var(--ink-soft); font-weight:500;}
  .panel-h .add{margin-left:auto;}
  .panel-body{padding:14px 17px;}

  /* 타임라인 (대시보드 공정 진행) */
  .timeline{display:flex; gap:0; overflow-x:auto; padding:4px 0 8px;}
  .tl-step{flex:0 0 auto; display:flex; flex-direction:column; align-items:center; min-width:78px; position:relative;}
  .tl-step::before{content:''; position:absolute; top:13px; left:-50%; width:100%; height:3px; background:var(--line); z-index:0;}
  .tl-step:first-child::before{display:none;}
  .tl-step.done::before{background:var(--accent);}
  .tl-dot{width:28px; height:28px; border-radius:50%; background:#ece8de; color:var(--ink-soft); font-size:12px; font-weight:700; display:grid; place-items:center; z-index:1; border:2px solid var(--bg);}
  .tl-step.done .tl-dot{background:var(--accent); color:#fff;}
  .tl-step.doing .tl-dot{background:var(--gold); color:#fff;}
  .tl-label{font-size:10px; color:var(--ink-soft); margin-top:5px; text-align:center; line-height:1.2; max-width:74px;}
  .tl-step.done .tl-label,.tl-step.doing .tl-label{color:var(--ink); font-weight:600;}

  /* 공정 카드 */
  .stage{border:1px solid var(--line); border-radius:12px; margin-bottom:10px; overflow:hidden; background:#fff;}
  .stage-h{display:flex; align-items:center; gap:12px; padding:13px 15px; cursor:pointer;}
  .stage-no{width:26px; height:26px; flex:0 0 26px; border-radius:50%; background:#ece8de; color:var(--ink-soft); font-size:12px; font-weight:700; display:grid; place-items:center;}
  .stage.s완료 .stage-no{background:var(--accent); color:#fff;}
  .stage.s진행 .stage-no{background:var(--gold); color:#fff;}
  .stage-name{font-weight:700; font-size:15px;}
  .stage-sub{font-size:12px; color:var(--ink-soft);}
  .stage-right{margin-left:auto; display:flex; align-items:center; gap:10px;}
  .stage-amt{font-weight:700; font-size:14px;}
  .stage-badge{font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px;}
  .stage-badge.대기{background:#f0ede4; color:#8a8576;}
  .stage-badge.진행{background:#fbf0d8; color:var(--gold);}
  .stage-badge.완료{background:#e7f0e8; color:#2f6b3a;}
  .stage-body{display:none; padding:0 15px 14px; border-top:1px solid #f3f0e8;}
  .stage.open .stage-body{display:block;}
  .stage-statusrow{display:flex; gap:6px; padding-top:12px; align-items:center; flex-wrap:wrap;}
  .mini-chip{font-size:12px; padding:5px 12px; border-radius:18px; border:1px solid var(--line); background:#fff; color:var(--ink-soft);}
  .mini-chip.on{background:var(--accent); color:#fff; border-color:var(--accent);}

  /* 기록 줄 */
  .log{padding:10px 0; border-top:1px dashed var(--line); font-size:13px;}
  .log:first-child{border-top:none;}
  .log .l-top{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
  .l-tag{font-size:10px; font-weight:700; padding:2px 7px; border-radius:6px; background:#f0ede4; color:#6b6658;}
  .l-tag.문제{background:#f6e2de; color:var(--danger);}
  .l-tag.사진{background:#e9eef5; color:var(--blue);}
  .l-tag.공정{background:var(--accent-soft); color:var(--accent);}
  .log .l-title{font-weight:600; font-size:14px;}
  .log .l-date{margin-left:auto; color:var(--ink-soft); font-size:12px;}
  .log .l-meta{color:var(--ink-soft); margin-top:3px;}
  .log .l-meta b{color:var(--ink);}
  .log .l-memo{margin-top:4px; white-space:pre-wrap;}
  .log .l-del{color:var(--danger); background:none; border:none; font-size:12px;}
  .files{display:flex; gap:8px; flex-wrap:wrap; margin-top:8px;}
  .file{display:flex; align-items:center; gap:7px; border:1px solid var(--line); border-radius:9px; padding:6px 9px; font-size:12px; text-decoration:none; background:#fafaf7; color:inherit; max-width:220px;}
  .file img{width:36px; height:36px; object-fit:cover; border-radius:5px;}
  .file .fi{width:30px; height:30px; display:grid; place-items:center; background:var(--accent-soft); border-radius:5px; font-weight:700; color:var(--accent); font-size:11px;}
  .file .fname{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

  /* 비용 표 */
  .ctable{width:100%; border-collapse:collapse; font-size:13px;}
  .ctable th,.ctable td{text-align:left; padding:8px 10px; border-bottom:1px solid var(--line);}
  .ctable th{font-size:12px; color:var(--ink-soft); font-weight:600;}
  .ctable td.num,.ctable th.num{text-align:right; font-variant-numeric:tabular-nums;}
  .ctable tr.sum td{font-weight:700; border-top:2px solid var(--ink); border-bottom:none;}
  .bar-cell{position:relative;}
  .bar-cell>i{position:absolute; left:0; top:0; bottom:0; background:var(--accent-soft); z-index:0; border-radius:4px;}
  .bar-cell>span{position:relative; z-index:1;}
  .cost-cols{display:grid; grid-template-columns:1fr 1fr; gap:16px;}

  /* 업체 */
  .vendor{display:flex; align-items:center; gap:12px; padding:11px 0; border-top:1px solid var(--line);}
  .vendor:first-child{border-top:none;}
  .vendor .vtrade{font-size:11px; font-weight:700; padding:3px 9px; border-radius:7px; background:var(--accent-soft); color:var(--accent); flex:0 0 auto;}
  .vendor .vname{font-weight:600;}
  .vendor .vmemo{font-size:12px; color:var(--ink-soft);}
  .vendor .vspent{font-size:12px; color:var(--gold); font-weight:600;}
  .vendor .vright{margin-left:auto; display:flex; align-items:center; gap:10px;}
  .vendor a.tel{font-weight:700; color:var(--accent); text-decoration:none; font-size:15px;}
  .vendor .vdel{color:var(--danger); background:none; border:none; font-size:12px;}

  /* 갤러리 */
  .gallery-group{margin-bottom:20px;}
  .gallery-group h4{font-size:14px; margin:0 0 10px;}
  .gallery{display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px;}
  .gallery a{display:block; border-radius:10px; overflow:hidden; border:1px solid var(--line); text-decoration:none; color:inherit;}
  .gallery img{width:100%; height:120px; object-fit:cover; display:block;}
  .gallery .cap{font-size:11px; padding:5px 7px; color:var(--ink-soft); background:#fff;}

  /* 필터바 */
  .filterbar{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; align-items:center;}
  .filterbar select,.filterbar input{border:1px solid var(--line); border-radius:9px; padding:8px 11px; font-size:13px; background:#fff;}
  .filterbar input[type=text]{flex:1; min-width:160px;}

  /* AI */
  .ai-empty{color:var(--ink-soft); font-size:13px; line-height:1.6;}
  .ai-text{font-size:14px; line-height:1.65;}
  .ai-h{font-weight:700; font-size:15px; margin:15px 0 6px; color:var(--blue);}
  .ai-text .ai-h:first-child{margin-top:0;}
  .ai-li{margin:3px 0 3px 4px;}
  .ai-foot{margin-top:14px; padding-top:10px; border-top:1px solid var(--line); font-size:12px; display:flex; gap:16px;}
  .ai-foot a{color:var(--ink-soft); text-decoration:none;}

  /* 모달 */
  .modal-bg{position:fixed; inset:0; background:rgba(30,28,22,.45); display:none; align-items:flex-start; justify-content:center; z-index:50; padding:36px 16px; overflow-y:auto;}
  .modal-bg.open{display:flex;}
  .modal{background:var(--panel); border-radius:18px; width:min(560px,100%); padding:24px 24px 20px; box-shadow:0 20px 60px rgba(0,0,0,.25);}
  .modal h3{margin:0 0 16px; font-size:18px;}
  .field{margin-bottom:13px;}
  .field label{display:block; font-size:13px; font-weight:600; margin-bottom:6px; color:var(--ink-soft);}
  .field input, .field select, .field textarea{width:100%; border:1px solid var(--line); border-radius:10px; padding:10px 12px; font-size:14px; background:#fcfbf8;}
  .field textarea{min-height:74px; resize:vertical;}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .modal-acts{display:flex; gap:10px; margin-top:18px;}
  #uploadProgress{display:none; font-size:13px; color:var(--accent); margin-top:8px;}
  .hint{font-size:11px; color:var(--ink-soft); margin-top:4px;}

  /* 오류 배너 */
  #errBanner{position:fixed; left:50%; bottom:20px; transform:translateX(-50%);
    max-width:560px; width:calc(100% - 32px); background:#3a2320; color:#ffe9e4;
    border:1px solid #6b332b; border-radius:12px; padding:12px 16px; z-index:200;
    box-shadow:0 12px 40px rgba(0,0,0,.3); display:none; font-size:13px; line-height:1.5;}
  #errBanner.show{display:block;}
  #errBanner b{color:#ffb3a6;}
  #errBanner .ex{display:block; margin-top:6px; font-family:monospace; font-size:12px;
    color:#ffd6cd; word-break:break-all; max-height:120px; overflow:auto;}
  #errBanner .x{position:absolute; top:8px; right:12px; background:none; border:none;
    color:#ffb3a6; font-size:18px; cursor:pointer;}

  @media(max-width:780px){
    .wrap{flex-direction:column;}
    aside{width:auto; flex:none; border-right:none; border-bottom:1px solid var(--line);}
    .stats{grid-template-columns:repeat(2,1fr);}
    .row2,.cost-cols{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<div id="errBanner"><button class="x" onclick="document.getElementById('errBanner').classList.remove('show')">×</button>
  <b>⚠️ 오류가 발생했습니다</b><span id="errMsg"></span><span class="ex" id="errEx"></span></div>

<header class="topbar">
  <h1>🏗️ 부동산 프로젝트 관리</h1>
  <a class="home" href="index.html">← 홈</a>
</header>

<div class="wrap">
  <aside>
    <div class="side-title">프로젝트</div>
    <div id="projList"></div>
    <button class="btn btn-ghost btn-block" style="margin-top:10px" onclick="openProjectModal()">+ 새 프로젝트</button>
  </aside>
  <main id="main">
    <div class="empty">왼쪽에서 프로젝트를 선택하거나<br>새 프로젝트를 만들어 시작하세요.</div>
  </main>
</div>

<!-- 프로젝트 모달 -->
<div class="modal-bg" id="projectModal">
  <div class="modal">
    <h3>새 프로젝트</h3>
    <div class="field"><label>프로젝트명 *</label><input id="pf_name" placeholder="예: ○○상가 2층 인테리어"></div>
    <div class="field"><label>주소 / 위치</label><input id="pf_addr" placeholder="예: 서울시 ○○구 ○○동 123-4"></div>
    <div class="row2">
      <div class="field"><label>상태</label><select id="pf_status"><option>진행중</option><option>완료</option><option>보류</option></select></div>
      <div class="field"><label>시작일</label><input id="pf_date" type="date"></div>
    </div>
    <div class="field"><label>메모</label><textarea id="pf_memo" placeholder="프로젝트 개요, 담당자, 평형, 예산 등"></textarea></div>
    <div class="modal-acts">
      <button class="btn btn-primary" onclick="saveProject()">저장</button>
      <button class="btn btn-line" onclick="closeModal('projectModal')">취소</button>
    </div>
  </div>
</div>

<!-- 업체 모달 -->
<div class="modal-bg" id="vendorModal">
  <div class="modal">
    <h3>업체 / 연락처 추가</h3>
    <div class="row2">
      <div class="field"><label>업체/이름 *</label><input id="vf_name" placeholder="예: ○○전기"></div>
      <div class="field"><label>공종 / 역할</label><select id="vf_trade"></select></div>
    </div>
    <div class="field"><label>전화번호 *</label><input id="vf_phone" placeholder="010-0000-0000"></div>
    <div class="field"><label>메모</label><textarea id="vf_memo" placeholder="담당자, 단가, 특이사항 등"></textarea></div>
    <div class="modal-acts">
      <button class="btn btn-primary" onclick="saveVendor()">저장</button>
      <button class="btn btn-line" onclick="closeModal('vendorModal')">취소</button>
    </div>
  </div>
</div>

<!-- 기록 모달 -->
<div class="modal-bg" id="entryModal">
  <div class="modal">
    <h3 id="entryModalTitle">기록 추가</h3>
    <div class="row2">
      <div class="field"><label>종류 *</label>
        <select id="ef_kind" onchange="onKindChange()">
          <option value="자재비">자재비 / 공사비</option>
          <option value="기타비용">기타 비용</option>
          <option value="사진">사진 (전/중/후)</option>
          <option value="연락">연락 기록</option>
          <option value="서류">서류 / 공문서</option>
          <option value="문제">문제 / 하자 처리</option>
          <option value="메모">진행 메모</option>
        </select>
      </div>
      <div class="field"><label>날짜</label><input id="ef_date" type="date"></div>
    </div>

    <div class="row2">
      <div class="field" id="g_stage"><label>공정 단계</label><select id="ef_stage" onchange="fillCatSelect()"></select></div>
      <div class="field" id="g_cat"><label>세부 항목 (공정별 자재)</label><select id="ef_cat"></select></div>
    </div>

    <div class="field" id="g_photostage"><label>사진 구분</label>
      <select id="ef_photostage"><option>전</option><option>중(진행)</option><option>후</option></select>
    </div>

    <div class="field"><label>제목 *</label><input id="ef_title" placeholder="예: 거실 도배 시공 / 욕실 타일 압착시멘트"></div>

    <div class="row2">
      <div class="field"><label>거래처 / 상대</label><input id="ef_vendor" list="vendorList" placeholder="예: ○○자재, 김부장"><datalist id="vendorList"></datalist></div>
      <div class="field" id="g_amount"><label>금액 (원)</label><input id="ef_amount" type="number" placeholder="숫자만"></div>
    </div>
    <div class="field" id="g_pay"><label>결제 수단</label>
      <select id="ef_pay"><option>세금계산서</option><option>은행이체</option><option>카드</option><option>현금</option></select>
    </div>

    <div class="field"><label>내용 / 메모</label><textarea id="ef_memo" placeholder="시공 내용, 통화 요약, 문제 상황과 처리 방법 등"></textarea></div>
    <div class="field"><label>첨부파일 (PDF / 사진, 여러 개)</label>
      <input id="ef_files" type="file" multiple accept="image/*,application/pdf">
      <div id="uploadProgress">업로드 중...</div>
    </div>
    <div class="modal-acts">
      <button class="btn btn-primary" id="entrySaveBtn" onclick="saveEntry()">저장</button>
      <button class="btn btn-line" onclick="closeModal('entryModal')">취소</button>
    </div>
  </div>
</div>

<script>
/* ===== Firebase ===== */
const firebaseConfig = {
  apiKey: "AIzaSyAyG1chECYsbO7cSZUuXmNa0_KDYBmahPY",
  authDomain: "my-system-25497.firebaseapp.com",
  projectId: "my-system-25497",
  storageBucket: "my-system-25497.firebasestorage.app" // 콘솔 Storage에서 실제 버킷명 확인
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

  "샷시/창호": ["샷시(하이/시스템)","유리","방충망","실리콘/우레탄폼","창호 부속"],

/* ===== 기타 비용 세부 항목 ===== */
const ETC_CATS = [
  "교통/주유비","식비","등기비","등기 수수료(법무)","취득세","중개 수수료",
  "대출이자","관리비","보험료","예비비","기타"
];
const VENDOR_ROLES = STAGES.concat(["중개","법무","기타"]);

/* ===== 상태 ===== */
let projects=[], currentProjectId=null, entries=[], vendors=[];
let activeTab="대시보드";
let costFilter={stage:"전체",kind:"전체",pay:"전체",q:""};
let searchQ="";

/* ===== 로딩 ===== */
async function loadProjects(){
 try{
  const snap=await db.collection(PROJECTS).orderBy("createdAt","desc").get();
  projects=snap.docs.map(d=>({id:d.id,...d.data()}));
  renderProjectList();
 }catch(err){ showError("프로젝트 목록 불러오기 (Firestore 연결/권한 확인)", err); }
}
function renderProjectList(){
  const box=document.getElementById("projList");
  if(!projects.length){box.innerHTML='<div style="color:var(--ink-soft);font-size:13px;padding:8px 6px;">아직 프로젝트가 없습니다.</div>';return;}
  box.innerHTML=projects.map(p=>{
    const pct=progressPct(p);
    return `<div class="proj-item ${p.id===currentProjectId?'active':''}" onclick="selectProject('${p.id}')">
      <div class="pname">${esc(p.name)}</div>
      ${p.address?`<div class="paddr">${esc(p.address)}</div>`:''}
      <div class="pbar"><i style="width:${pct}%"></i></div>
      <span class="pstatus ${p.status||''}">${p.status||'진행중'} · ${pct}%</span>
    </div>`;}).join("");
}
async function selectProject(id){
 try{
  currentProjectId=id; renderProjectList();
  const [eSnap,vSnap]=await Promise.all([
    db.collection(ENTRIES).where("projectId","==",id).get(),
    db.collection(VENDORS).where("projectId","==",id).get()
  ]);
  entries=eSnap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  vendors=vSnap.docs.map(d=>({id:d.id,...d.data()}));
  activeTab="대시보드"; costFilter={stage:"전체",kind:"전체",pay:"전체",q:""}; searchQ="";
  renderMain();
 }catch(err){ showError("프로젝트 열기", err); }
}

/* ===== 진행률 ===== */
function stageStatus(p,stage){return ((p.stageStatus)||{})[stage]||"대기";}
function progressPct(p){const d=STAGES.filter(s=>stageStatus(p,s)==="완료").length; return Math.round(d/STAGES.length*100);}

/* ===== 메인 ===== */
function renderMain(){
  const p=projects.find(x=>x.id===currentProjectId);
  const main=document.getElementById("main");
  if(!p){main.innerHTML='<div class="empty">프로젝트를 선택하세요.</div>';return;}
  const tabs=["대시보드","공정","비용","사진","업체·연락","서류","검색"];
  main.innerHTML=`
    <div class="proj-head">
      <div><h2>${esc(p.name)}</h2>
        <div class="sub">${esc(p.address||'')} ${p.startDate?'· 시작 '+p.startDate:''}</div></div>
      <div class="acts">
        <button class="btn btn-primary btn-sm" onclick="openEntryModal()">+ 기록 추가</button>
        <button class="btn btn-line btn-sm" onclick="deleteProject()">프로젝트 삭제</button>
      </div>
    </div>
    <div class="tabs">
      ${tabs.map(t=>`<button class="tab ${t===activeTab?'active':''}" onclick="setTab('${t}')">${tabIcon(t)} ${t}</button>`).join("")}
    </div>
    <div id="tabContent"></div>`;
  renderTab(p);
}
function tabIcon(t){return {"대시보드":"📊","공정":"🔨","비용":"💰","사진":"📷","업체·연락":"📇","서류":"📁","검색":"🔍"}[t]||"";}
function setTab(t){activeTab=t; renderMain();}
function renderTab(p){
  try{
    const c=document.getElementById("tabContent");
    c.innerHTML = ({
      "대시보드":viewDashboard,"공정":viewStages,"비용":viewCost,"사진":viewPhotos,
      "업체·연락":viewVendors,"서류":viewDocs,"검색":viewSearch
    }[activeTab]||viewDashboard)(p);
    if(activeTab==="검색") renderSearchResult();
  }catch(err){ showError("화면 표시("+activeTab+" 탭)", err); }
}

/* ===== 대시보드 ===== */
function viewDashboard(p){
  const withAmt=entries.filter(e=>Number(e.amount)>0);
  const total=withAmt.reduce((s,e)=>s+Number(e.amount),0);
  const fileCount=entries.reduce((s,e)=>s+(e.files?e.files.length:0),0);
  const problems=entries.filter(e=>e.kind==="문제").length;
  const pct=progressPct(p);
  const doneCnt=STAGES.filter(s=>stageStatus(p,s)==="완료").length;
  const recent=entries.slice(0,6);

  const tl=STAGES.map((s,i)=>{const st=stageStatus(p,s);
    return `<div class="tl-step ${st==='완료'?'done':st==='진행'?'doing':''}">
      <div class="tl-dot">${st==='완료'?'✓':i+1}</div><div class="tl-label">${s}</div></div>`;}).join("");

  return `
    <div class="stats">
      <div class="stat"><div class="label">공정 진행률</div><div class="value">${pct}<small>%</small></div>
        <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
        <div class="label" style="margin-top:6px">${doneCnt} / ${STAGES.length} 단계 완료</div></div>
      <div class="stat"><div class="label">총 지출</div><div class="value">${total.toLocaleString()}<small> 원</small></div></div>
      <div class="stat"><div class="label">문제·하자</div><div class="value" style="color:${problems?'var(--danger)':'inherit'}">${problems}<small> 건</small></div></div>
      <div class="stat"><div class="label">기록 · 첨부</div><div class="value">${entries.length}<small> · ${fileCount}</small></div></div>
    </div>

    <div class="panel"><div class="panel-h">🗺️ 공정 타임라인</div>
      <div class="panel-body"><div class="timeline">${tl}</div></div></div>

    <div class="panel ai"><div class="panel-h">🤖 AI 프로젝트 분석 <span class="cnt">${p.analyzedAt?'· 최근 '+p.analyzedAt:'· 아직 분석 전'}</span>
        <button class="btn btn-ai btn-sm add" onclick="runAnalysis()">분석 실행</button></div>
      <div class="panel-body">
        <div id="aiResult">${p.lastAnalysis? mdLite(p.lastAnalysis)
          : '<div class="ai-empty">‘분석 실행’을 누르면 공정 진행·지출·문제기록·사진을 AI가 점검해<br><b>진행 상황 · 문제점/리스크 · 다음 할 일 · 비용 점검</b>을 정리해 줍니다.</div>'}</div>
        <div class="ai-foot"><a href="#" onclick="runAnalysis();return false;">↻ 다시 분석</a>
          <a href="#" onclick="resetKey();return false;">🔑 API 키 변경</a></div>
      </div></div>

    <div class="panel"><div class="panel-h">🕓 최근 활동 <span class="cnt">${entries.length}건 중 최신</span></div>
      <div class="panel-body">${recent.length? recent.map(renderLog).join("") : '<div class="ai-empty">기록이 없습니다.</div>'}</div></div>
  `;
}

/* ===== 공정 ===== */
function viewStages(p){
  const pct=progressPct(p);
  const cards=STAGES.map((stage,i)=>{
    const st=stageStatus(p,stage);
    const logs=entries.filter(e=>e.stage===stage);
    const amt=logs.filter(e=>Number(e.amount)>0).reduce((s,e)=>s+Number(e.amount),0);
    const probs=logs.filter(e=>e.kind==="문제").length;
    return `
    <div class="stage s${st}" id="stage_${i}">
      <div class="stage-h" onclick="toggleStage(${i})">
        <div class="stage-no">${st==='완료'?'✓':i+1}</div>
        <div><div class="stage-name">${stage}</div>
          <div class="stage-sub">${logs.length}건${probs?` · ⚠️ 문제 ${probs}`:''}</div></div>
        <div class="stage-right">${amt?`<span class="stage-amt">${amt.toLocaleString()}원</span>`:''}
          <span class="stage-badge ${st}">${st}</span></div>
      </div>
      <div class="stage-body">
        <div class="stage-statusrow">
          ${["대기","진행","완료"].map(s=>`<button class="mini-chip ${st===s?'on':''}" onclick="setStageStatus('${jsstr(stage)}','${s}')">${s}</button>`).join("")}
          <button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="openEntryModal('${jsstr(stage)}')">+ 이 공정에 기록</button>
        </div>
        <div style="margin-top:10px">${logs.length? logs.map(renderLog).join("") : '<div style="color:var(--ink-soft);font-size:13px;padding:8px 0">기록 없음</div>'}</div>
      </div>
    </div>`;}).join("");
  return `
    <div class="panel"><div class="panel-body" style="padding:15px 17px">
      <div style="display:flex;align-items:center;gap:12px"><b>전체 진행률 ${pct}%</b>
        <div class="progress-wrap" style="flex:1;margin-top:0"><div class="progress-bar" style="width:${pct}%"></div></div></div>
      <div class="hint" style="margin-top:8px">셀프 인테리어 표준 순서입니다. 단계를 눌러 상태를 바꾸고, “+ 이 공정에 기록”으로 자재·사진·문제를 남기면 그 공정에 맞는 자재 항목이 자동으로 나옵니다.</div>
    </div></div>${cards}`;
}
function toggleStage(i){document.getElementById('stage_'+i).classList.toggle('open');}
async function setStageStatus(stage,status){
  const p=projects.find(x=>x.id===currentProjectId);
  const ss=Object.assign({},p.stageStatus||{}); ss[stage]=status;
  await db.collection(PROJECTS).doc(currentProjectId).update({stageStatus:ss});
  p.stageStatus=ss; renderProjectList(); renderTab(p);
}

/* ===== 비용 ===== */
function viewCost(p){
  const withAmt=entries.filter(e=>Number(e.amount)>0);
  const total=withAmt.reduce((s,e)=>s+Number(e.amount),0);
  const max=Math.max(1,...withAmt.map(e=>Number(e.amount)));

  const byStage={}; withAmt.filter(e=>e.kind==="자재비").forEach(e=>{const k=e.stage||"미지정"; byStage[k]=(byStage[k]||0)+Number(e.amount);});
  const stageSum=Object.values(byStage).reduce((a,b)=>a+b,0);
  const stageRows=STAGES.filter(s=>byStage[s]).map(s=>barRow(s,byStage[s],stageSum)).join("")
    +(byStage["미지정"]?barRow("미지정",byStage["미지정"],stageSum):"");

  const byEtc={}; withAmt.filter(e=>e.kind==="기타비용").forEach(e=>{const k=e.cat||"기타"; byEtc[k]=(byEtc[k]||0)+Number(e.amount);});
  const etcSum=Object.values(byEtc).reduce((a,b)=>a+b,0);
  const etcRows=Object.keys(byEtc).sort((a,b)=>byEtc[b]-byEtc[a]).map(k=>barRow(k,byEtc[k],etcSum)).join("");

  const byPay={}; withAmt.forEach(e=>{const k=e.pay||"미지정"; byPay[k]=(byPay[k]||0)+Number(e.amount);});
  const payRows=Object.keys(byPay).sort((a,b)=>byPay[b]-byPay[a]).map(k=>`<tr><td>${k}</td><td class="num">${byPay[k].toLocaleString()}</td></tr>`).join("");

  const byVen={}; withAmt.forEach(e=>{if(e.vendor){byVen[e.vendor]=(byVen[e.vendor]||0)+Number(e.amount);}});
  const venRows=Object.keys(byVen).sort((a,b)=>byVen[b]-byVen[a]).slice(0,12).map(k=>`<tr><td>${esc(k)}</td><td class="num">${byVen[k].toLocaleString()}</td></tr>`).join("");

  // 필터된 지출 목록
  let list=withAmt.filter(e=>
    (costFilter.stage==="전체"||e.stage===costFilter.stage) &&
    (costFilter.kind==="전체"||e.kind===costFilter.kind) &&
    (costFilter.pay==="전체"||e.pay===costFilter.pay) &&
    (!costFilter.q || (e.title+' '+(e.vendor||'')+' '+(e.cat||'')+' '+(e.memo||'')).toLowerCase().includes(costFilter.q.toLowerCase()))
  );
  const listSum=list.reduce((s,e)=>s+Number(e.amount),0);

  return `
    <div class="stats">
      <div class="stat"><div class="label">총 지출</div><div class="value">${total.toLocaleString()}<small> 원</small></div></div>
      <div class="stat"><div class="label">공정 자재·공사비</div><div class="value">${stageSum.toLocaleString()}<small> 원</small></div></div>
      <div class="stat"><div class="label">기타 비용</div><div class="value">${etcSum.toLocaleString()}<small> 원</small></div></div>
      <div class="stat"><div class="label">지출 건수</div><div class="value">${withAmt.length}<small> 건</small></div></div>
    </div>
    <div class="cost-cols">
      <div class="panel"><div class="panel-h">🔨 공정별 자재·공사비</div><div class="panel-body">
        <table class="ctable"><thead><tr><th>공정</th><th class="num">금액(원)</th></tr></thead>
        <tbody>${stageRows||'<tr><td colspan="2" style="color:var(--ink-soft)">기록 없음</td></tr>'}
        ${stageSum?`<tr class="sum"><td>소계</td><td class="num">${stageSum.toLocaleString()}</td></tr>`:''}</tbody></table></div></div>
      <div class="panel"><div class="panel-h">🧾 기타 비용</div><div class="panel-body">
        <table class="ctable"><thead><tr><th>항목</th><th class="num">금액(원)</th></tr></thead>
        <tbody>${etcRows||'<tr><td colspan="2" style="color:var(--ink-soft)">기록 없음</td></tr>'}
        ${etcSum?`<tr class="sum"><td>소계</td><td class="num">${etcSum.toLocaleString()}</td></tr>`:''}</tbody></table></div></div>
    </div>
    <div class="cost-cols">
      <div class="panel"><div class="panel-h">💳 결제수단별 (세무·증빙)</div><div class="panel-body">
        <table class="ctable"><thead><tr><th>결제수단</th><th class="num">금액(원)</th></tr></thead>
        <tbody>${payRows||'<tr><td colspan="2" style="color:var(--ink-soft)">기록 없음</td></tr>'}
        ${total?`<tr class="sum"><td>합계</td><td class="num">${total.toLocaleString()}</td></tr>`:''}</tbody></table></div></div>
      <div class="panel"><div class="panel-h">🏢 거래처별 지출 <span class="cnt">상위 12</span></div><div class="panel-body">
        <table class="ctable"><thead><tr><th>거래처</th><th class="num">금액(원)</th></tr></thead>
        <tbody>${venRows||'<tr><td colspan="2" style="color:var(--ink-soft)">거래처 입력된 지출 없음</td></tr>'}</tbody></table></div></div>
    </div>
    <div class="panel"><div class="panel-h">📋 지출 내역</div><div class="panel-body">
      <div class="filterbar">
        <select onchange="costFilter.stage=this.value;renderTab(projects.find(x=>x.id===currentProjectId))">
          <option ${costFilter.stage==='전체'?'selected':''}>전체</option>
          ${STAGES.map(s=>`<option ${costFilter.stage===s?'selected':''}>${s}</option>`).join("")}</select>
        <select onchange="costFilter.kind=this.value;renderTab(projects.find(x=>x.id===currentProjectId))">
          ${["전체","자재비","기타비용"].map(k=>`<option ${costFilter.kind===k?'selected':''}>${k}</option>`).join("")}</select>
        <select onchange="costFilter.pay=this.value;renderTab(projects.find(x=>x.id===currentProjectId))">
          ${["전체","세금계산서","은행이체","카드","현금"].map(k=>`<option ${costFilter.pay===k?'selected':''}>${k}</option>`).join("")}</select>
        <input type="text" id="costSearchInput" placeholder="제목·거래처·메모 검색" value="${esc(costFilter.q)}"
          oninput="onCostSearch(this.value)">
        <b style="margin-left:auto" id="costListSum">${list.length}건 · ${listSum.toLocaleString()}원</b>
      </div>
      <div id="costList">${list.length? list.map(renderLog).join("") : '<div class="ai-empty">조건에 맞는 지출이 없습니다.</div>'}</div>
    </div></div>`;
}
function costFiltered(){
  const withAmt=entries.filter(e=>Number(e.amount)>0);
  return withAmt.filter(e=>

/* ===== 통합검색 =====
   입력창은 다시 그리지 않고 결과 영역(#searchResult)만 갱신해야
   한글 조합 중(자음만 입력)에도 끊기지 않는다. */
function searchEntries(q){
  q=(q||"").trim().toLowerCase();
  if(!q) return null;
  return entries.filter(e=>{
    const hay=[e.title,e.memo,e.vendor,e.cat,e.stage,e.kind,e.pay,e.photostage,e.amount].join(' ').toLowerCase();
    return hay.includes(q);
  });
}
function renderSearchResult(){
  const cnt=document.getElementById("searchCount");
  const box=document.getElementById("searchResult");
  if(!box) return;
  const res=searchEntries(searchQ);
  if(res===null){
    if(cnt) cnt.textContent="";
    box.innerHTML='<div class="ai-empty">찾을 단어를 입력하세요. 이 프로젝트의 모든 기록(자재·비용·사진·연락·서류·문제)에서 한 번에 찾습니다.</div>';
    return;
  }
  if(cnt) cnt.textContent=res.length+"건";
  box.innerHTML = res.length? res.map(renderLog).join("") : '<div class="ai-empty">검색 결과가 없습니다.</div>';
}
function onSearchInput(v){ searchQ=v; renderSearchResult(); }
function viewSearch(p){
  return `<div class="panel"><div class="panel-h">🔍 통합 검색 <span class="cnt" id="searchCount"></span></div><div class="panel-body">
    <div class="filterbar"><input type="text" id="searchInput" autofocus
      placeholder="제목·메모·거래처·공정·금액 무엇이든 검색 (예: 타일, 김부장, 세금계산서)"
      value="${esc(searchQ)}" oninput="onSearchInput(this.value)"></div>
    <div id="searchResult"></div>
  </div></div>`;
}

/* ===== 공통 렌더 ===== */
function renderLog(e){
  const files=(e.files||[]).map(f=>{
    const isImg=(f.type||"").startsWith("image/");
    return `<a class="file" href="${f.url}" target="_blank" rel="noopener">${isImg?`<img src="${f.url}">`:`<div class="fi">PDF</div>`}<span class="fname">${esc(f.name)}</span></a>`;
  }).join("");
  const tags=[
    e.kind==="문제"?`<span class="l-tag 문제">문제·하자</span>`:'',
    e.kind==="사진"?`<span class="l-tag 사진">사진 ${e.photostage||''}</span>`:'',
    e.kind==="자재비"?`<span class="l-tag">자재·공사</span>`:'',
    e.kind==="기타비용"?`<span class="l-tag">${e.cat||'기타비용'}</span>`:'',
    e.kind==="연락"?`<span class="l-tag">연락</span>`:'',
    e.kind==="서류"?`<span class="l-tag">서류</span>`:'',
    e.kind==="메모"?`<span class="l-tag">메모</span>`:'',
    e.stage?`<span class="l-tag 공정">${e.stage}</span>`:'',
    (e.cat&&e.kind==="자재비")?`<span class="l-tag">${e.cat}</span>`:'',
    (e.pay&&e.amount)?`<span class="l-tag">${e.pay}</span>`:''
  ].join("");
  return `<div class="log">
    <div class="l-top">${tags}<span class="l-title">${esc(e.title)}</span><span class="l-date">${e.date||''}</span>
      <button class="l-del" onclick="deleteEntry('${e.id}')">삭제</button></div>
    ${(e.vendor||e.amount)?`<div class="l-meta">${e.vendor?'거래처 '+esc(e.vendor):''}${e.vendor&&e.amount?' · ':''}${e.amount?'<b>'+Number(e.amount).toLocaleString()+'원</b>':''}</div>`:''}
    ${e.memo?`<div class="l-memo">${esc(e.memo)}</div>`:''}
    ${files?`<div class="files">${files}</div>`:''}</div>`;
}
function renderVendor(v,spent){
  return `<div class="vendor">
    <span class="vtrade">${v.trade||'기타'}</span>
    <div><div class="vname">${esc(v.name)}</div>${v.memo?`<div class="vmemo">${esc(v.memo)}</div>`:''}${spent?`<div class="vspent">지출 ${spent.toLocaleString()}원</div>`:''}</div>

/* ===== AI ===== */
function getApiKey(){
  let k=localStorage.getItem('anthropic_key');
  if(!k){k=prompt("Anthropic API 키를 입력하세요.\n(이 브라우저에만 저장되며, 코드/깃허브에는 올라가지 않습니다)");
    if(k&&k.trim()){k=k.trim(); localStorage.setItem('anthropic_key',k);} else return null;}
  return k;
}
function resetKey(){localStorage.removeItem('anthropic_key'); if(getApiKey()) alert("API 키가 변경되었습니다.");}
function buildPrompt(p){
  const withAmt=entries.filter(e=>Number(e.amount)>0);
  const total=withAmt.reduce((s,e)=>s+Number(e.amount),0);
  const stageInfo=STAGES.map(s=>{const st=stageStatus(p,s);
    const amt=entries.filter(e=>e.stage===s&&Number(e.amount)>0).reduce((a,e)=>a+Number(e.amount),0);
    const probs=entries.filter(e=>e.stage===s&&e.kind==="문제").length;
    return `${s}[${st}${amt?' '+amt.toLocaleString()+'원':''}${probs?' 문제'+probs:''}]`;}).join(" → ");
  const problems=entries.filter(e=>e.kind==="문제").map(e=>`- ${e.stage||''} ${e.title}: ${(e.memo||'').replace(/\s+/g,' ').slice(0,120)}`).join("\n");
  const etc=entries.filter(e=>e.kind==="기타비용"&&Number(e.amount)>0).map(e=>`- ${e.cat}: ${Number(e.amount).toLocaleString()}원`).join("\n");
  return `당신은 셀프 인테리어/부동산 프로젝트를 점검하는 꼼꼼한 현장 관리자입니다.
아래 "${p.name}" 프로젝트의 실제 데이터에 근거해서만 분석하고, 추정이면 "추정"이라 표시하세요.

[개요] 주소 ${p.address||'-'} / 상태 ${p.status||'-'} / 시작 ${p.startDate||'-'} / 진행률 ${progressPct(p)}%
[메모] ${p.memo||'-'}
[공정 진행(셀프 인테리어 표준순서)]
${stageInfo}
[총 지출] ${total.toLocaleString()}원 (기록 ${entries.length}건)
[기타비용]
${etc||'없음'}
[문제·하자 기록]
${problems||'없음'}

다음 형식(마크다운)으로 한국어로 간결하게:
## 진행 상황
(2~3줄. 어느 공정까지 왔고 다음 차례는 무엇인지. 셀프 인테리어 표준순서 기준)
## ⚠️ 문제점 / 리스크
- (예: 순서상 다음 공정 준비, 특정 공정 지출 과다, 증빙(세금계산서/영수증) 없는 지출, 미해결 문제기록, 마루는 도배 전·장판은 도배 후 순서, 시공 전/후 사진 누락, 예비비 10~15% 확보 등)
## 💡 다음 할 일
- (지금 챙길 구체적 행동)
## 💰 비용 점검
- (공정별·결제수단 분포에서 눈에 띄는 점, 세무·증빙 관점)`;
}
async function runAnalysis(){
  const p=projects.find(x=>x.id===currentProjectId); if(!p) return;
  if(entries.length===0 && progressPct(p)===0){alert("분석할 기록이 없습니다. 먼저 공정 상태나 기록을 입력하세요.");return;}
  const key=getApiKey(); if(!key) return;
  const box=document.getElementById('aiResult'); if(box) box.innerHTML='<div class="ai-empty">🤖 분석 중입니다…</div>';
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:AI_MODEL,max_tokens:1500,messages:[{role:"user",content:buildPrompt(p)}]})});
    const data=await res.json();
    if(data.error) throw new Error(data.error.message||'API 오류');
    const text=(data.content||[]).filter(c=>c.type==='text').map(c=>c.text).join("\n").trim();
    if(!text) throw new Error('빈 응답');
    const now=new Date().toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
    await db.collection(PROJECTS).doc(currentProjectId).update({lastAnalysis:text,analyzedAt:now});
    p.lastAnalysis=text; p.analyzedAt=now; if(activeTab==="대시보드") renderTab(p);
  }catch(err){ if(box) box.innerHTML='<div class="ai-empty" style="color:var(--danger)">분석 실패: '+esc(err.message)
      +'<br><br>· API 키·잔액(크레딧)을 확인하세요.<br>· 모델명(AI_MODEL)이 다른 페이지와 같은지 확인하세요.</div>';}
}
function mdLite(t){let h=esc(t).replace(/^#{2,3}\s*(.*)$/gm,'<div class="ai-h">$1</div>')
  .replace(/^\s*[-*]\s+(.*)$/gm,'<div class="ai-li">• $1</div>').replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')
  .replace(/\n/g,'<br>').replace(/(<\/div>)<br>/g,'$1'); return '<div class="ai-text">'+h+'</div>';}

async function saveEntry(){
  const title=val("ef_title").trim(); if(!title){alert("제목을 입력하세요.");return;}
  const k=val("ef_kind"); const isMoney=(k==="자재비"||k==="기타비용");
  const btn=document.getElementById("entrySaveBtn"); btn.disabled=true; btn.textContent="저장 중...";
 try{
  let files=[]; const fi=document.getElementById("ef_files");
  if(fi.files.length){
    document.getElementById("uploadProgress").style.display="block";
    for(const f of fi.files){
      const path=`realestate/${currentProjectId}/${Date.now()}_${f.name}`;
      const ref=storage.ref(path); await ref.put(f);
      files.push({name:f.name,url:await ref.getDownloadURL(),type:f.type,path});
    }
    document.getElementById("uploadProgress").style.display="none";
  }
  await db.collection(ENTRIES).add({
    projectId:currentProjectId, kind:k, title, date:val("ef_date"),
    stage:(k!=="기타비용"&&val("ef_stage"))?val("ef_stage"):null,
    cat:isMoney?val("ef_cat"):null,
    photostage:k==="사진"?val("ef_photostage"):null,
    vendor:val("ef_vendor").trim(),
    amount:isMoney&&val("ef_amount")?Number(val("ef_amount")):null,
    pay:isMoney?val("ef_pay"):null,
    memo:val("ef_memo").trim(), files,
    createdAt:firebase.firestore.FieldValue.serverTimestamp()
  });
  btn.disabled=false; btn.textContent="저장";
  closeModal("entryModal"); await selectProject(currentProjectId);
 }catch(err){
  btn.disabled=false; btn.textContent="저장";
  document.getElementById("uploadProgress").style.display="none";
  showError("기록 저장 (파일 업로드/Storage 또는 DB 권한 확인)", err);
 }
}
async function deleteEntry(id){
  if(!confirm("이 기록을 삭제할까요?"))return;
  const e=entries.find(x=>x.id===id);
  if(e&&e.files) for(const f of e.files){if(f.path){try{await storage.ref(f.path).delete();}catch(_){}}}
  await db.collection(ENTRIES).doc(id).delete(); await selectProject(currentProjectId);
}

function val(id){return document.getElementById(id).value;}
function today(){return new Date().toISOString().slice(0,10);}
function esc(s){return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function jsstr(s){return String(s).replace(/'/g,"\\'");}
function show(id,on){document.getElementById(id).style.display=on?'block':'none';}
function openModal(id){document.getElementById(id).classList.add("open");}
function closeModal(id){document.getElementById(id).classList.remove("open");}

/* ===== 오류 표시 ===== */
function showError(where, err){
  const b=document.getElementById("errBanner");
  const msg=document.getElementById("errMsg"), ex=document.getElementById("errEx");
  const detail=(err&&(err.message||err.toString()))||"알 수 없는 오류";
  if(msg) msg.textContent = " — 위치: "+where;
  if(ex) ex.textContent = detail;
  if(b) b.classList.add("show");
  console.error("["+where+"]", err);
}
// 처리되지 않은 모든 오류를 잡아 배너로 표시
window.addEventListener("error", function(e){ showError("스크립트", e.error||e.message); });
window.addEventListener("unhandledrejection", function(e){ showError("비동기 처리", e.reason); });

/* 시작 */
try{ loadProjects(); }catch(err){ showError("프로젝트 불러오기", err); }
