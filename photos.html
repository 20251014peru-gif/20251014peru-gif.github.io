<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>사진 보관함</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
:root{
  --ink:#3f4a57; --ink-soft:#8893a1; --line:#e4ebf2;
  --primary:#5b9bd5; --primary-deep:#3f7cb8; --primary-soft:#e3f0fb;
  --mint:#5cc2a0; --mint-soft:#ddf3eb; --peach:#ef8d8d;
  --gold:#e6b04d; --gold-soft:#fbeecb; --lav:#9a8cd6; --lav-soft:#ebe6f9;
  --shadow:0 1px 2px rgba(63,124,184,.06), 0 8px 26px rgba(63,124,184,.09);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:linear-gradient(180deg,#f5f9fc,#eef4fa);background-attachment:fixed;color:var(--ink);font-family:'Pretendard',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
body{padding:0 0 90px;min-height:100vh}
.wrap{max-width:980px;margin:0 auto;padding:0 16px}
a{color:inherit;text-decoration:none}
header{background:linear-gradient(135deg,#e3eefb,#e6f5ef 60%,#eaf0fb);border-bottom:1px solid var(--line);padding:18px 0 14px}
.head-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.brand h1{font-family:'Gowun Batang',serif;font-size:24px;font-weight:700;color:#33567d;display:inline}
.brand .sub{color:var(--ink-soft);font-size:12.5px;margin-left:8px}
.home-link{font-size:12.5px;color:var(--primary-deep);border:1px solid var(--line);background:#fff;padding:6px 12px;border-radius:999px}
.status{font-size:12px;display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--ink-soft)}
.status .dot{width:8px;height:8px;border-radius:50%;background:#cdd6e0}
.status.on .dot{background:var(--mint)} .status.off .dot{background:var(--peach)}
.tabs{display:flex;gap:8px;margin:16px 0 6px;flex-wrap:wrap}
.tab{flex:1;min-width:72px;border:1px solid var(--line);background:#fff;border-radius:14px;padding:12px 8px;text-align:center;cursor:pointer;transition:.18s;box-shadow:var(--shadow)}
.tab .ic{font-size:22px;display:block;margin-bottom:4px}
.tab .nm{font-size:13.5px;font-weight:600;color:var(--ink)}
.tab .ct{font-size:11px;color:var(--ink-soft);margin-top:2px}
.tab.active{transform:translateY(-2px)}
.tab[data-cat="부동산"].active{border-color:var(--primary);background:var(--primary-soft)}
.tab[data-cat="업무"].active{border-color:var(--mint);background:var(--mint-soft)}
.tab[data-cat="여행"].active{border-color:var(--gold);background:var(--gold-soft)}
.tab[data-cat="개인"].active{border-color:var(--lav);background:var(--lav-soft)}
.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:12px 0}
.search{flex:1;min-width:160px;display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:9px 13px}
.search input{border:0;outline:0;width:100%;font-size:14px;background:transparent;color:var(--ink)}
.btn{border:0;border-radius:12px;padding:10px 15px;font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-deep));color:#fff;box-shadow:0 4px 14px rgba(63,124,184,.28)}
.btn-ghost{background:#fff;border:1px solid var(--line);color:var(--ink)}
.btn-sm{padding:8px 12px;font-size:12.5px}
.btn-danger{background:var(--peach);color:#fff}
.count{font-size:12.5px;color:var(--ink-soft);margin:2px 2px 10px}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
@media(max-width:520px){.gallery{grid-template-columns:repeat(2,1fr);gap:10px}}
.photo{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:.18s;display:flex;flex-direction:column}
.photo:active{transform:scale(.98)}
.photo .thumb{width:100%;aspect-ratio:1/1;object-fit:cover;background:#eef3f8;display:block}
.photo .meta{padding:8px 10px 10px}
.photo .ttl{font-size:13px;font-weight:600;color:var(--ink);line-height:1.35;word-break:break-all;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:34px}
.photo .dt{font-size:11px;color:var(--ink-soft);margin-top:3px}
.empty{text-align:center;color:var(--ink-soft);padding:60px 20px;font-size:14px;line-height:1.7}
.viewer{position:fixed;inset:0;background:rgba(28,38,50,.92);display:none;z-index:60;flex-direction:column}
.viewer.show{display:flex}
.viewer .vtop{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;gap:10px}
.viewer .vtitle{color:#fff;font-size:15px;font-weight:600;flex:1;word-break:break-all}
.viewer .vclose{background:rgba(255,255,255,.16);color:#fff;border:0;width:38px;height:38px;border-radius:50%;font-size:20px;cursor:pointer;flex-shrink:0}
.viewer .vimgwrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:0 12px;touch-action:none}
.viewer .vimg{max-width:100%;max-height:100%;border-radius:10px;box-shadow:0 12px 40px rgba(0,0,0,.4);transform-origin:center center;transition:transform .04s linear;will-change:transform;user-select:none;-webkit-user-drag:none}
.viewer .vmeta{color:#c6d2de;font-size:12px;text-align:center;padding:6px 16px 2px}
.viewer .vbar{display:flex;gap:8px;padding:14px 16px calc(16px + env(safe-area-inset-bottom));flex-wrap:wrap;justify-content:center}
.viewer .vbar .btn{flex:1;min-width:110px;max-width:200px}
.overlay{position:fixed;inset:0;background:rgba(40,52,66,.45);backdrop-filter:blur(3px);display:none;align-items:flex-end;justify-content:center;z-index:70}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:560px;max-height:90vh;overflow:auto;padding:22px 20px calc(22px + env(safe-area-inset-bottom));box-shadow:0 -8px 40px rgba(40,52,66,.22)}
@media(min-width:560px){.overlay{align-items:center}.modal{border-radius:20px}}
.modal h3{font-family:'Gowun Batang',serif;font-size:19px;color:#33567d;margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;color:var(--ink-soft);margin-bottom:6px;font-weight:600}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:11px;padding:11px 13px;font-size:16px;font-family:inherit;color:var(--ink);background:#fbfdff;outline:0}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--primary)}
.field textarea{resize:vertical;min-height:64px}
.preview-img{width:100%;max-height:240px;object-fit:contain;border-radius:12px;background:#eef3f8;margin-bottom:10px;display:none}
.btn-row{display:flex;gap:10px;margin-top:18px}
.btn-row .btn{flex:1;padding:13px}
.busy{display:none;align-items:center;gap:8px;font-size:13px;color:var(--primary-deep);margin:6px 0}
.busy.show{display:flex}
.spin{width:16px;height:16px;border:2px solid var(--primary-soft);border-top-color:var(--primary);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.fab{position:fixed;right:18px;bottom:calc(18px + env(safe-area-inset-bottom));z-index:50;display:flex;flex-direction:column;gap:10px;align-items:flex-end}
.fab .fbtn{border:0;border-radius:16px;height:54px;padding:0 20px;font-size:15px;font-weight:700;color:#fff;cursor:pointer;box-shadow:0 8px 22px rgba(63,124,184,.34);display:flex;align-items:center;gap:8px;font-family:inherit}
.fab .fbtn.cam{background:linear-gradient(135deg,var(--primary),var(--primary-deep))}
.fab .fbtn.pick{background:#fff;color:var(--primary-deep);border:1px solid var(--line);box-shadow:var(--shadow);height:46px;font-size:13.5px}
.toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%) translateY(20px);background:#33424f;color:#fff;padding:11px 20px;border-radius:999px;font-size:13.5px;opacity:0;pointer-events:none;transition:.3s;z-index:300;box-shadow:0 8px 24px rgba(0,0,0,.2);max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.hidden-input{display:none}
/* 편집기 */
.editor{position:fixed;inset:0;background:#10161d;display:none;flex-direction:column;z-index:80}
.editor.show{display:flex}
.ed-top{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:#161e27;border-bottom:1px solid #243140;flex-shrink:0}
.ed-title{color:#fff;font-size:15px;font-weight:600}
.ed-x{background:rgba(255,255,255,.14);color:#fff;border:0;width:36px;height:36px;border-radius:50%;font-size:20px;cursor:pointer}
.ed-save{background:linear-gradient(135deg,#5b9bd5,#3f7cb8);color:#fff;border:0;padding:9px 18px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.ed-stage{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:6px;min-height:0}
.ed-canvas-box{position:relative;background-position:center;background-size:100% 100%;background-repeat:no-repeat;border-radius:6px;overflow:hidden}
.ed-tools{background:#161e27;border-top:1px solid #243140;padding:10px 12px calc(10px + env(safe-area-inset-bottom));flex-shrink:0}
.ed-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:8px}
.ed-row:last-child{margin-bottom:0}
.ed-btn{flex:1;min-width:52px;background:#1e2935;border:1px solid #2c3a4a;color:#cdd9e5;border-radius:11px;padding:10px 4px;font-size:18px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:inherit}
.ed-btn span{font-size:10.5px}
.ed-btn:active{background:#2a4055}
.ed-c{width:30px;height:30px;border-radius:50%;cursor:pointer;flex-shrink:0;box-shadow:0 0 0 2px transparent}
.ed-c.on{box-shadow:0 0 0 2px #fff,0 0 0 4px #5b9bd5}
.ed-colors{display:flex;gap:8px;flex:1;flex-wrap:wrap;align-items:center}
.ed-del{background:#3a2330;border:1px solid #5c3344;color:#ff9db0;border-radius:11px;padding:10px 14px;font-size:13px;cursor:pointer;font-family:inherit}
.ed-hint{color:#7d8b99;font-size:11px;line-height:1.5;text-align:center;margin-top:6px}
.ed-loading{color:#9fb8cf;font-size:14px;text-align:center;padding:40px}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="head-row">
      <div class="brand"><h1>사진 보관함</h1><span class="sub">부동산·업무·여행·개인 <b style="color:#9aa7b4">v24</b></span></div>
      <div style="display:flex;gap:8px;align-items:center">
        <span class="status" id="status"><span class="dot"></span><span id="statusText">연결 중…</span></span>
        <a class="home-link" href="./index.html">🏠 홈</a>
      </div>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="tabs" id="tabs">
    <div class="tab active" data-cat="부동산"><span class="ic">🏢</span><span class="nm">부동산</span><span class="ct" id="ct-부동산">0</span></div>
    <div class="tab" data-cat="업무"><span class="ic">💼</span><span class="nm">업무</span><span class="ct" id="ct-업무">0</span></div>
    <div class="tab" data-cat="여행"><span class="ic">✈️</span><span class="nm">여행</span><span class="ct" id="ct-여행">0</span></div>
    <div class="tab" data-cat="개인"><span class="ic">🌿</span><span class="nm">개인</span><span class="ct" id="ct-개인">0</span></div>
  </div>
  <div class="toolbar">
    <div class="search"><span style="color:var(--ink-soft)">🔍</span><input type="text" id="searchInput" placeholder="이름·메모 검색"></div>
    <button class="btn btn-ghost btn-sm" id="btnExport">⬇ 백업</button>
  </div>
  <div class="count" id="countText"></div>
  <div class="gallery" id="gallery"></div>
</div>

<div class="fab">
  <button class="fbtn dbgfab" id="dbgBtn" style="height:38px;font-size:12px;background:#fff;color:#8893a1;border:1px solid #e4ebf2;box-shadow:0 1px 6px rgba(0,0,0,.08)">🐞 진단</button>
  <button class="fbtn pick" id="fabPick">🖼 사진에서</button>
  <button class="fbtn cam" id="fabCam">📷 사진 추가</button>
</div>
<input type="file" id="camInput" class="hidden-input" accept="image/*" capture="environment">
<input type="file" id="pickInput" class="hidden-input" accept="image/*" multiple>

<div class="overlay" id="addOverlay">
  <div class="modal">
    <h3 id="addTitle">사진 저장</h3>
    <img class="preview-img" id="addPreview" alt="">
    <div class="busy" id="addBusy"><span class="spin"></span><span>저장 중…</span></div>
    <div class="field"><label>이름 (비우면 날짜로 저장돼요)</label><input type="text" id="addName" placeholder="예: 상가 누수 현장"></div>
    <div class="field"><label>분류</label>
      <select id="addCat"><option value="부동산">🏢 부동산</option><option value="업무">💼 업무</option><option value="여행">✈️ 여행</option><option value="개인">🌿 개인</option></select>
    </div>
    <div class="field"><label>메모 (선택)</label><textarea id="addMemo" placeholder="기억할 내용"></textarea></div>
    <div class="btn-row"><button class="btn btn-primary" id="addSave">저장</button><button class="btn btn-ghost" id="addCancel">취소</button></div>
  </div>
</div>

<div class="overlay" id="editOverlay">
  <div class="modal">
    <h3>이름·분류 변경</h3>
    <div class="field"><label>이름</label><input type="text" id="editName"></div>
    <div class="field"><label>분류</label>
      <select id="editCat"><option value="부동산">🏢 부동산</option><option value="업무">💼 업무</option><option value="여행">✈️ 여행</option><option value="개인">🌿 개인</option></select>
    </div>
    <div class="field"><label>메모</label><textarea id="editMemo"></textarea></div>
    <div class="btn-row"><button class="btn btn-primary" id="editSave">변경 저장</button><button class="btn btn-ghost" id="editCancel">취소</button></div>
  </div>
</div>

<div class="viewer" id="viewer">
  <div class="vtop"><span class="vtitle" id="vTitle"></span><button class="vclose" id="vClose">×</button></div>
  <div class="vimgwrap"><img class="vimg" id="vImg" src="" alt=""></div>
  <div class="vmeta" id="vMeta"></div>
  <div class="vbar">
    <button class="btn btn-primary" id="vShare">📤 카톡·공유</button>
    <button class="btn btn-ghost" id="vMarkup">🖊 그림·표시</button>
    <button class="btn btn-ghost" id="vDownload">⬇ 저장</button>
    <button class="btn btn-ghost" id="vEdit">✏️ 이름변경</button>
    <button class="btn btn-danger" id="vDelete">🗑 삭제</button>
  </div>
</div>

<div class="editor" id="editor">
  <div class="ed-top">
    <button class="ed-x" id="edClose">×</button>
    <span class="ed-title" id="edTitle">편집</span>
    <button class="ed-save" id="edSave">저장</button>
  </div>
  <div class="ed-stage" id="edStage">
    <div class="ed-loading" id="edLoading">편집기 준비 중…</div>
    <div class="ed-canvas-box" id="edCanvasBox" style="display:none"><canvas id="fcanvas"></canvas></div>
  </div>
  <div class="ed-tools" id="edTools" style="display:none">
    <div class="ed-row">
      <button class="ed-btn" data-add="text">🅣<span>글자</span></button>
      <button class="ed-btn" data-add="arrow">↗<span>화살표</span></button>
      <button class="ed-btn" data-add="circle">◯<span>동그라미</span></button>
      <button class="ed-btn" data-add="rect">▢<span>네모</span></button>
      <button class="ed-btn" id="edPen">✏️<span>펜</span></button>
    </div>
    <div class="ed-row">
      <div class="ed-colors" id="edColors">
        <span class="ed-c on" data-c="#ff3b30" style="background:#ff3b30"></span>
        <span class="ed-c" data-c="#ffcc00" style="background:#ffcc00"></span>
        <span class="ed-c" data-c="#34c759" style="background:#34c759"></span>
        <span class="ed-c" data-c="#0a84ff" style="background:#0a84ff"></span>
        <span class="ed-c" data-c="#ffffff" style="background:#fff;border:1px solid #889"></span>
        <span class="ed-c" data-c="#1c1c1e" style="background:#1c1c1e"></span>
      </div>
      <button class="ed-del" id="edDel">🗑 선택삭제</button>
    </div>
    <p class="ed-hint">도형을 끌어 옮기고, 모서리로 크기·회전. 글자는 두 번 탭하면 수정. 두 손가락으로 확대하고, 확대 후엔 빈 곳을 끌어 이동해요.</p>
  </div>
</div>

<div class="toast" id="toast"></div>
<div id="dbg" style="display:none;position:fixed;left:6px;right:6px;top:44px;max-height:34vh;overflow:auto;background:rgba(8,12,18,.95);color:#7CFC9A;font:11px/1.45 monospace;padding:10px 12px;border-radius:10px;z-index:400;white-space:pre-wrap;border:1px solid #2a3a4a"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fabric@5.3.0/dist/fabric.min.js"></script>
<script>
if(typeof fabric==="undefined"){ document.write('<scr'+'ipt src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></scr'+'ipt>'); }
</script>
<script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
<script>
/* 진단 */
let DBG=false;
function dlog(m){ try{ const p=document.getElementById("dbg"); if(!p)return; p.textContent+=("["+new Date().toLocaleTimeString().slice(0,8)+"] "+m+"\n"); p.scrollTop=p.scrollHeight; }catch(e){} }
window.addEventListener("error",e=>dlog("⚠️오류: "+(e.message||"")+" @줄"+(e.lineno||"?")));
window.addEventListener("unhandledrejection",e=>dlog("⚠️비동기: "+((e.reason&&e.reason.message)||e.reason||"")));

/* ===================== 설정 ===================== */
const firebaseConfig={ apiKey:"AIzaSyAyG1chECYsbO7cSZUuXmNa0_KDYBmahPY", authDomain:"my-system-25497.firebaseapp.com", projectId:"my-system-25497", storageBucket:"my-system-25497.firebasestorage.app" };
const COL="photos", CATS=["부동산","업무","여행","개인"], MAXDIM=1600, QUALITY=0.72;
let db=null, online=false, items=[], curCat="부동산", curViewId=null, curEditId=null;
const $=id=>document.getElementById(id);
const esc=s=>(s||"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));
function toast(m){ const t=$("toast"); t.textContent=m; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2800); }
function todayStr(){ const d=new Date(),p=n=>String(n).padStart(2,"0"); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`; }
function fmtDate(ts){ if(!ts)return""; const d=new Date(ts),p=n=>String(n).padStart(2,"0"); return `${d.getFullYear()}.${p(d.getMonth()+1)}.${p(d.getDate())}`; }

/* ===================== 사진 읽기 (여러 방법 순차 시도) ===================== */
// 항상 {url, w, h} 반환. 실패 시 throw.
async function readPhoto(file){
  dlog("readPhoto: "+(file.name||"무명")+" "+(file.size/1048576).toFixed(2)+"MB "+(file.type||"형식?"));
  // 0단계: HEIC/HEIF면 JPEG로 변환 (안드로이드는 HEIC 못 읽음)
  const isHeic = /heic|heif/i.test(file.type||"") || /\.hei[cf]$/i.test(file.name||"");
  if(isHeic && typeof heic2any!=="undefined"){
    try{
      dlog("  HEIC 감지 → JPEG 변환 시도");
      const blob=await heic2any({ blob:file, toType:"image/jpeg", quality:0.85 });
      file = blob instanceof Blob ? blob : (Array.isArray(blob)?blob[0]:file);
      dlog("  ✓ HEIC 변환 완료 "+(file.size/1048576).toFixed(2)+"MB");
    }catch(e){ dlog("  HEIC 변환 실패: "+(e.message||e)); }
  }
  // 방법 A: createImageBitmap → 캔버스 축소
  if(window.createImageBitmap){
    try{
      const bmp=await createImageBitmap(file);
      const r=canvasResize(bmp, bmp.width, bmp.height);
      if(bmp.close)bmp.close();
      if(r.url.length>200){ dlog("  ✓ A(bitmap) "+r.w+"x"+r.h); return r; }
      dlog("  A 결과 빈값 → B 시도");
    }catch(e){ dlog("  A 실패: "+(e.message||e)+" → B"); }
  }
  // 방법 B: FileReader → Image → 캔버스 축소
  const dataUrl=await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=()=>rej(new Error("FileReader 실패")); r.readAsDataURL(file); });
  let img;
  try{ img=await loadImg(dataUrl); }
  catch(e){ throw new Error("이 사진 형식을 열 수 없어요"+(isHeic?" (HEIC 변환 실패)":"")); }
  try{
    const r=canvasResize(img, img.naturalWidth||img.width, img.naturalHeight||img.height);
    if(r.url.length>200){ dlog("  ✓ B(image) "+r.w+"x"+r.h); return r; }
  }catch(e){ dlog("  B 캔버스 실패: "+(e.message||e)); }
  // 방법 C: 원본 그대로 (축소 실패 시)
  dlog("  ✓ C(원본 그대로)");
  return { url:dataUrl, w:img.naturalWidth||img.width, h:img.naturalHeight||img.height };
}
function loadImg(src){ return new Promise((res,rej)=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=()=>rej(new Error("이미지 디코드 실패")); i.src=src; }); }
function canvasResize(drawable,w,h){
  if(!w||!h) return {url:"",w:0,h:0};
  let nw=w, nh=h;
  if(nw>nh){ if(nw>MAXDIM){ nh=Math.round(nh*MAXDIM/nw); nw=MAXDIM; } }
  else { if(nh>MAXDIM){ nw=Math.round(nw*MAXDIM/nh); nh=MAXDIM; } }
  const cv=document.createElement("canvas"); cv.width=nw; cv.height=nh;
  cv.getContext("2d").drawImage(drawable,0,0,nw,nh);
  return { url:cv.toDataURL("image/jpeg",QUALITY), w:nw, h:nh };
}

/* ===== 사진 확대·축소 (핀치 / 더블탭 / 드래그) ===== */
const zoom={ scale:1, x:0, y:0 };
function applyZoom(){ $("vImg").style.transform=`translate(${zoom.x}px,${zoom.y}px) scale(${zoom.scale})`; }
function resetZoom(){ zoom.scale=1; zoom.x=0; zoom.y=0; applyZoom(); }
function clampZoom(){
  zoom.scale=Math.max(1, Math.min(zoom.scale, 6));
  if(zoom.scale<=1){ zoom.x=0; zoom.y=0; return; }
  // 너무 멀리 못 끌게 제한
  const img=$("vImg"); const r=img.getBoundingClientRect();
  const maxX=(r.width*zoom.scale - r.width)/2 + 40;
  const maxY=(r.height*zoom.scale - r.height)/2 + 40;
  zoom.x=Math.max(-maxX, Math.min(maxX, zoom.x));
  zoom.y=Math.max(-maxY, Math.min(maxY, zoom.y));
}
(function setupZoom(){
  const wrap=document.querySelector(".vimgwrap");
  if(!wrap){ dlog("⚠️줌 setup 실패: vimgwrap 없음"); return; }
  dlog("줌 setup OK");
  let mode=null;            // "pan" | "pinch"
  let startX=0,startY=0, baseX=0,baseY=0;
  let startDist=0, baseScale=1;
  let lastTap=0;

  function dist(t){ const dx=t[0].clientX-t[1].clientX, dy=t[0].clientY-t[1].clientY; return Math.hypot(dx,dy); }

  wrap.addEventListener("touchstart",e=>{
    if(DBG) dlog("줌 touchstart 손가락="+e.touches.length+" scale="+zoom.scale.toFixed(2));
    if(e.touches.length===2){
      mode="pinch"; startDist=dist(e.touches); baseScale=zoom.scale;
      e.preventDefault();
    }else if(e.touches.length===1){
      // 더블탭 감지
      const now=Date.now();
      if(now-lastTap<300){
        zoom.scale = zoom.scale>1 ? 1 : 2.5;
        zoom.x=0; zoom.y=0; clampZoom(); applyZoom();
        if(DBG) dlog("더블탭 → scale="+zoom.scale);
        lastTap=0; mode=null; return;
      }
      lastTap=now;
      if(zoom.scale>1){ mode="pan"; startX=e.touches[0].clientX; startY=e.touches[0].clientY; baseX=zoom.x; baseY=zoom.y; }
    }
  },{passive:false});

  wrap.addEventListener("touchmove",e=>{
    if(mode==="pinch" && e.touches.length===2){
      e.preventDefault();
      zoom.scale=baseScale * (dist(e.touches)/startDist);
      clampZoom(); applyZoom();
    }else if(mode==="pan" && e.touches.length===1){
      e.preventDefault();
      zoom.x=baseX+(e.touches[0].clientX-startX);
      zoom.y=baseY+(e.touches[0].clientY-startY);
      clampZoom(); applyZoom();
    }
  },{passive:false});

  wrap.addEventListener("touchend",e=>{
    if(e.touches.length===0) mode=null;
    else if(e.touches.length===1 && zoom.scale>1){ mode="pan"; startX=e.touches[0].clientX; startY=e.touches[0].clientY; baseX=zoom.x; baseY=zoom.y; }
  });

  // PC: 더블클릭 확대, 휠 줌
  $("vImg").addEventListener("dblclick",()=>{ zoom.scale=zoom.scale>1?1:2.5; zoom.x=0; zoom.y=0; clampZoom(); applyZoom(); });
  wrap.addEventListener("wheel",e=>{ e.preventDefault(); zoom.scale*= (e.deltaY<0?1.15:0.87); clampZoom(); applyZoom(); },{passive:false});
})();
function dataUrlToFile(u,fn){ const[h,b]=u.split(","); const mime=(h.match(/:(.*?);/)||[])[1]||"image/jpeg"; const bin=atob(b),a=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i); return new File([a],fn,{type:mime}); }

let fc=null, edMode="new", edQueue=[], edIndex=0, edColor="#ff3b30";

function openEditor(mode, photos){
  if(typeof fabric==="undefined"){

function loadEditor(dataUrl){
  dlog("loadEditor 시작");
  let done=false;
  const guard=setTimeout(()=>{ if(!done){ dlog("⏱loadEditor 타임아웃"); toast("사진 로딩 지연. 닫고 다시 시도"); } },12000);
  const img=new Image();
  img.onload=()=>{
    done=true; clearTimeout(guard);
    try{
      edBgImg=img;
      const stage=$("edStage");
      const maxW=Math.max(120,stage.clientWidth-12), maxH=Math.max(120,stage.clientHeight-12);
      const iw=img.naturalWidth||img.width, ih=img.naturalHeight||img.height;
      const scale=Math.min(maxW/iw, maxH/ih, 1);
      edCW=Math.round(iw*scale); edCH=Math.round(ih*scale);
      dlog("  편집캔버스 "+edCW+"x"+edCH+" (원본 "+iw+"x"+ih+")");
      if(fc){ try{fc.dispose();}catch(e){} fc=null; }
      fc=new fabric.Canvas("fcanvas",{ selection:true, preserveObjectStacking:true, enableRetinaScaling:false });
      fc.setWidth(edCW); fc.setHeight(edCH);
      const box=$("edCanvasBox");
      box.style.width=edCW+"px"; box.style.height=edCH+"px";
      box.style.backgroundImage="url('"+dataUrl+"')";
      $("edLoading").style.display="none"; box.style.display="block"; $("edTools").style.display="block";
      fc.renderAll();
      resetEdZoom();
      dlog("  편집기 준비 완료");
    }catch(e){ dlog("loadEditor 예외: "+(e.message||e)); toast("편집기 준비 실패: "+(e.message||"")); $("editor").classList.remove("show"); }
  };
  img.onerror=()=>{ clearTimeout(guard); dlog("loadEditor 이미지 onerror"); toast("사진을 띄우지 못했어요"); $("editor").classList.remove("show"); };
  img.src=dataUrl;
}

/* ===== 편집기 확대·축소 (두 손가락 핀치/이동) ===== */
const edZoom={ scale:1, x:0, y:0 };
function applyEdZoom(){ const box=$("edCanvasBox"); box.style.transform=`translate(${edZoom.x}px,${edZoom.y}px) scale(${edZoom.scale})`; box.style.transformOrigin="center center"; }
function resetEdZoom(){ edZoom.scale=1; edZoom.x=0; edZoom.y=0; applyEdZoom(); }
function clampEdZoom(){
  edZoom.scale=Math.max(1, Math.min(edZoom.scale, 5));
  if(edZoom.scale<=1){ edZoom.x=0; edZoom.y=0; return; }
  const maxX=(edCW*edZoom.scale - edCW)/2 + 60, maxY=(edCH*edZoom.scale - edCH)/2 + 60;
  edZoom.x=Math.max(-maxX, Math.min(maxX, edZoom.x));
  edZoom.y=Math.max(-maxY, Math.min(maxY, edZoom.y));
}
(function setupEdZoom(){
  const stage=$("edStage");
  if(!stage){ dlog("⚠️편집줌 setup 실패"); return; }
  dlog("편집줌 setup OK");
  let pinch=false, panning=false, startDist=0, baseScale=1, startX=0,startY=0, baseX=0,baseY=0;
  function dist(t){ return Math.hypot(t[0].clientX-t[1].clientX, t[0].clientY-t[1].clientY); }
  function mid(t){ return {x:(t[0].clientX+t[1].clientX)/2, y:(t[0].clientY+t[1].clientY)/2}; }
  stage.addEventListener("touchstart",e=>{
    if(e.touches.length===2){
      // 두 손가락 → 확대/이동
      pinch=true; panning=false; startDist=dist(e.touches); baseScale=edZoom.scale;
      const m=mid(e.touches); startX=m.x; startY=m.y; baseX=edZoom.x; baseY=edZoom.y;
      if(fc){ fc.discardActiveObject(); fc.renderAll(); }
      if(DBG) dlog("편집 핀치 시작");
      e.preventDefault();
    }else if(e.touches.length===1 && edZoom.scale>1){
      // 확대된 상태에서 한 손가락: 도형을 안 건드렸으면 화면 이동
      const hasTarget = fc && fc.findTarget && fc.findTarget(e, false);
      if(!hasTarget && !(fc && fc.getActiveObject())){
        panning=true; startX=e.touches[0].clientX; startY=e.touches[0].clientY; baseX=edZoom.x; baseY=edZoom.y;
        if(DBG) dlog("편집 1손가락 이동 시작");
        e.preventDefault();
      }
    }
  },{passive:false,capture:true});
  stage.addEventListener("touchmove",e=>{
    if(pinch && e.touches.length===2){
      e.preventDefault();
      edZoom.scale=baseScale*(dist(e.touches)/startDist);
      const m=mid(e.touches);
      edZoom.x=baseX+(m.x-startX); edZoom.y=baseY+(m.y-startY);
      clampEdZoom(); applyEdZoom();
    }else if(panning && e.touches.length===1){
      e.preventDefault();
      edZoom.x=baseX+(e.touches[0].clientX-startX);
      edZoom.y=baseY+(e.touches[0].clientY-startY);
      clampEdZoom(); applyEdZoom();
    }
  },{passive:false,capture:true});
  stage.addEventListener("touchend",e=>{ if(e.touches.length<2) pinch=false; if(e.touches.length===0) panning=false; });
  stage.addEventListener("touchcancel",()=>{ pinch=false; panning=false; });
})();

function strokeW(){ return Math.max(3, edCW*0.009); }
function addText(){
  const t=new fabric.IText("글자",{ left:edCW*0.28, top:edCH*0.4, fontFamily:"Pretendard, sans-serif", fontWeight:"bold", fontSize:Math.round(edCH*0.09)+10, fill:edColor, stroke:"rgba(0,0,0,.55)", strokeWidth:1.5, paintFirst:"stroke" });
  fc.add(t); fc.setActiveObject(t); fc.renderAll();
}
function addRect(){
  const s=Math.min(edCW,edCH)*0.32;
  const r=new fabric.Rect({ left:edCW*0.3, top:edCH*0.3, width:s, height:s*0.72, fill:"transparent", stroke:edColor, strokeWidth:strokeW() });
  fc.add(r); fc.setActiveObject(r); fc.renderAll();
}
function addCircle(){
  const rad=Math.min(edCW,edCH)*0.18;
  const c=new fabric.Ellipse({ left:edCW*0.3, top:edCH*0.3, rx:rad, ry:rad*0.8, fill:"transparent", stroke:edColor, strokeWidth:strokeW() });
  fc.add(c); fc.setActiveObject(c); fc.renderAll();
}
function addArrow(){
  const sw=strokeW(), x1=edCW*0.3,y1=edCH*0.5,x2=edCW*0.62,y2=edCH*0.5;
  const line=new fabric.Line([x1,y1,x2,y2],{ stroke:edColor, strokeWidth:sw });
  const head=new fabric.Triangle({ left:x2, top:y2, width:sw*5, height:sw*5, fill:edColor, angle:90, originX:"center", originY:"center" });
  const grp=new fabric.Group([line,head]);
  grp.setControlsVisibility({ mtr:true });
  fc.add(grp); fc.setActiveObject(grp); fc.renderAll();
}
function setPen(on){ fc.isDrawingMode=on; if(on){ fc.freeDrawingBrush.color=edColor; fc.freeDrawingBrush.width=strokeW(); } }

document.querySelectorAll(".ed-btn[data-add]").forEach(b=>b.addEventListener("click",()=>{
  if(!fc)return; setPen(false); $("edPen").style.background="";
  const t=b.dataset.add;
  if(t==="text")addText(); else if(t==="rect")addRect(); else if(t==="circle")addCircle(); else if(t==="arrow")addArrow();
}));
$("edPen").addEventListener("click",()=>{ if(!fc)return; const on=!fc.isDrawingMode; setPen(on); $("edPen").style.background=on?"#2a4055":""; });
$("edColors").querySelectorAll(".ed-c").forEach(s=>s.addEventListener("click",()=>{
  $("edColors").querySelectorAll(".ed-c").forEach(x=>x.classList.remove("on")); s.classList.add("on"); edColor=s.dataset.c;
  if(!fc)return;
  if(fc.isDrawingMode) fc.freeDrawingBrush.color=edColor;
  const o=fc.getActiveObject();
  if(o){
    if(o.type==="i-text"||o.type==="text") o.set("fill",edColor);
    else if(o.type==="group") o.forEachObject(ob=>{ if(ob.fill&&ob.fill!=="transparent")ob.set("fill",edColor); ob.set("stroke",edColor); });
    else o.set("stroke",edColor);
    fc.renderAll();
  }
}));
$("edDel").addEventListener("click",()=>{ if(!fc)return; const o=fc.getActiveObject(); if(o){ fc.remove(o); fc.discardActiveObject(); fc.renderAll(); } else toast("지울 항목을 먼저 선택하세요"); });
$("edClose").addEventListener("click",()=>{ if(fc && fc.getObjects().length && !confirm("편집한 내용이 사라져요. 닫을까요?"))return; closeEditor(); });
function closeEditor(){ if(fc){ try{fc.dispose();}catch(e){} fc=null; } $("editor").classList.remove("show"); edQueue=[]; edIndex=0; edBgImg=null; resetEdZoom(); }

// 원본 사진 + 도형 합성
function composeOutput(){
  if(!edBgImg){ dlog("compose: 배경 없음"); return null; }
  const ow=edBgImg.naturalWidth||edBgImg.width, oh=edBgImg.naturalHeight||edBgImg.height;
  const out=document.createElement("canvas"); out.width=ow; out.height=oh;
  const ctx=out.getContext("2d");
  ctx.drawImage(edBgImg,0,0,ow,oh);
  try{
    const lc=fc.lowerCanvasEl;
    if(lc && edCW>0) ctx.drawImage(lc, 0,0,edCW,edCH, 0,0,ow,oh);
  }catch(e){ dlog("compose 도형합성 예외: "+(e.message||e)); }
  const url=out.toDataURL("image/jpeg",QUALITY);
  dlog("compose 완료: "+(url.length/1024).toFixed(0)+"KB ("+ow+"x"+oh+")");
  return url;
}

$("edSave").addEventListener("click",async()=>{
  if(!fc){ toast("편집기가 준비되지 않았어요"); return; }
  fc.discardActiveObject(); fc.renderAll();
  let out=null;
  try{ out=composeOutput(); }catch(e){ dlog("저장 예외: "+(e.message||e)); toast("저장 실패: "+(e.message||"")); return; }
  if(!out || out.length<200){ toast("저장 실패 — 사진을 다시 불러와주세요"); dlog("저장 결과 빈값"); return; }
  if(edMode==="new"){
    edQueue[edIndex]=out; edIndex++;
    if(edIndex<edQueue.length){
      $("edTitle").textContent=`새 사진 (${edIndex+1}/${edQueue.length})`;
      $("edSave").textContent=(edIndex===edQueue.length-1)?"저장":"다음";
      loadEditor(edQueue[edIndex]);
    }else{ const finalQueue=edQueue.slice(); closeEditor(); openAddModal(finalQueue); }
  }else{
    const it=items.find(i=>i.id===curViewId);
    const nit={ id:genId(), name:((it&&it.name)||todayStr())+" (표시)", cat:(it&&it.cat)||curCat, memo:(it&&it.memo)||"", img:out, ts:Date.now() };
    items.push(nit); await cloudSet(nit); lsSave();
    closeEditor(); $("viewer").classList.remove("show"); setTab(nit.cat); toast("표시한 사진을 저장했어요");
  }
});
$("vMarkup").addEventListener("click",()=>openEditor("mark"));

/* ===================== 기타 ===================== */
$("btnExport").addEventListener("click",()=>{
  const blob=new Blob([JSON.stringify(items,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`사진백업_${todayStr()}.json`;
  document.body.appendChild(a); a.click(); a.remove(); toast("백업 파일을 저장했어요");
});
$("searchInput").addEventListener("input",render);
$("dbgBtn").addEventListener("click",()=>{ DBG=!DBG; const p=$("dbg"); p.style.display=DBG?"block":"none"; if(DBG)dlog("진단 ON · UA="+navigator.userAgent.slice(0,60)+" · fabric="+(typeof fabric!=="undefined")+" · zoom함수="+(typeof applyZoom==="function")); });
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>setTab(t.dataset.cat)));
["addOverlay","editOverlay"].forEach(id=>$(id).addEventListener("click",e=>{ if(e.target.id===id)$(id).classList.remove("show"); }));

initFirebase();
</script>
</body>
