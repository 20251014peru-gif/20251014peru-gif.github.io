<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📺 유튜브 투자 요약기</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f8fa;
    --surface: #ffffff;
    --border: #e2e5ea;
    --accent: #2563eb;
    --accent-light: #eff6ff;
    --text: #1a1d23;
    --text-muted: #6b7280;
    --success: #059669;
    --danger: #dc2626;
    --warn: #d97706;
    --radius: 10px;
    --shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  body {
    font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px;
  }

  .page-header {
    text-align: center;
    margin-bottom: 28px;
  }
  .page-header h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.3px;
  }
  .page-header p {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* ── 입력 영역 ── */
  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    max-width: 820px;
    margin: 0 auto 24px;
    box-shadow: var(--shadow);
  }
  .input-row {
    display: flex;
    gap: 10px;
  }
  .url-input {
    flex: 1;
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color .2s;
  }
  .url-input:focus { border-color: var(--accent); background: #fff; }
  .url-input::placeholder { color: #b0b7c3; }

  .btn-analyze {
    padding: 11px 22px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background .15s;
  }
  .btn-analyze:hover { background: #1d4ed8; }
  .btn-analyze:disabled { background: #93afd8; cursor: not-allowed; }

  /* ── 상태 표시 ── */
  .status-bar {
    max-width: 820px;
    margin: 0 auto 16px;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    display: none;
  }
  .status-bar.loading {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--accent-light);
    color: var(--accent);
    border: 1px solid #bfdbfe;
  }
  .status-bar.error {
    display: block;
    background: #fef2f2;
    color: var(--danger);
    border: 1px solid #fecaca;
  }

  .spinner {
    width: 16px; height: 16px;
    border: 2.5px solid #bfdbfe;
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 결과 영역 ── */
  #result-area {
    max-width: 820px;
    margin: 0 auto;
  }

  /* 결과 툴바 */
  .result-toolbar {
    display: none;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .result-toolbar.visible { display: flex; }
  .toolbar-title { font-size: 13px; color: var(--text-muted); }
  .btn-save {
    padding: 7px 16px;
    background: var(--success);
    color: #fff;
    border: none;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-save:hover { background: #047857; }

  /* ── 분석 결과 CSS (Claude가 채워넣는 부분) ── */
  .result-wrap {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    box-shadow: var(--shadow);
  }

  .title-section { border-left: 4px solid var(--accent); }

  .section-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .5px;
    margin-bottom: 10px;
  }

  .video-title {
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.5;
  }

  .content-block {
    font-size: 14px;
    line-height: 1.85;
    color: var(--text);
    white-space: pre-wrap;
  }
  .content-block p { margin-bottom: 8px; }

  /* 5열 분석표 */
  .analysis-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .analysis-table th {
    background: #f1f5fd;
    color: var(--accent);
    font-weight: 700;
    padding: 10px 12px;
    border: 1px solid var(--border);
    text-align: left;
    white-space: nowrap;
  }
  .analysis-table td {
    padding: 10px 12px;
    border: 1px solid var(--border);
    vertical-align: top;
    line-height: 1.6;
    color: var(--text);
  }
  .analysis-table tr:nth-child(even) td { background: #fafbfc; }

  /* 6단 서사 */
  .narrative-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .narrative-item {
    display: grid;
    grid-template-columns: 28px 90px 1fr;
    gap: 8px;
    align-items: flex-start;
    padding: 10px 12px;
    background: var(--bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .n-num {
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
  }
  .n-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    padding-top: 2px;
  }
  .n-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
  }

  /* 인쇄 */
  @media print {
    body { background: #fff; padding: 10px; }
    .input-card, .status-bar, .result-toolbar { display: none !important; }
    .section { box-shadow: none; border-radius: 0; }
  }
</style>
</head>
<body>

<header class="page-header">
  <h1>📺 유튜브 투자 요약기</h1>
  <p>URL 하나로 자막 추출 → Claude Sonnet 완전 분석</p>
</header>

<!-- 입력 -->
<div class="input-card">
  <div class="input-row">
    <input
      id="urlInput"
      class="url-input"
      type="text"
      placeholder="유튜브 URL을 붙여넣으세요 (예: https://youtu.be/xxxxx)"
      autocomplete="off"
    />
    <button id="analyzeBtn" class="btn-analyze" onclick="analyze()">분석 시작</button>
  </div>
</div>

<!-- 상태 -->
<div id="statusBar" class="status-bar">
  <div class="spinner" id="spinner"></div>
  <span id="statusMsg">자막 추출 중...</span>
</div>

<!-- 결과 툴바 -->
<div id="resultToolbar" class="result-toolbar">
  <span class="toolbar-title" id="toolbarTitle"></span>
  <button class="btn-save" onclick="saveHTML()">💾 HTML 저장</button>
</div>

<!-- 결과 출력 -->
<div id="result-area"></div>

<script>
const urlInput = document.getElementById('urlInput');
const analyzeBtn = document.getElementById('analyzeBtn');
const statusBar = document.getElementById('statusBar');
const statusMsg = document.getElementById('statusMsg');
const spinner = document.getElementById('spinner');
const resultArea = document.getElementById('result-area');
const resultToolbar = document.getElementById('resultToolbar');
const toolbarTitle = document.getElementById('toolbarTitle');

let lastTitle = '';
let lastHtml = '';

urlInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') analyze();
});

function setStatus(msg, type = 'loading') {
  statusBar.className = `status-bar ${type}`;
  if (type === 'loading') {
    spinner.style.display = 'block';
    statusMsg.textContent = msg;
  } else {
    statusBar.innerHTML = `⚠️ ${msg}`;
  }
}

function hideStatus() {
  statusBar.className = 'status-bar';
  statusBar.style.display = 'none';
}

async function analyze() {
  const url = urlInput.value.trim();
  if (!url) { urlInput.focus(); return; }

  analyzeBtn.disabled = true;
  resultArea.innerHTML = '';
  resultToolbar.classList.remove('visible');
  setStatus('자막 추출 중...');

  try {
    const res = await fetch('/api/summarize', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url })
    });

    const data = await res.json();

    if (!res.ok || data.error) {
      setStatus(data.error || '알 수 없는 오류', 'error');
      return;
    }

    hideStatus();
    lastTitle = data.title || '유튜브 요약';
    lastHtml = data.html || '';
    resultArea.innerHTML = lastHtml;

    toolbarTitle.textContent = `📺 ${lastTitle}`;
    resultToolbar.classList.add('visible');

    resultArea.scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch (err) {
    setStatus(`서버 연결 오류: ${err.message}`, 'error');
  } finally {
    analyzeBtn.disabled = false;
  }
}

function saveHTML() {
  const full = `<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>${lastTitle}</title>
<style>
body{font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;background:#f7f8fa;color:#1a1d23;padding:24px 16px;}
.result-wrap{display:flex;flex-direction:column;gap:18px;max-width:820px;margin:0 auto;}
.section{background:#fff;border:1px solid #e2e5ea;border-radius:10px;padding:18px 20px;}
.title-section{border-left:4px solid #2563eb;}
.section-label{font-size:12px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.video-title{font-size:17px;font-weight:700;line-height:1.5;}
.content-block{font-size:14px;line-height:1.85;white-space:pre-wrap;}
.analysis-table{width:100%;border-collapse:collapse;font-size:13px;}
.analysis-table th{background:#f1f5fd;color:#2563eb;font-weight:700;padding:10px 12px;border:1px solid #e2e5ea;text-align:left;}
.analysis-table td{padding:10px 12px;border:1px solid #e2e5ea;vertical-align:top;line-height:1.6;}
.analysis-table tr:nth-child(even) td{background:#fafbfc;}
.narrative-grid{display:flex;flex-direction:column;gap:10px;}
.narrative-item{display:grid;grid-template-columns:28px 90px 1fr;gap:8px;align-items:flex-start;padding:10px 12px;background:#f7f8fa;border-radius:8px;border:1px solid #e2e5ea;}
.n-num{font-size:15px;font-weight:700;color:#2563eb;}
.n-label{font-size:12px;font-weight:700;color:#6b7280;padding-top:2px;}
.n-text{font-size:14px;line-height:1.7;}
</style>
</head>
<body>
${lastHtml}
</body>
</html>`;

  const blob = new Blob([full], { type: 'text/html;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const safe = lastTitle.replace(/[\\/:*?"<>|]/g, '_').slice(0, 60);
  a.download = `요약_${safe}.html`;
  a.click();
}
</script>
</body>
</html>
