<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>업체 연락처</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
:root{
  --bg:#f3f7fb; --bg2:#e7eef6; --card:#ffffff;
  --ink:#3f4a57; --ink-soft:#8893a1; --line:#e4ebf2;
  --primary:#5b9bd5; --primary-deep:#3f7cb8; --primary-soft:#e3f0fb;
  --mint:#5cc2a0; --mint-soft:#ddf3eb;
  --peach:#ef8d8d; --peach-soft:#fce0e0;
  --gold:#e6b04d; --gold-soft:#fbeecb;
  --lav:#9a8cd6; --lav-soft:#ebe6f9;
  --shadow:0 1px 2px rgba(63,124,184,.06), 0 8px 26px rgba(63,124,184,.09);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:linear-gradient(180deg,#f5f9fc 0%,#eef4fa 100%);background-attachment:fixed;color:var(--ink);font-family:'Pretendard',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
body{padding:0 0 80px;min-height:100vh}
.wrap{max-width:920px;margin:0 auto;padding:0 16px}
header{background:linear-gradient(135deg,#e3eefb 0%,#e6f5ef 60%,#eaf0fb 100%);border-bottom:1px solid var(--line);padding:22px 0 18px}
.head-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.brand{display:flex;align-items:baseline;gap:10px}
.brand h1{font-family:'Gowun Batang',serif;font-size:26px;font-weight:700;letter-spacing:-.5px;color:#33567d}
.brand .sub{color:var(--ink-soft);font-size:13px}
.status{font-size:12px;display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--ink-soft)}
.status .dot{width:8px;height:8px;border-radius:50%;background:#cdd6df}
.status.on .dot{background:#5fc99d}
.status.off .dot{background:var(--peach)}
.home-link{color:var(--ink-soft);text-decoration:none;font-size:13px;border:1px solid var(--line);background:#fff;padding:6px 12px;border-radius:8px}
.home-link:hover{color:var(--primary-deep);border-color:var(--primary)}
main{padding-top:22px}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:20px}
.list-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.list-head h2{font-family:'Gowun Batang',serif;color:#33567d;font-size:19px}
.btn{font-family:inherit;font-size:15px;font-weight:600;border-radius:12px;padding:11px 18px;cursor:pointer;border:1px solid transparent;transition:transform .08s,filter .15s}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-deep)}
.btn-ghost{background:#fff;color:var(--ink);border-color:var(--line)}
.btn-ghost:hover{border-color:var(--primary)}
.btn-danger{background:#fff;color:var(--peach);border-color:var(--peach-soft)}
.btn-sm{font-size:13px;padding:7px 13px;border-radius:9px}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.chip{border:1px solid var(--line);background:#fff;color:var(--ink-soft);font-size:13px;font-weight:600;padding:6px 12px;border-radius:999px;cursor:pointer}
.chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.search{margin:4px 0 14px;background:#fbfdff;width:100%;font-size:15px;color:var(--ink);border:1px solid var(--line);border-radius:11px;padding:11px 12px;outline:none}
.search:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
.sec-head{font-size:13px;font-weight:700;color:var(--primary-deep);margin:16px 0 8px;display:flex;align-items:center;gap:8px}
.sec-head .cnt{background:var(--bg2);padding:1px 9px;border-radius:999px;font-size:11px}
.empty{text-align:center;color:var(--ink-soft);padding:34px 10px;font-size:14px}
.row-item{display:flex;align-items:flex-start;gap:11px;background:#fff;border:1px solid var(--line);border-radius:13px;padding:12px 13px;margin-bottom:8px;cursor:pointer;transition:border-color .12s}
.row-item:hover{border-color:var(--primary)}
.row-item .grow{flex:1;min-width:0}
.row-item .t{font-size:16px;font-weight:700;display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.row-item .m{font-size:13px;color:var(--ink-soft);margin-top:4px;line-height:1.6;word-break:break-word}
.row-item .m a{color:var(--primary-deep);font-weight:600;text-decoration:none}
.star{cursor:pointer;color:#d8dee6;font-size:18px;line-height:1}
.star.on{color:var(--gold)}
.pill{display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px;background:var(--primary-soft);color:#36699c;white-space:nowrap}
.card-acts{display:flex;gap:6px;margin-top:9px}
.mini-btn{font-size:12px;font-weight:600;padding:5px 12px;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--ink-soft);cursor:pointer;font-family:inherit}
.mini-btn:hover{border-color:var(--primary);color:var(--primary-deep)}
.mini-btn.del:hover{border-color:var(--peach);color:var(--peach)}
.cardimg{margin-top:8px;width:120px;border-radius:8px;border:1px solid var(--line);cursor:pointer;display:block}
.overlay{position:fixed;inset:0;background:rgba(63,74,87,.45);display:none;align-items:center;justify-content:center;padding:16px;z-index:50}
.overlay.show{display:flex}
.modal{background:var(--card);border-radius:20px;max-width:540px;width:100%;max-height:92vh;overflow:auto;padding:22px;box-shadow:0 20px 60px rgba(63,74,87,.3)}
.modal h3{font-family:'Gowun Batang',serif;font-size:20px;margin-bottom:16px;color:#33567d}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.field label{font-size:12.5px;font-weight:600;color:var(--ink-soft)}
.field label .req{color:var(--peach)}
.field input,.field select,.field textarea{font-family:inherit;font-size:15px;color:var(--ink);background:#fbfdff;border:1px solid var(--line);border-radius:11px;padding:11px 12px;width:100%;outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft);background:#fff}
.field textarea{resize:vertical;min-height:54px}
.scan-box{border:1px dashed var(--mint);background:var(--mint-soft);border-radius:12px;padding:12px;margin-bottom:12px}
.scan-btns{display:flex;gap:8px;flex-wrap:wrap}
.scan-btn{display:inline-flex;align-items:center;gap:6px;background:#fff;color:#2c7d62;border:1px solid var(--mint);border-radius:10px;padding:9px 13px;font-size:13.5px;font-weight:700;cursor:pointer}
.ocr-status{font-size:12px;color:#2c7d62;margin-top:8px;min-height:16px}
.ocr-text{width:100%;font-size:12px;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:9px;padding:8px;margin-top:8px;min-height:64px;display:none;font-family:inherit}
.scan-prev{margin-top:8px;max-width:100%;border-radius:8px;border:1px solid var(--line);display:none}
.btn-row{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap}
.overlay.cam{z-index:60}
#cropOverlay{z-index:62}
.cropmodal{max-width:560px;text-align:center}
.croparea{position:relative;display:inline-block;max-width:100%;line-height:0;touch-action:none;user-select:none;background:#000;border-radius:10px;overflow:hidden}
#cropImg{display:block;max-width:100%;max-height:58vh;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;-webkit-user-drag:none;pointer-events:none}
.croparea, .cropbox, .ch, .ce{-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;-webkit-user-drag:none}
.ce{position:absolute;background:transparent}
.ce.t{top:-7px;left:14px;right:14px;height:14px;cursor:ns-resize}
.ce.b{bottom:-7px;left:14px;right:14px;height:14px;cursor:ns-resize}
.ce.l{left:-7px;top:14px;bottom:14px;width:14px;cursor:ew-resize}
.ce.r{right:-7px;top:14px;bottom:14px;width:14px;cursor:ew-resize}
.ce.t::after,.ce.b::after{content:"";position:absolute;left:0;right:0;top:50%;height:3px;transform:translateY(-50%);background:var(--primary);border-radius:2px}
.ce.l::after,.ce.r::after{content:"";position:absolute;top:0;bottom:0;left:50%;width:3px;transform:translateX(-50%);background:var(--primary);border-radius:2px}
.cropbox{position:absolute;border:1px solid var(--primary);box-shadow:0 0 0 9999px rgba(0,0,0,.45);box-sizing:border-box;cursor:move}
.ch{position:absolute;width:15px;height:15px;background:#fff;border:1.5px solid var(--primary);border-radius:50%}
.ch.tl{left:-8px;top:-8px;cursor:nwse-resize} .ch.tr{right:-8px;top:-8px;cursor:nesw-resize} .ch.bl{left:-8px;bottom:-8px;cursor:nesw-resize} .ch.br{right:-8px;bottom:-8px;cursor:nwse-resize}
.cammodal{background:#11161c;border-radius:18px;max-width:560px;width:100%;padding:14px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.camwrap{position:relative;border-radius:12px;overflow:hidden;background:#000}
#camVideo{width:100%;max-height:66vh;display:block;object-fit:contain;background:#000}
.camframe{position:absolute;inset:8% 6%;border:2px dashed rgba(255,255,255,.72);border-radius:10px;pointer-events:none}
.focusring{position:absolute;width:62px;height:62px;border:2px solid #ffd24a;border-radius:50%;transform:translate(-50%,-50%) scale(1.35);opacity:0;pointer-events:none;transition:transform .25s ease,opacity .25s ease}
.focusring.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.camhint{color:#dfe7ef;font-size:13.5px;text-align:center;margin:10px 4px}
#imgOverlay{position:fixed;inset:0;background:rgba(30,38,48,.88);display:none;align-items:center;justify-content:center;padding:20px;z-index:90;cursor:zoom-out}
#imgOverlay.show{display:flex}
#imgOverlay img{max-width:100%;max-height:100%;border-radius:12px}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:#33567d;color:#fff;padding:12px 22px;border-radius:999px;font-size:14px;font-weight:600;opacity:0;transition:all .3s;z-index:100;pointer-events:none;max-width:90%;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="head-row">
      <div class="brand"><h1>업체 연락처</h1><span class="sub">분야별 · 초점/회전/얇은크롭 <b style="color:#9aa7b4">v9</b></span></div>
      <div style="display:flex;gap:8px;align-items:center">
        <span id="status" class="status"><span class="dot"></span><span id="statusText">연결 중…</span></span>
        <a class="home-link" href="index.html">← 홈</a>
      </div>
    </div>
  </div>
</header>

<main class="wrap">
  <div class="card">
    <div class="list-head">
      <h2>업체 목록</h2>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-primary btn-sm" id="btnAdd">➕ 업체 추가</button>
        <button class="btn btn-ghost btn-sm" id="btnExcel">📋 엑셀 복사</button>
        <button class="btn btn-ghost btn-sm" id="btnBackup">⬇ 백업</button>
        <button class="btn btn-ghost btn-sm" id="btnSettings">⚙ OCR 설정</button>
      </div>
    </div>
    <div class="chips" id="catChips"></div>
    <input type="text" id="search" class="search" placeholder="🔍 검색 — 업체명·담당자·전화·분야·메모">
    <div id="list"></div>
  </div>
</main>

<!-- 추가/수정 모달 -->
<div class="overlay" id="overlay"><div class="modal">
  <h3 id="mTitle">업체 추가</h3>

  <div class="scan-box">
    <div style="font-size:13px;font-weight:700;color:#2c7d62;margin-bottom:8px">📇 명함 스캔 (자동입력)</div>
    <div class="scan-btns">
      <button type="button" class="scan-btn" id="btnCam">📷 실시간 카메라 (자동 촬영)</button>
      <label class="scan-btn">🖼 사진에서 선택<input type="file" id="c-pick" accept="image/*" style="display:none"></label>
    </div>
    <img id="scanPrev" class="scan-prev" alt="명함 미리보기">
    <div class="ocr-status" id="ocrStatus"></div>
    <textarea id="ocrText" class="ocr-text" readonly placeholder="인식된 글자가 여기에 표시됩니다(복사용)"></textarea>
  </div>

  <div class="field"><label>업체명 <span class="req">*</span></label><input type="text" id="c-name"></div>
  <div class="field"><label>분야</label><select id="c-cat"></select></div>
  <div class="field"><label>담당자</label><input type="text" id="c-person"></div>
  <div class="field"><label>전화번호</label><input type="text" id="c-phone" inputmode="tel"></div>
  <div class="field"><label>이메일</label><input type="text" id="c-email" inputmode="email"></div>
  <div class="field"><label>주소</label><input type="text" id="c-address"></div>
  <div class="field"><label>메모</label><textarea id="c-memo"></textarea></div>

  <div class="btn-row">
    <button class="btn btn-primary" id="mSave">저장</button>
    <button class="btn btn-ghost" id="mCancel">취소</button>
    <button class="btn btn-danger" id="mDelete" style="margin-left:auto">삭제</button>
  </div>
</div></div>

<div class="overlay" id="setOverlay"><div class="modal">
  <h3>⚙ 명함 AI 인식 설정</h3>
  <div class="field"><label>Anthropic API 키</label><input type="password" id="setKey" placeholder="sk-ant-..." autocomplete="off"></div>
  <div class="field"><label>모델</label><input type="text" id="setModel" placeholder="claude-sonnet-4-6"></div>
  <div class="field"><label>촬영 회전 보정 (사진이 틀어지면 조정)</label><select id="setRot"><option value="0">기본 (권장)</option><option value="90">시계방향으로 더 90°</option><option value="270">반시계방향으로 더 90°</option><option value="180">더 180°</option></select></div>
  <p style="font-size:12px;color:var(--ink-soft);line-height:1.65;margin-bottom:6px">키는 <b>이 기기 브라우저에만</b> 저장되며 깃허브 소스·클라우드에는 올라가지 않습니다. 공용 PC에서는 사용 후 <b>키 삭제</b>를 눌러주세요.</p>
  <div class="btn-row">
    <button class="btn btn-primary" id="setSave">저장</button>
    <button class="btn btn-ghost" id="setCancel">취소</button>
    <button class="btn btn-danger" id="setClear" style="margin-left:auto">키 삭제</button>
  </div>
</div></div>

<div class="overlay" id="cropOverlay"><div class="modal cropmodal">
  <h3>✂️ 명함 영역 선택</h3>
  <p style="font-size:12px;color:var(--ink-soft);margin-bottom:10px">모서리를 끌어 명함만 맞춘 뒤 "이 영역으로"를 누르세요. 세로면 회전하세요.</p>
  <div class="croparea" id="cropArea">
    <img id="cropImg" alt="" draggable="false">
    <div class="cropbox" id="cropBox"><span class="ce t" data-h="t"></span><span class="ce b" data-h="b"></span><span class="ce l" data-h="l"></span><span class="ce r" data-h="r"></span><span class="ch tl" data-h="tl"></span><span class="ch tr" data-h="tr"></span><span class="ch bl" data-h="bl"></span><span class="ch br" data-h="br"></span></div>
  </div>
  <div class="btn-row" style="justify-content:center;flex-wrap:wrap">
    <button class="btn btn-ghost" id="cropRotate">↻ 회전</button>
    <button class="btn btn-primary" id="cropDone">이 영역으로</button>
    <button class="btn btn-ghost" id="cropCancel">취소</button>
  </div>
</div></div>

<div class="overlay cam" id="camOverlay"><div class="cammodal">
  <div class="camwrap">
    <video id="camVideo" playsinline muted autoplay></video>
    <div class="camframe"></div>
    <div class="focusring" id="focusRing"></div>
  </div>
  <div class="camhint" id="camHint">화면을 누르면 그 지점에 초점이 맞습니다 · 카메라 준비 중…</div>
  <div class="btn-row" style="justify-content:center">
    <button class="btn btn-primary" id="camShot">지금 촬영</button>
    <button class="btn btn-ghost" id="camClose">닫기</button>
  </div>
</div></div>

<div id="imgOverlay"><img id="imgFull" src="" alt=""></div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
/* ===== 설정 (이 부분만 고치면 됩니다) ===== */
const firebaseConfig = {
  apiKey: "AIzaSyAyG1chECYsbO7cSZUuXmNa0_KDYBmahPY",
  authDomain: "my-system-25497.firebaseapp.com",
  projectId: "my-system-25497",
  storageBucket: "my-system-25497.firebasestorage.app",
};
const COL = "contacts";
const CATS = ["전기","설비","기계/냉난방","통신","승강기","소방","영선","청소","공사/인테리어","인테리어","서희타워공사","견적업체","자재","행정","임차인","직원(재직중)","직원(퇴사)","기타"];

let db=null, online=false, items=[];
const $ = id => document.getElementById(id);
const esc = s => (s||"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));
function toast(msg){ const t=$("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2600); }
function cleanCell(s){ return (s||"").toString().replace(/[\t\r\n]/g," "); }

/* ===== 사진 압축 ===== */
function compressImage(file, maxDim=1500, quality=0.7){
  return new Promise((resolve,reject)=>{ const reader=new FileReader();
    reader.onload=e=>{ const img=new Image(); img.onload=()=>{ let w=img.width,h=img.height;
      if(w>h){ if(w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; } } else { if(h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; } }
      const cv=document.createElement("canvas"); cv.width=w; cv.height=h; cv.getContext("2d").drawImage(img,0,0,w,h);
      resolve(cv.toDataURL("image/jpeg",quality)); }; img.onerror=reject; img.src=e.target.result; };
    reader.onerror=reject; reader.readAsDataURL(file);
  });
}
function showImg(src){ $("imgFull").src=src; $("imgOverlay").classList.add("show"); }
$("imgOverlay").addEventListener("click",()=>$("imgOverlay").classList.remove("show"));

/* ===== 저장소 (즉시 반영 + 클라우드/로컬 동시 저장) ===== */
function lsLoad(){ try{ return JSON.parse(localStorage.getItem("ct_"+COL)||"[]"); }catch(e){ return []; } }
function lsSave(){ try{ localStorage.setItem("ct_"+COL, JSON.stringify(items)); }catch(e){} }
function genId(){ return online ? db.collection(COL).doc().id : "L"+Date.now()+Math.floor(Math.random()*100000); }
function syncSet(id,rec){ if(!online) return; const {id:_x,...payload}=rec; db.collection(COL).doc(id).set(payload).catch(()=>toast("클라우드 동기화 지연 — 이 기기에는 저장됨")); }
function addRecord(data){ const id=genId(); const rec={...data,id}; items.push(rec); if(online) syncSet(id,rec); lsSave(); return rec; }
function updateRecord(id,patch){ const i=items.findIndex(x=>x.id===id); if(i<0) return; items[i]={...items[i],...patch}; if(online) syncSet(id,items[i]); lsSave(); }
function deleteRecord(id){ items=items.filter(x=>x.id!==id); if(online) db.collection(COL).doc(id).delete().catch(()=>{}); lsSave(); }
async function loadAll(){
  if(online){
    try{
      const s=await db.collection(COL).get();
      const fb=s.docs.map(d=>({id:d.id,...d.data()}));
      const ids=new Set(fb.map(x=>x.id));
      const extra=lsLoad().filter(x=>!ids.has(x.id));
      items=[...fb,...extra];
      extra.forEach(x=>{ const {id,...p}=x; db.collection(COL).doc(id).set(p).catch(()=>{}); });
    }catch(e){ items=lsLoad(); }
  } else items=lsLoad();
}

/* ===== 초기화 ===== */
async function init(){
  $("c-cat").innerHTML=CATS.map(c=>`<option>${c}</option>`).join("");
  try{

const CARD_PROMPT="첨부 이미지는 한국 업체의 명함입니다. 한글과 숫자를 한 글자도 틀리지 않게 매우 신중히 읽으세요. 아래 JSON 형식으로만 답하세요(설명·코드블록 금지, JSON만). 값이 없으면 빈 문자열.\n{\"name\":\"\",\"person\":\"\",\"phone\":\"\",\"email\":\"\",\"address\":\"\",\"cat\":\"\"}\n- name: 회사/상호명(한글 정확히, 대표 상호 하나)\n- person: 담당자 이름(직함 제외, 한글)\n- phone: 대표전화 또는 휴대폰 하나를 010-1234-5678 / 02-123-4567 같은 한국식 하이픈 형식으로\n- email: 이메일\n- address: 주소 한 줄\n- cat: 다음 중 가장 적합한 하나 — 전기, 설비, 기계/냉난방, 통신, 승강기, 소방, 영선, 청소, 공사/인테리어, 인테리어, 서희타워공사, 견적업체, 자재, 행정, 임차인, 기타\n명함이 기울어졌거나 배경이 있어도 명함만 읽고, 글자가 흐릿하면 한국 업체 명함 문맥에 맞게 가장 그럴듯한 한글로 정확히 보정해 읽으세요.";

function extractJSON(text){ const m=(text||"").match(/\{[\s\S]*\}/); if(!m) return null; try{ return JSON.parse(m[0]); }catch(e){ return null; } }

/* 기기내 OCR (대체용) */
function loadTesseract(){ return new Promise((res,rej)=>{ if(window.Tesseract){res();return;} const s=document.createElement("script"); s.src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"; s.onload=res; s.onerror=rej; document.head.appendChild(s); }); }
function parseCard(text){
  const out={};
  const emailM=text.match(/[\w.+-]+@[\w-]+\.[\w.-]+/); if(emailM) out.email=emailM[0];
  const phones=[...text.matchAll(/(01[016789]|0\d{1,2}|1\d{3})[-.\s]?(\d{3,4})[-.\s]?(\d{4})/g)].map(m=>`${m[1]}-${m[2]}-${m[3]}`);
  if(phones.length){ const mob=phones.find(p=>p.startsWith("01")); out.phone=mob||phones[0]; }
  const lines=text.split(/\n+/).map(s=>s.trim()).filter(Boolean);
  const comp=lines.find(l=>/주식회사|㈜|\(주\)|회사|기업|상사|건설|설비|전기|산업|시스템|엔지니어링|테크|종합/.test(l));
  if(comp) out.name=comp.replace(/\s+/g," ").slice(0,40);
  const titleRe=/(대표|사장|회장|이사|부장|차장|과장|대리|주임|팀장|실장|소장|사원|기사|반장|상무|전무)/;
  const pl=lines.find(l=>titleRe.test(l) && /[가-힣]{2,4}/.test(l));
  if(pl){ const nm=pl.match(/[가-힣]{2,4}/); if(nm) out.person=nm[0]; }
  const al=lines.find(l=>/(로|길)\s?\d|[가-힣]+(시|군|구)\s|번지|동\s?\d/.test(l));
  if(al) out.address=al.replace(/\s+/g," ");
  return out;
}
async function ocrViaTesseract(dataUrl){
  $("ocrStatus").textContent="기기내 인식 중… 처음엔 데이터 받느라 느릴 수 있어요. (정확한 인식은 ⚙ OCR 설정에서 API 키 등록)";
  await loadTesseract();
  const {data}=await Tesseract.recognize(dataUrl,"kor+eng",{ logger:m=>{ if(m.status==="recognizing text") $("ocrStatus").textContent=`인식 중… ${Math.round((m.progress||0)*100)}%`; } });
  const t=(data&&data.text)||""; fillFields(parseCard(t));
  $("ocrText").value=t.trim(); $("ocrText").style.display="block";
  $("ocrStatus").textContent="기기내 인식 완료(정확도 낮음) — 직접 확인하세요.";
}
/* 이미지 재인코딩(크기/품질 조정) */
function reencode(dataUrl,maxDim,q){ return new Promise((res,rej)=>{ const img=new Image(); img.onload=()=>{ let w=img.width,h=img.height; if(w>h){ if(w>maxDim){h=Math.round(h*maxDim/w);w=maxDim;} } else { if(h>maxDim){w=Math.round(w*maxDim/h);h=maxDim;} } const cn=document.createElement("canvas"); cn.width=w; cn.height=h; cn.getContext("2d").drawImage(img,0,0,w,h); res(cn.toDataURL("image/jpeg",q)); }; img.onerror=rej; img.src=dataUrl; }); }

/* 명함 자동 보정(OpenCV로 가장자리 찾아 잘라내고 반듯하게) — 실패 시 원본 사용 */
function loadOpenCV(){
  return new Promise((resolve,reject)=>{
    if(window.cv && cv.Mat) return resolve();
    if(!window.cv){ const s=document.createElement("script"); s.async=true; s.src="https://docs.opencv.org/4.x/opencv.js"; s.onerror=()=>reject(new Error("opencv load fail")); document.head.appendChild(s); }
    let t=0; const iv=setInterval(()=>{ if(window.cv && cv.Mat){ clearInterval(iv); resolve(); } else if((t+=300)>20000){ clearInterval(iv); reject(new Error("opencv timeout")); } },300);
  });
}
function orderPts(pts){ const s=pts.slice().sort((a,b)=>a.y-b.y); const top=s.slice(0,2).sort((a,b)=>a.x-b.x); const bot=s.slice(2,4).sort((a,b)=>a.x-b.x); return [top[0],top[1],bot[1],bot[0]]; }
function autoCropCard(dataUrl){
  return new Promise(async (resolve)=>{
    try{ await loadOpenCV(); }catch(e){ return resolve(dataUrl); }
    const img=new Image();
    img.onload=()=>{
      let src,gray,blur,edged,kernel,contours,hierarchy,best=null,result=dataUrl;
      try{
        src=cv.imread(img);
        gray=new cv.Mat(); cv.cvtColor(src,gray,cv.COLOR_RGBA2GRAY);
        blur=new cv.Mat(); cv.GaussianBlur(gray,blur,new cv.Size(5,5),0);
        edged=new cv.Mat(); cv.Canny(blur,edged,50,150);
        kernel=cv.Mat.ones(5,5,cv.CV_8U); cv.dilate(edged,edged,kernel);
        contours=new cv.MatVector(); hierarchy=new cv.Mat();
        cv.findContours(edged,contours,hierarchy,cv.RETR_LIST,cv.CHAIN_APPROX_SIMPLE);
        const imgArea=src.rows*src.cols; let bestArea=0;
        for(let i=0;i<contours.size();i++){
          const c=contours.get(i); const peri=cv.arcLength(c,true);
          const approx=new cv.Mat(); cv.approxPolyDP(c,approx,0.02*peri,true);
          const area=Math.abs(cv.contourArea(approx));
          if(approx.rows===4 && cv.isContourConvex(approx) && area>bestArea && area>imgArea*0.18 && area<imgArea*0.99){ bestArea=area; if(best) best.delete(); best=approx; }
          else approx.delete();
          c.delete();
        }
        if(best){
          const p=[]; for(let i=0;i<4;i++) p.push({x:best.data32S[i*2],y:best.data32S[i*2+1]});
          const [tl,tr,br,bl]=orderPts(p);
          const W=Math.max(Math.hypot(br.x-bl.x,br.y-bl.y),Math.hypot(tr.x-tl.x,tr.y-tl.y));
          const H=Math.max(Math.hypot(tr.x-br.x,tr.y-br.y),Math.hypot(tl.x-bl.x,tl.y-bl.y));
          const aspect=W/H;
          if(W>100 && H>55 && aspect>0.5 && aspect<3.0){
            const srcTri=cv.matFromArray(4,1,cv.CV_32FC2,[tl.x,tl.y,tr.x,tr.y,br.x,br.y,bl.x,bl.y]);
            const dstTri=cv.matFromArray(4,1,cv.CV_32FC2,[0,0,W,0,W,H,0,H]);
            const M=cv.getPerspectiveTransform(srcTri,dstTri);
            const dst=new cv.Mat(); cv.warpPerspective(src,dst,M,new cv.Size(Math.round(W),Math.round(H)));
            const out=document.createElement("canvas"); cv.imshow(out,dst);
            result=out.toDataURL("image/jpeg",0.92);
            srcTri.delete(); dstTri.delete(); M.delete(); dst.delete();
          }
        }
      }catch(e){ result=dataUrl; }
      finally{ [src,gray,blur,edged,kernel,contours,hierarchy,best].forEach(m=>{ try{ m&&m.delete&&m.delete(); }catch(_){} }); }
      resolve(result);
    };
    img.onerror=()=>resolve(dataUrl);
    img.src=dataUrl;
  });
}

function centerCrop(dataUrl,hPct,vPct){ return new Promise((res,rej)=>{ const img=new Image(); img.onload=()=>{ const cw=Math.max(40,Math.round(img.width*(1-2*hPct))), ch=Math.max(40,Math.round(img.height*(1-2*vPct))); const sx=Math.round((img.width-cw)/2), sy=Math.round((img.height-ch)/2); const cn=document.createElement("canvas"); cn.width=cw; cn.height=ch; cn.getContext("2d").drawImage(img,sx,sy,cw,ch,0,0,cw,ch); res(cn.toDataURL("image/jpeg",0.9)); }; img.onerror=rej; img.src=dataUrl; }); }
function rotate90(dataUrl){ return new Promise((res,rej)=>{ const img=new Image(); img.onload=()=>{ const cn=document.createElement("canvas"); cn.width=img.height; cn.height=img.width; const ctx=cn.getContext("2d"); ctx.translate(cn.width/2,cn.height/2); ctx.rotate(Math.PI/2); ctx.drawImage(img,-img.width/2,-img.height/2); res(cn.toDataURL("image/jpeg",0.92)); }; img.onerror=rej; img.src=dataUrl; }); }
function autoLandscape(dataUrl){ return new Promise((res)=>{ const img=new Image(); img.onload=async()=>{ if(img.height>img.width*1.08){ try{ res(await rotate90(dataUrl)); return; }catch(e){} } res(dataUrl); }; img.onerror=()=>res(dataUrl); img.src=dataUrl; }); }
async function finishCard(dataUrl){
  try{ cardImg=await reencode(dataUrl, 1600, 0.92); }catch(e){ cardImg=dataUrl; }
  $("scanPrev").src=cardImg; $("scanPrev").style.display="block";   /* 잘라낸 명함만 자동 첨부 */
  $("ocrStatus").textContent="명함 인식 중…";
  const key=getKey();
  try{ if(key) await ocrViaAPI(cardImg,key); else await ocrViaTesseract(cardImg); }
  catch(err){ $("ocrStatus").textContent="인식 실패: "+(err.message||err)+" — 명함 사진은 저장됩니다. 직접 입력하세요."; }
}
async function autoProcess(src){
  $("ocrStatus").textContent="명함만 잘라내는 중…";
  const s=await autoLandscape(src);
  let card=s, cropped=false;
  try{ const c=await autoCropCard(s); if(c && c!==s){ card=c; cropped=true; } }catch(e){}
  if(!cropped){ try{ card=await centerCrop(s,0.06,0.12); }catch(e){ card=s; } }
  await finishCard(card);
}
async function handleCard(file){
  if(!file || !file.type.startsWith("image/")) return;
  let src; try{ src=await compressImage(file, 1900, 0.95); }catch(e){ toast("사진 처리 실패"); return; }
  src=await autoLandscape(src);
  openCropper(src);
}
/* ===== 수동 크롭 ===== */
let cIR={w:0,h:0}, cBox={x:0,y:0,w:0,h:0}, cDrag=null, cSX=0, cSY=0, cSB=null, cropSrc="";
function clayout(){ const b=$("cropBox"); b.style.left=cBox.x+"px"; b.style.top=cBox.y+"px"; b.style.width=cBox.w+"px"; b.style.height=cBox.h+"px"; }
function cReset(){ const im=$("cropImg"); cIR={w:im.clientWidth,h:im.clientHeight}; cBox={x:cIR.w*0.06,y:cIR.h*0.1,w:cIR.w*0.88,h:cIR.h*0.7}; clayout(); }
function openCropper(dataUrl){
  cropSrc=dataUrl; const im=$("cropImg");
  im.onload=()=>requestAnimationFrame(cReset);
  im.src=dataUrl;
  $("cropOverlay").classList.add("show");
}
$("cropArea").addEventListener("pointerdown",e=>{ const h=e.target.getAttribute&&e.target.getAttribute("data-h"); cDrag=h||"move"; cSX=e.clientX; cSY=e.clientY; cSB={...cBox}; try{$("cropArea").setPointerCapture(e.pointerId);}catch(_){} e.preventDefault(); });
$("cropArea").addEventListener("pointermove",e=>{ if(!cDrag) return; const dx=e.clientX-cSX, dy=e.clientY-cSY; let x=cSB.x,y=cSB.y,w=cSB.w,h=cSB.h; const W=cIR.w,H=cIR.h;
  if(cDrag==="move"){ x=Math.min(Math.max(0,cSB.x+dx),W-cSB.w); y=Math.min(Math.max(0,cSB.y+dy),H-cSB.h); }
  else{ if(cDrag.indexOf("l")>=0){ x=cSB.x+dx; w=cSB.w-dx; } if(cDrag.indexOf("r")>=0){ w=cSB.w+dx; } if(cDrag.indexOf("t")>=0){ y=cSB.y+dy; h=cSB.h-dy; } if(cDrag.indexOf("b")>=0){ h=cSB.h+dy; }
    if(w<40){ if(cDrag.indexOf("l")>=0) x=cSB.x+cSB.w-40; w=40; } if(h<30){ if(cDrag.indexOf("t")>=0) y=cSB.y+cSB.h-30; h=30; }
    if(x<0){ w+=x; x=0; } if(y<0){ h+=y; y=0; } if(x+w>W) w=W-x; if(y+h>H) h=H-y; }
  cBox={x,y,w,h}; clayout(); });
$("cropArea").addEventListener("pointerup",()=>{ cDrag=null; });
$("cropArea").addEventListener("pointercancel",()=>{ cDrag=null; });
$("cropArea").addEventListener("contextmenu",e=>e.preventDefault());
$("cropArea").addEventListener("touchstart",e=>{ if(e.cancelable) e.preventDefault(); },{passive:false});
$("cropRotate").addEventListener("click",async()=>{ try{ cropSrc=await rotate90(cropSrc); }catch(e){} const im=$("cropImg"); im.onload=()=>requestAnimationFrame(cReset); im.src=cropSrc; });
$("cropCancel").addEventListener("click",()=>$("cropOverlay").classList.remove("show"));
$("cropDone").addEventListener("click",async()=>{
  const im=$("cropImg"); const sX=im.naturalWidth/(cIR.w||1), sY=im.naturalHeight/(cIR.h||1);
  const sx=Math.max(0,Math.round(cBox.x*sX)), sy=Math.max(0,Math.round(cBox.y*sY));
  const sw=Math.max(20,Math.round(cBox.w*sX)), sh=Math.max(20,Math.round(cBox.h*sY));
  const cn=document.createElement("canvas"); cn.width=sw; cn.height=sh; cn.getContext("2d").drawImage(im,sx,sy,sw,sh,0,0,sw,sh);
  const out=cn.toDataURL("image/jpeg",0.95);
  $("cropOverlay").classList.remove("show");
  await finishCard(out);
});

/* ===== 실시간 카메라 + 명함 자동 촬영 ===== */
let camStream=null, detTimer=null, hitCount=0;
const detCanvas=document.createElement("canvas");
async function focusAt(e){
  const v=$("camVideo"); const rect=v.getBoundingClientRect();
  const lx=e.clientX-rect.left, ly=e.clientY-rect.top;
  const fr=$("focusRing"); if(fr){ fr.style.left=lx+"px"; fr.style.top=ly+"px"; fr.classList.remove("show"); void fr.offsetWidth; fr.classList.add("show"); setTimeout(()=>fr.classList.remove("show"),800); }
  if(!camStream) return;
  const track=camStream.getVideoTracks()[0]; if(!track||!track.applyConstraints) return;
  let caps={}; try{ caps=track.getCapabilities?track.getCapabilities():{}; }catch(_){}
  const x=Math.min(1,Math.max(0,lx/rect.width)), y=Math.min(1,Math.max(0,ly/rect.height));
  const poi=[{x,y}];
  try{
    const fm=caps.focusMode||[];
    if(fm.indexOf&&fm.indexOf("single-shot")>=0){ const o={focusMode:"single-shot"}; if(caps.pointsOfInterest) o.pointsOfInterest=poi; await track.applyConstraints({advanced:[o]}); }
    const adv=[];
    if(caps.pointsOfInterest) adv.push({pointsOfInterest:poi});
    if(caps.exposureMode && (""+caps.exposureMode).indexOf("continuous")>=0) adv.push({exposureMode:"continuous"});
    if(fm.indexOf&&fm.indexOf("continuous")>=0) adv.push({focusMode:"continuous"});
    if(adv.length) await track.applyConstraints({advanced:adv});
  }catch(_){}
}
$("camVideo").addEventListener("click",focusAt);
async function startCamera(){
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){ toast("이 브라우저는 카메라를 지원하지 않아요 — '사진에서 선택'을 쓰세요"); return; }
  $("camOverlay").classList.add("show"); $("camHint").textContent="카메라 준비 중…"; hitCount=0;
  loadOpenCV().catch(()=>{});
  try{
    camStream=await navigator.mediaDevices.getUserMedia({ video:{ facingMode:{ideal:"environment"}, width:{ideal:1920}, height:{ideal:1080} }, audio:false });
    const v=$("camVideo"); v.srcObject=camStream; await v.play();
    try{ const tr=camStream.getVideoTracks()[0]; const caps=tr.getCapabilities?tr.getCapabilities():{}; const adv=[]; if(caps.focusMode&&caps.focusMode.includes&&caps.focusMode.includes("continuous")) adv.push({focusMode:"continuous"}); if(adv.length) await tr.applyConstraints({advanced:adv}); }catch(e){}
    detTimer=setInterval(()=>{ try{ tickDetect(); }catch(e){} }, 280);
  }catch(e){ $("camHint").textContent="카메라를 열 수 없어요: "+(e.message||e)+" — 권한 허용 후 다시, 또는 '사진에서 선택' 사용"; }
}
function stopCamera(){
  if(detTimer){ clearInterval(detTimer); detTimer=null; }
  try{ if(camStream) camStream.getTracks().forEach(t=>t.stop()); }catch(e){}
  camStream=null;
  const v=$("camVideo"); try{ v.pause(); v.srcObject=null; }catch(e){}
  $("camOverlay").classList.remove("show");
}
function tickDetect(){
  const v=$("camVideo"); if(!v.videoWidth) return;
  if(!(window.cv && cv.Mat)){ $("camHint").textContent="명함을 화면에 꽉 차게 비춰주세요 (자동인식 준비 중…)"; return; }
  const dw=480, dh=Math.round(v.videoHeight*dw/v.videoWidth);
  detCanvas.width=dw; detCanvas.height=dh; detCanvas.getContext("2d").drawImage(v,0,0,dw,dh);
  let src,gray,blur,edged,kernel,contours,hier;
  try{
    src=cv.imread(detCanvas); gray=new cv.Mat(); cv.cvtColor(src,gray,cv.COLOR_RGBA2GRAY);
    let lap=new cv.Mat(), mean=new cv.Mat(), sd=new cv.Mat(); cv.Laplacian(gray,lap,cv.CV_64F); cv.meanStdDev(lap,mean,sd); const sharp=Math.pow(sd.doubleAt(0,0),2); lap.delete(); mean.delete(); sd.delete();
    blur=new cv.Mat(); cv.GaussianBlur(gray,blur,new cv.Size(5,5),0);
    edged=new cv.Mat(); cv.Canny(blur,edged,50,150);
    kernel=cv.Mat.ones(5,5,cv.CV_8U); cv.dilate(edged,edged,kernel);
    contours=new cv.MatVector(); hier=new cv.Mat(); cv.findContours(edged,contours,hier,cv.RETR_LIST,cv.CHAIN_APPROX_SIMPLE);
    const imgArea=dw*dh; let found=false;
    for(let i=0;i<contours.size();i++){ const ct=contours.get(i); const peri=cv.arcLength(ct,true); const ap=new cv.Mat(); cv.approxPolyDP(ct,ap,0.02*peri,true); const area=Math.abs(cv.contourArea(ap)); if(ap.rows===4 && cv.isContourConvex(ap) && area>imgArea*0.22) found=true; ap.delete(); ct.delete(); }
    if(found && sharp>22){ hitCount++; $("camHint").textContent=`명함 인식됨 — 그대로 고정 (${Math.min(hitCount,3)}/3)`; if(hitCount>=3) captureAuto(); }
    else { hitCount=Math.max(0,hitCount-1); $("camHint").textContent = found ? "조금만 더 또렷하게… (흔들림 줄이기)" : "명함을 안내선 안에 꽉 차게 비춰주세요"; }
  } finally { [src,gray,blur,edged,kernel,contours,hier].forEach(m=>{try{m&&m.delete&&m.delete();}catch(_){}}); }
}
async function grabFrame(){ const v=$("camVideo"); const w=v.videoWidth,h=v.videoHeight; if(!w) return null; const cn=document.createElement("canvas"); cn.width=w; cn.height=h; cn.getContext("2d").drawImage(v,0,0,w,h); let url=cn.toDataURL("image/jpeg",0.92); try{ url=await rotateImage(url, getCorr()+180); }catch(e){} return url; }
async function captureAuto(){ if(detTimer){ clearInterval(detTimer); detTimer=null; } const f=await grabFrame(); stopCamera(); if(f) await autoProcess(f); }
async function captureManual(){ if(detTimer){ clearInterval(detTimer); detTimer=null; } const f=await grabFrame(); stopCamera(); if(f){ const s=await autoLandscape(f); openCropper(s); } }
$("btnCam").addEventListener("click",startCamera);
$("camShot").addEventListener("click",captureManual);
$("camClose").addEventListener("click",stopCamera);
$("c-pick").addEventListener("change",e=>{ const f=e.target.files[0]; e.target.value=""; handleCard(f); });

/* 설정 모달 */
$("btnSettings").addEventListener("click",()=>{ $("setKey").value=getKey(); $("setModel").value=getModel(); $("setRot").value=String(getCorr()); $("setOverlay").classList.add("show"); });
$("setCancel").addEventListener("click",()=>$("setOverlay").classList.remove("show"));
$("setOverlay").addEventListener("click",e=>{ if(e.target===$("setOverlay")) $("setOverlay").classList.remove("show"); });
$("setSave").addEventListener("click",()=>{ try{ localStorage.setItem(KEY_LS,$("setKey").value.trim()); localStorage.setItem(MODEL_LS,$("setModel").value.trim()||DEFAULT_MODEL); localStorage.setItem(ROT_LS,$("setRot").value); }catch(e){} $("setOverlay").classList.remove("show"); toast(getKey()?"저장됨 — 이제 명함은 AI로 인식됩니다":"저장됨"); });
$("setClear").addEventListener("click",()=>{ try{ localStorage.removeItem(KEY_LS); }catch(e){} $("setKey").value=""; toast("키가 삭제되었습니다"); });

/* ===== 엑셀 복사 / 백업 ===== */
$("btnExcel").addEventListener("click",()=>{
  const list=sortItems(items.filter(match)); if(!list.length){ toast("복사할 내역이 없습니다"); return; }
  const rows=list.map(it=>[it.name,it.cat,it.person,it.phone,it.email,it.address].map(x=>cleanCell(x).trim()).filter(Boolean).join("_"));
  const text=rows.join("\n");
  const ok=()=>toast("엑셀용으로 복사됨");
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(ok).catch(()=>fallbackCopy(text,ok)); } else fallbackCopy(text,ok);
});
function fallbackCopy(text,cb){ const ta=document.createElement("textarea"); ta.value=text; ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.select(); try{document.execCommand("copy");cb();}catch(e){toast("복사 실패");} ta.remove(); }
$("btnBackup").addEventListener("click",()=>{
  const blob=new Blob([JSON.stringify({exportedAt:new Date().toISOString(),items},null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob); const a=document.createElement("a");
  const d=new Date(); const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  a.href=url; a.download=`업체연락처백업_${ds}.json`; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url); toast("백업 파일을 저장했습니다");
});

init();
